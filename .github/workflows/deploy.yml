name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  quality-gates:
    name: Re-run CI gates before deploy
    uses: ./.github/workflows/ci.yml

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: solarnext-crm-backend:${{ github.sha }}

  migrate:
    name: Database Migrations with Rollback
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      JWT_SECRET: migration-only-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations, rollback one step on failure
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "PRODUCTION_DATABASE_URL secret is required when DEPLOY_ENABLED=true"
            exit 1
          fi
          if npm run migrate:up; then
            echo "Migrations applied."
          else
            status=$?
            echo "Migration failed; attempting one-step rollback."
            npm run migrate:down || true
            exit "$status"
          fi

  deploy-vercel:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    if: ${{ vars.DEPLOY_ENABLED == 'true' && vars.DEPLOY_FRONTEND == 'vercel' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI and deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm ci
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-vps:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: migrate
    if: ${{ vars.DEPLOY_ENABLED == 'true' && vars.DEPLOY_BACKEND == 'vps' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_DEPLOY_SSH_KEY: ${{ secrets.VPS_DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run remote deploy command
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_DEPLOY_COMMAND: ${{ secrets.VPS_DEPLOY_COMMAND }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "$VPS_DEPLOY_COMMAND"

  smoke-tests:
    name: Post-deploy Smoke Tests
    runs-on: ubuntu-latest
    needs:
      - migrate
      - deploy-vercel
      - deploy-vps
    if: ${{ always() && vars.DEPLOY_ENABLED == 'true' && needs.migrate.result == 'success' && (needs.deploy-vercel.result == 'success' || needs.deploy-vercel.result == 'skipped') && (needs.deploy-vps.result == 'success' || needs.deploy-vps.result == 'skipped') }}
    env:
      API_BASE_URL: ${{ secrets.PRODUCTION_API_BASE_URL }}
    steps:
      - name: Ready endpoint
        run: |
          test -n "$API_BASE_URL"
          curl --fail --silent --show-error "$API_BASE_URL/api/health/ready"

      - name: Financial engine health endpoint
        run: |
          curl --fail --silent --show-error "$API_BASE_URL/api/health/financial-engine"

  deploy-disabled:
    name: Deploy Disabled Notice
    runs-on: ubuntu-latest
    needs: docker-build
    if: ${{ vars.DEPLOY_ENABLED != 'true' }}
    steps:
      - run: echo "Deployment is disabled. Set repository variable DEPLOY_ENABLED=true and required secrets to activate deploy."
