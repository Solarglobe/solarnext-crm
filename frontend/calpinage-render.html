<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calpinage Render</title>
  <script>
    window.SMARTPITCH_DISABLE_OVERLAYS = true;
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0e0e1a; }
    #calpinage-render-root {
      width: 100%;
      height: 100%;
      position: relative;
    }
    /* Masquer sidebar, toolbar, boutons — garder uniquement le plan */
    #calpinage-render-root .calpinage-sidebar,
    #calpinage-render-root [id*="sidebar"],
    #calpinage-render-root .calpinage-toolbar,
    #calpinage-render-root [id*="toolbar"],
    #calpinage-render-root #btn-validate-calpinage,
    #calpinage-render-root #btn-validate-roof,
    #calpinage-render-root .phase-ui,
    #calpinage-render-root .calpinage-loading-overlay { display: none !important; }
  </style>
</head>
<body>
  <div id="calpinage-render-root"></div>
  <script type="module" src="./src/calpinage-render.tsx"></script>
</body>
</html>
