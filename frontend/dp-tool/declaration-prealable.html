<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Déclaration préalable — SolarNext</title>
  <link rel="icon" href="./favicon.png" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font: 16px/1.5 system-ui, sans-serif;
      color: #111827;
      background: #f9fafb;
    }
    .sn-dp-redirect-card {
      max-width: 420px;
      padding: 28px 24px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      text-align: center;
    }
    .sn-dp-redirect-card h1 {
      margin: 0 0 12px;
      font-size: 1.125rem;
      font-weight: 600;
    }
    .sn-dp-redirect-card p {
      margin: 0 0 20px;
      color: #4b5563;
      font-size: 0.9375rem;
    }
    .sn-dp-redirect-card a {
      display: inline-block;
      padding: 10px 18px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9375rem;
    }
    .sn-dp-redirect-card a:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <div class="sn-dp-redirect-card" role="alert">
    <h1>Ce module doit être utilisé depuis le CRM</h1>
    <p>
      Le dossier de déclaration préalable (DP) n’est disponible que depuis une fiche lead dans SolarNext,
      avec sauvegarde sur le serveur.
    </p>
    <a href="../crm.html">Ouvrir le CRM</a>
  </div>
</body>
</html>
