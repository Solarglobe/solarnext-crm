<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calpinage reset — DP2 UX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f4f1e9; min-height: 100vh; display: flex; flex-direction: column; }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #e4ddcc;
      align-items: center;
    }
    .toolbar button {
      padding: 8px 14px;
      border: 1px solid #d4cfc4;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #f7f3eb; }
    .toolbar button.active {
      background: #e8e0d0;
      border-color: #c9a449;
      font-weight: 600;
    }
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 400px;
    }
    #calpinage-dp2-canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      cursor: default;
    }
    #calpinage-dp2-canvas.dp2-mode-add { cursor: crosshair; }
  </style>
</head>
<body>
  <div class="toolbar" id="dp2-reset-toolbar">
    <button type="button" class="dp2-tool-btn" id="dp2-btn-add-panels" title="Poser des panneaux (ghost + clic)">
      Ajouter panneaux
    </button>
    <button type="button" class="dp2-tool-btn active" id="dp2-btn-select" title="Sélection par rectangle">
      Sélectionner
    </button>
  </div>
  <div id="canvas-wrap">
    <canvas id="calpinage-dp2-canvas"></canvas>
  </div>

  <script src="dp2-reset-canvas.js"></script>
  <script>
    (function () {
      var canvas = document.getElementById("calpinage-dp2-canvas");
      var wrap = document.getElementById("canvas-wrap");
      if (!canvas || !wrap) return;

      function resize() {
        var w = wrap.clientWidth;
        var h = wrap.clientHeight;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        if (window.DP2Reset && window.DP2Reset.render) window.DP2Reset.render();
      }
      window.addEventListener("resize", resize);
      resize();

      window.DP2Reset.init(canvas);
    })();
  </script>
</body>
</html>
