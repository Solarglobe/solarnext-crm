# nginx reverse proxy — api.solarnext-crm.fr → Node :3000
# Fichier : /etc/nginx/sites-available/api.solarnext-crm.fr.conf
# Activer : sudo ln -s /etc/nginx/sites-available/api.solarnext-crm.fr.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name api.solarnext-crm.fr;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.solarnext-crm.fr;

    # Certificats Let's Encrypt (créés par certbot)
    ssl_certificate     /etc/letsencrypt/live/api.solarnext-crm.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.solarnext-crm.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy → Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # PDF Playwright peut prendre 30-60s
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Upload fichiers (documents clients)
        client_max_body_size 50M;
    }
}
