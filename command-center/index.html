<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calpinage Command Center — SolarNext</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/cards.css" />
  <link rel="stylesheet" href="css/topbar.css" />
  <link rel="stylesheet" href="css/overview.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════ -->
  <aside id="sidebar" aria-label="Navigation des phases">

    <!-- Header: logo + progression globale -->
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="logo-icon">⚡</span>
        <div class="logo-text">
          <span class="logo-title">SolarNext</span>
          <span class="logo-sub">Command Center</span>
        </div>
      </div>

      <div class="global-progress">
        <div class="progress-label">
          <span>Progression globale</span>
          <span class="progress-value" id="global-pct">0%</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill" id="global-bar" style="width:0%"></div>
        </div>
        <div class="progress-counts">
          <span id="global-done">0</span> / <span id="global-total">0</span> tâches validées
        </div>
      </div>
    </div>

    <!-- Navigation des phases -->
    <nav class="sidebar-nav" id="sidebar-nav" aria-label="Phases de la roadmap">
      <!-- Injecté par navigation.js -->
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <span class="footer-version">Audit · Mai 2026</span>
      <a class="footer-link" href="#" id="btn-reset-filters" title="Réinitialiser tous les filtres">
        Reset filtres
      </a>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════
       MAIN AREA
  ═══════════════════════════════════════════════ -->
  <main id="main">

    <!-- TOP BAR -->
    <header id="topbar" role="banner">
      <div class="topbar-left">
        <button class="btn-menu" id="btn-sidebar-toggle" aria-label="Afficher/masquer la sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect y="3"  width="18" height="2" rx="1" fill="currentColor"/>
            <rect y="8"  width="18" height="2" rx="1" fill="currentColor"/>
            <rect y="13" width="18" height="2" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <nav class="breadcrumb" id="breadcrumb" aria-label="Fil d'Ariane">
          <span>Toutes les phases</span>
        </nav>
      </div>

      <div class="topbar-center">
        <div class="search-box">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 10L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="search-input"
            placeholder="Rechercher une tâche, un fichier…"
            autocomplete="off"
            aria-label="Rechercher"
          />
        </div>
      </div>

      <div class="topbar-right">
        <div class="filter-group" id="filter-group" role="group" aria-label="Filtres">
          <!-- Injecté par app.js -->
        </div>
      </div>
    </header>

    <!-- PHASE HEADER (dynamique) -->
    <div class="phase-header" id="phase-header" style="display:none" aria-live="polite">
      <div class="phase-meta">
        <span class="phase-number" id="phase-number" aria-hidden="true"></span>
        <div class="phase-info">
          <h1 class="phase-title" id="phase-title"></h1>
          <p class="phase-desc"  id="phase-desc"></p>
        </div>
      </div>
      <div class="phase-stats" id="phase-stats" aria-label="Statistiques de la phase">
        <!-- Injecté par components.js -->
      </div>
    </div>

    <!-- ZONE DE CONTENU -->
    <section id="content" aria-live="polite" aria-label="Tâches de la roadmap">

      <!-- ── VUE OVERVIEW (toutes phases) ─────────────────────── -->
      <div id="overview-view" style="display:flex;flex-direction:column;gap:var(--space-4)">
        <!-- Stats bar globale -->
        <div class="stats-bar" id="stats-bar"><!-- injecté --></div>

        <!-- Distribution bar -->
        <div class="distribution-bar-wrap" id="distribution-bar-wrap"><!-- injecté --></div>

        <!-- Overview header -->
        <div class="overview-header">
          <span class="overview-title">Phases de la roadmap</span>
          <div class="overview-actions">
            <button class="btn-secondary" id="btn-export" title="Exporter la progression en JSON">
              ↓ Exporter progression
            </button>
            <button class="btn-secondary" id="btn-import" title="Importer une progression JSON">
              ↑ Importer
            </button>
            <input type="file" id="import-file-input" accept=".json" style="display:none" />
          </div>
        </div>

        <!-- Phase cards grid -->
        <div class="overview-grid" id="overview-grid" role="list"><!-- injecté --></div>

        <!-- Raccourcis clavier -->
        <div class="shortcuts-hint" id="shortcuts-hint">
          <div class="shortcut-item"><kbd>←</kbd><kbd>→</kbd> Phase précédente / suivante</div>
          <div class="shortcut-item"><kbd>Esc</kbd> Fermer modale / Retour overview</div>
          <div class="shortcut-item"><kbd>/</kbd> Focus recherche</div>
          <div class="shortcut-item"><kbd>R</kbd> Réinitialiser filtres</div>
        </div>
      </div>

      <!-- ── VUE PHASE (liste de tâches) ───────────────────── -->
      <div id="phase-view" style="display:none">
        <!-- Grille des cartes -->
        <div class="cards-grid" id="cards-grid" role="list"><!-- injecté --></div>

        <!-- État vide -->
        <div class="empty-state" id="empty-state" style="display:none" role="status">
          <div class="empty-icon" aria-hidden="true">🔍</div>
          <p>Aucune tâche ne correspond à ces filtres.</p>
          <button class="btn-secondary" id="btn-clear-filters">Effacer les filtres</button>
        </div>
      </div>
    </section>
  </main>

  <!-- ═══════════════════════════════════════════════
       MODAL DÉTAIL TÂCHE
  ═══════════════════════════════════════════════ -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    style="display:none"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-task-title"
  >
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-meta" id="modal-meta"></div>
        <button class="modal-close" id="modal-close" aria-label="Fermer la modale">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Scripts (ordre important) -->
  <script src="data/phases.js"></script>
  <script src="data/items-p1-critiques.js"></script>
  <script src="data/items-p2-workflow.js"></script>
  <script src="data/items-p3-p5.js"></script>
  <script src="data/items-p6-p10.js"></script>
  <script src="data/items-p11-premium.js"></script>
  <script src="js/components.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/keyboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
