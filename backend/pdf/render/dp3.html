<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DP3 – Plan de coupe | SolarGlobe</title>

<style>
/* ======================================================
   DP3 — PLAN DE COUPE
   SOLARGLOBE — ALIGNÉ DP2
   A4 LANDSCAPE — 1 PAGE
====================================================== */

@page{
  size: A4 landscape;
  margin: 12mm;
}

:root{
  --ink:#111;
  --muted:#6b7280;
  --line:#e5e7eb;
  --brand:#C39847; /* OR SOLARGLOBE */
  --bg:#ffffff;
  --card:#ffffff;
  --accent:#2563eb; /* bleu fin (zones texte) */
}

html, body{
  margin:0;
  padding:0;
  background: var(--bg);
  color: var(--ink);
  font-family: Arial, Helvetica, sans-serif;
}

/* ===============================
   PAGE — STRICT 1 PAGE = 1 A4
=============================== */
.page{
  width:100%;
  height: calc(210mm - 24mm);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  page-break-after:always;
}
.page:last-child{
  page-break-after:auto;
}

/* ===============================
   HEADER
=============================== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:6mm;
}

.logo{
  width:160px;
  height:44px;
}
.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

.brandline{
  text-align:right;
  font-size:10.5px;
  line-height:1.35;
  color:#374151;
  white-space:nowrap;
}

/* ===============================
   LAYOUT
=============================== */
.sheet{
  flex:1;
  display:grid;
  grid-template-columns:60mm 1fr;
  gap:8mm;
  min-height:0;
}

/* ===============================
   LEFT — INFOS
=============================== */
.left{
  border:1.2px solid var(--brand);
  border-radius:8px;
  background:var(--card);
  padding:10px;
  display:flex;
  flex-direction:column;
  min-height:0;
}

.h1{
  font-size:15px;
  font-weight:700;
  margin:0 0 12px;
  display:flex;
  align-items:center;
  gap:10px;
}
.h1::before{
  content:"";
  width:4px;
  height:16px;
  background:var(--brand);
  border-radius:2px;
}

.section-title{
  font-size:11.2px;
  font-weight:800;
  letter-spacing:0.2px;
  margin: 0 0 6px 0;
}

.row{
  display:flex;
  gap:8px;
  align-items:flex-start;
  margin:4px 0;
  font-size:11px;
  line-height:1.35;
}
.label{
  color:var(--muted);
  min-width:16mm;
  white-space:nowrap;
}
.value{
  font-weight:600;
  color:var(--ink);
  flex:1;
}

.divider{
  height:1px;
  background:linear-gradient(
    to right,
    var(--brand),
    transparent
  );
  margin:9px 0;
}

/* ===============================
   RIGHT — PLAN + ZONES TEXTE
=============================== */
.right{
  border:1.2px solid var(--brand);
  border-radius:8px;
  background:#fff;
  padding:6mm;
  overflow:hidden;
}

.plan-center{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Le stage fait exactement la taille rendue de l'image (inline-block),
   donc les % des zones texte se calquent sur l'image. */
.plan-stage{
  position:relative;
  display:inline-block;
  max-width:100%;
  max-height:100%;
}

.plan-img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
}

.text-layer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.text-box{
  position:absolute;
  box-sizing:border-box;
  background:#fff;
  border:1px solid var(--accent);
  color:#111;
  padding:2px 3px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
}

/* ===============================
   FOOTER
=============================== */
.footer{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-top:4mm;
  padding-top:2mm;
  border-top:1px solid var(--brand);
  font-size:10px;
  color:#374151;
}
.footer .muted{
  color:var(--muted);
}

/* ===============================
   DATA
=============================== */
[data-field]{
  font-weight:600;
}
</style>


<body>

  <!-- ===============================
       PAGE 1 — DP3 PLAN DE COUPE
  =============================== -->
  <section class="page">
    <div class="topbar">
      <div class="logo">
        <img src="/pdf-assets/images/logo-solarglobe-rect.png">
      </div>
      <div class="brandline">
        SolarGlobe · Bureau d’étude photovoltaïque<br>
        19 Avenue Pierre Curie · 77500 Chelles
      </div>
    </div>

    <div class="sheet">
      <aside class="left">
        <h1 class="h1">DP3 – Plan de coupe</h1>

        <div class="row"><div class="label">Client</div><div class="value" data-field="client.nom"></div></div>
        <div class="row">
          <div class="label">Adresse</div>
          <div class="value">
            <span data-field="client.adresse"></span><br>
            <span data-field="client.cp"></span> <span data-field="client.ville"></span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="section-title">Installation</div>
        <div class="row">
          <div class="label">Type</div>
          <div class="value" data-field="dp3.installationOrientation"></div>
        </div>

        <div class="divider"></div>

        <div class="section-title">Modules photovoltaïques</div>
        <div class="row"><div class="label">Marque</div><div class="value" data-field="dp3.module.manufacturer"></div></div>
        <div class="row"><div class="label">Modèle</div><div class="value" data-field="dp3.module.reference"></div></div>
        <div class="row"><div class="label">Puissance</div><div class="value" data-field="dp3.module.power_w"></div></div>
        <div class="row"><div class="label">Dimensions</div><div class="value" data-field="dp3.module.dimensions"></div></div>
      </aside>

      <main class="right">
        <div class="plan-center">
          <div class="plan-stage">
            <img class="plan-img" data-field="images.baseImage" alt="DP3 – Plan de coupe">
            <div class="text-layer" data-field="dp3.textBoxesLayer" aria-label="Zones texte"></div>
          </div>
        </div>
      </main>
    </div>

    <div class="footer">
      <div class="muted">Document interne – avant dépôt</div>
      <div>DP3 · Page 1 / 1<br><span class="muted">le <span data-field="date"></span></span></div>
    </div>
  </section>

  <script src="dp3.js"></script>
</body>
</html>
