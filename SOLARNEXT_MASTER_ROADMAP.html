 Prénom + Nom admin, Email, Mot de passe + Confirmation (avec indicateur de force), Téléphone (optionnel), Numéro RGE (optionnel — important pour les installateurs PV), Case 'J'accepte les CGU v1.x' (obligatoire, non pré-cochée).\n\nPOST /api/auth/register :\nTransaction DB atomique : créer organization + user admin (role ADMIN) en un seul appel. En cas d'échec partiel : rollback complet. Envoyer email de vérification immédiatement. Répondre avec les tokens d'auth (connexion automatique). Rediriger vers /onboarding.\n\nSur /login : 'Pas encore de compte ? Essayez gratuitement 14 jours →'. Protection : rate limiting 3 inscriptions/IP/heure (Phase 8).", "success": "Un installateur solaire crée son organisation et son compte en 2 minutes sans intervention manuelle. Le numéro RGE est capturé dès l'inscription pour les futures vérifications.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Sans signup public, chaque nouveau client nécessite une intervention manuelle = 0 scalabilité.", "status": "TODO", "phase_num": 9}, {"num": 39, "title": "Wizard d'onboarding — Premier démarrage guidé en 5 étapes", "priority": "MAJEUR", "files": ["frontend/src/pages/Onboarding.tsx (nouveau)", "frontend/src/components/onboarding/OnboardingStep*.tsx"], "desc": "Wizard pleine page après la première connexion (onboarding_completed = false) :\n\nÉtape 1 — Profil entreprise (obligatoire) :\nNom, logo (upload), adresse, SIRET, numéro RGE, couleur principale, région principale d'intervention (pour pré-charger les données IGN pertinentes)\n\nÉtape 2 — Configuration messagerie :\nIMAP/SMTP ou email SolarNext. Test de connexion en temps réel.\n\nÉtape 3 — Inviter des collaborateurs :\nEmails + rôles (ADMIN / COMMERCIAL / TECHNICIEN / INSTALLATEUR). Envoi d'invitations.\n\nÉtape 4 — Personnaliser le pipeline Kanban :\nRenommer, réordonner les statuts par défaut. Ajouter / supprimer (max 10 colonnes).\n\nÉtape 5 — Créer le premier lead :\nFormulaire simplifié avec tooltip sur chaque champ. 'Bravo ! Votre premier lead est créé.' + CTA vers le Kanban.\n\nStockage : onboarding_step_completed[] en DB pour reprendre là où on s'est arrêté.", "success": "Un nouvel installateur est opérationnel avec son premier lead créé et son pipeline configuré en moins de 10 minutes. Taux de complétion wizard > 70%.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans onboarding, le taux de churn J7 sera élevé car les utilisateurs ne savent pas démarrer.", "status": "TODO", "phase_num": 9}]}, {"num": 10, "title": "PHASE 10 — Monétisation", "subtitle": "Transformer SolarNext en produit qui génère des revenus automatiquement", "score_before": "0/10", "score_after": "9/10", "requires": [8, 9], "why": "Sans facturation automatisée, SolarNext n'est pas un SaaS. Stripe gère la complexité de la récurrence, des échecs de paiement et de la conformité fiscale. Cette phase dépend de la Sécurité (Phase 8) pour les webhooks et des Portes SaaS (Phase 9) pour le signup.", "steps": [{"num": 40, "title": "Intégration Stripe — Plans d'abonnement récurrents avec période d'essai", "priority": "CRITIQUE", "files": ["backend/domains/billing/router.js (nouveau)", "backend/domains/billing/stripe.service.js (nouveau)", "backend/db/migrations/ (colonnes Stripe sur organizations)"], "desc": "Créer 3 plans dans Stripe Dashboard :\n• Starter : fonctionnalités essentielles, quotas limités\n• Pro : accès complet aux moteurs PV, quotas étendus\n• Enterprise : illimité, support dédié, SLA, accès API\n\nColonnes à ajouter sur organizations :\nstripe_customer_id, stripe_subscription_id, plan_id, subscription_status (trialing | active | past_due | canceled), trial_ends_at, current_period_end.\n\nEndpoints :\n• POST /api/billing/checkout — crée une Stripe Checkout Session\n• POST /api/billing/webhook — événements traités de façon idempotente :\n  checkout.session.completed → activer\n  invoice.payment_succeeded → mettre à jour current_period_end\n  invoice.payment_failed → past_due, email d'alerte\n  customer.subscription.deleted → désactiver accès moteurs PV et PDF\n• GET /api/billing/portal — lien Stripe Customer Portal\n\n14 jours d'essai gratuit sans carte à l'inscription.", "success": "Un installateur souscrit, paie et reçoit une facture Stripe sans intervention manuelle. Les webhooks sont idempotents (deux appels = même résultat).", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": true, "risk": "Sans Stripe, le SaaS ne génère pas de revenus automatiques = modèle non scalable.", "status": "TODO", "phase_num": 10}, {"num": 41, "title": "Feature Gating — Quotas et limites par plan, centralisés", "priority": "MAJEUR", "files": ["backend/config/plans.config.js (nouveau)", "backend/middleware/planGuard.middleware.js (nouveau)", "frontend/src/hooks/usePlan.ts (nouveau)", "frontend/src/components/UpgradePrompt.tsx (nouveau)"], "desc": "Fichier centralisé plans.config.js :\n• starter  : { maxLeads: 50, maxUsers: 2, maxStorageGb: 1, pvEngine: 'basic', apiAccess: false }\n• pro      : { maxLeads: -1, maxUsers: 10, maxStorageGb: 10, pvEngine: 'full', apiAccess: true }\n• enterprise: { maxLeads: -1, maxUsers: -1, maxStorageGb: 100, pvEngine: 'full', apiAccess: true }\n\npvEngine: 'basic' → calculs PVGIS uniquement, pas de shading 3D, pas d'IGN.\npvEngine: 'full' → moteur complet (Phases 4+5), shading proche + lointain, batteries.\n\nMiddleware planGuard(feature) : 402 si limite atteinte :\n{ error:'PLAN_LIMIT_REACHED', feature:'pvEngine', upgradeUrl:'...' }\n\nFrontend usePlan() : { planId, limits, usage, isFeatureAllowed(feature) }. Composant UpgradePrompt : liste ce que le plan supérieur débloque + CTA Stripe direct.", "success": "Un compte Starter ne peut pas accéder au moteur de shading 3D. Le message d'erreur décrit précisément ce que le plan Pro débloque.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans feature gating, les plans payants ne différencient pas les accès = perte de revenus.", "status": "TODO", "phase_num": 10}, {"num": 42, "title": "Portail facturation intégré — Abonnement, quotas et factures Stripe", "priority": "MAJEUR", "files": ["frontend/src/pages/settings/Billing.tsx (nouveau)"], "desc": "Page /settings/billing (accessible depuis les paramètres organisation) :\n\nBloc 1 — Abonnement : plan actif avec badge coloré, renouvellement, montant, statut.\n\nBloc 2 — Consommation des quotas avec barres de progression :\n• Leads actifs (X/50 pour Starter)\n• Études PV actives (si limité par plan)\n• Utilisateurs (X/2)\n• Stockage documents (X Mo / 1 Go)\n\nBloc 3 — Actions :\n• 'Gérer mon abonnement' → Stripe Customer Portal (CB, plan, annulation)\n• 'Télécharger mes factures' → liste paginée des invoices Stripe avec PDF\n\nBloc 4 — Alerte bloquante si past_due depuis > 3 jours :\nModal non fermable avec lien de paiement Stripe direct. L'accès aux moteurs PV est suspendu mais les données restent lisibles (un installateur ne doit pas perdre accès à ses devis signés même en impayé).", "success": "Un client modifie sa carte bancaire et télécharge ses factures en totale autonomie. L'accès aux données contractuelles est maintenu même en cas d'impayé.", "horizon": "MOYEN", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans portail facturation, chaque question de facture nécessite une intervention manuelle.", "status": "TODO", "phase_num": 10}]}, {"num": 11, "title": "PHASE 11 — Authentification Renforcée & Conformité Enterprise", "subtitle": "MFA, sessions auditables et journaux d'événements pour les contrats enterprise", "score_before": "4/10", "score_after": "9/10", "requires": [8, 10], "why": "Les installateurs PV gèrent des données personnelles de leurs clients (coordonnées, consommation électrique, données bancaires pour les dossiers de financement). MFA et audit log sont prérequis pour les contrats B2B enterprise et les certifications sectorielles.", "steps": [{"num": 43, "title": "MFA / 2FA — Authentification TOTP compatible Google Authenticator et Authy", "priority": "MAJEUR", "files": ["backend/domains/auth/mfa.service.js (nouveau)", "frontend/src/pages/MfaSetup.tsx (nouveau)", "frontend/src/pages/MfaVerify.tsx (nouveau)"], "desc": "Standard TOTP (RFC 6238) avec speakeasy :\n\nSetup (Paramètres > Sécurité > Activer le MFA) :\n1. Générer un secret TOTP unique par utilisateur\n2. Afficher QR code + clé manuelle pour import dans l'app authenticator\n3. Valider avec un premier code avant d'activer\n4. Générer 10 codes de secours à usage unique (affichés une fois, stockés hachés)\n\nLogin avec MFA activé :\n1. Email + mdp valide → { mfaRequired: true, mfaToken: tempToken (5 min) }\n2. Redirection vers /mfa-verify\n3. Valider code TOTP (fenêtre ±30s) ou code de secours\n4. Émettre les tokens d'auth définitifs\n\nDésactivation : exige mdp actuel + code TOTP valide.\nAdmin organisation : peut imposer require_mfa = true pour tous les membres. Utile pour les organisations manipulant des dossiers de financement sensibles.", "success": "Un compte avec MFA activé est inaccessible sans le code TOTP même avec le bon mot de passe. Un admin peut forcer le MFA pour toute son équipe en un paramètre.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans MFA, les comptes manipulant des dossiers de financement ne peuvent pas être sécurisés.", "status": "TODO", "phase_num": 11}, {"num": 44, "title": "Gestion des sessions — Liste, contexte géographique et révocation", "priority": "MOYEN", "files": ["frontend/src/pages/settings/SecuritySettings.tsx (nouveau)", "backend/domains/auth/sessions.service.js (nouveau)"], "desc": "Enrichir refresh_tokens avec device_hint, ip_address, country_hint, last_used_at.\n\nPage Paramètres > Sécurité > Sessions actives :\n• Liste des sessions : icône appareil (mobile/desktop), navigateur + OS, IP + pays, date de dernière activité\n• Badge 'Session actuelle' sur la session en cours\n• Bouton 'Révoquer' sur chaque autre session\n• Bouton 'Déconnecter toutes les autres sessions'\n\nLa révocation invalide le refresh token immédiatement en base. Les access tokens en vol (15min) expirent naturellement.\n\nNotification email automatique : 'Nouvelle connexion depuis [Paris, Chrome/Windows]' si pays ou appareil non reconnu. Lien 'Ce n'était pas moi → Sécuriser mon compte' qui révoque toutes les sessions.", "success": "En cas de compte compromis, toutes les sessions tierces sont révoquées en 30 secondes. L'utilisateur reçoit un email d'alerte en cas de connexion depuis un nouveau pays.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Compte compromis non révocable = accès malveillant actif pendant 7 jours.", "status": "TODO", "phase_num": 11}, {"num": 45, "title": "Journal d'audit sécurité — Traçabilité des événements d'authentification et d'accès", "priority": "MOYEN", "files": ["backend/services/auditLog.service.js (nouveau, distinct du mutation_log Phase 3)", "backend/db/migrations/ (table audit_logs)", "frontend/src/pages/admin/AuditLog.tsx (nouveau)"], "desc": "Deux journaux distincts (pas confondre) :\n• mutation_log (Phase 3) : modifications de données métier (qui a changé quoi)\n• audit_log (cette étape) : événements d'authentification et d'accès (qui s'est connecté)\n\nÉvénements à capturer dans audit_log :\n• Connexions réussies/échouées (IP, User-Agent)\n• Activations/désactivations MFA\n• Changements de mot de passe et d'email\n• Ajout/suppression de membres\n• Changements de rôles RBAC\n• Accès au portail d'impersonation SUPER_ADMIN\n• Exports de données (RGPD — Phase 18)\n\nPage Admin > Journal d'audit :\nTableau filtrable (type, utilisateur, dates). Export CSV. Rétention 90 jours en table chaude, 1 an en archive S3.", "success": "L'administrateur peut prouver qui s'est connecté quand et depuis où sur les 90 derniers jours. Le journal d'audit est lui-même tracé (qui l'a consulté).", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans journal d'audit, impossible de prouver conformité RGPD ou sécurité en cas de contrôle.", "status": "TODO", "phase_num": 11}]}, {"num": 12, "title": "PHASE 12 — Différenciation Photovoltaïque", "subtitle": "Les fonctionnalités qui font de SolarNext une plateforme PV et non un CRM générique", "score_before": "5/10", "score_after": "9/10", "requires": [4, 5, 9], "why": "Cette phase s'appuie sur les moteurs Géométrique (Phase 4) et Financier (Phase 5) pour exposer leur puissance aux utilisateurs finaux. Un commercial peut donner une estimation fiable en 45 secondes sur le terrain. C'est impossible avec un CRM générique.", "steps": [{"num": 46, "title": "Module d'estimation rapide PV — Intégré à la fiche lead pour le terrain", "priority": "MAJEUR", "files": ["frontend/src/components/lead-detail/LeadPvEstimator.tsx (nouveau)", "backend/domains/pv-catalog/pv-calculator.js (Phase 5 Step 22)", "backend/domains/leads/router.js"], "desc": "Section 'Estimation rapide PV' dans la fiche lead, sans créer une étude complète. Objectif : chiffre crédible en 30 secondes sur le terrain.\n\nChamps d'entrée (simplifiés pour mobile) :\n• Surface toiture disponible (m²) — aide : '20m² ≈ 10 panneaux standard'\n• Orientation (sélecteur visuel avec boussole)\n• Inclinaison (plat / 15° / 30° / 45°)\n• Code postal (pour les ratios d'ensoleillement PVGIS)\n• Consommation annuelle (kWh/an, défaut 5000)\n\nCalculs affichés instantanément (moteur Phase 5) :\n• Puissance installable (kWc)\n• Production annuelle estimée (kWh/an) via PVGIS\n• Taux d'autoconsommation estimé (%)\n• Économies annuelles (€)\n• Retour sur investissement indicatif (années)\n\nCes données sont sauvegardées dans le lead et pré-remplissent l'étude complète. Pas d'IA générative ici : calculs déterministes et auditables.", "success": "Un commercial donne une estimation chiffrée en 45 secondes sur téléphone. Ces données pré-remplissent l'étude PV complète quand elle est créée depuis ce lead.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans estimation rapide terrain, le commercial doit rappeler le lendemain = perte de leads chauds.", "status": "TODO", "phase_num": 12}, {"num": 47, "title": "Catalogue produits PV enrichi — Panneaux, onduleurs, batteries, fixations", "priority": "MAJEUR", "files": ["frontend/src/pages/admin/PvCatalog.tsx", "backend/domains/pv-catalog/router.js", "backend/db/migrations/ (table products enrichie)"], "desc": "Attributs spécifiques PV par catégorie :\n• Panneaux : puissance crête (Wc), rendement (%), dimensions (mm×mm), poids (kg), technologie (monocristallin PERC / TOPCon / bifacial), garantie produit (ans), garantie performance (ans), certificat IEC, compatible avec moteur shading (oui/non)\n• Onduleurs : puissance (kW), type (string / micro / hybride), rendement européen (%),\n  plage MPP (V), monitoring intégré\n• Batteries : capacité (kWh), chimie (LFP / NMC), cycles garantis, DoD (%)\n• Fixations : type (surimposition / intégration / sol), compatibilité toiture\n\nFonctionnalités :\n• Import CSV/Excel du catalogue fournisseur (mapping colonnes configurable)\n• Prix achat / prix revente / marge par produit\n• Statut : Actif / En rupture / Arrêté (ne plus proposer sans supprimer)\n• Calcul automatique : surface occupée selon modèle panneau sélectionné (utilisé par le moteur géométrique Phase 4)", "success": "Sélectionner un modèle de panneau dans un devis calcule automatiquement la surface occupée et la cohérence avec le calepinage. Le moteur géométrique utilise les dimensions réelles du catalogue.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Catalogue générique = moteur géométrique ne peut pas utiliser les dimensions réelles des panneaux.", "status": "TODO", "phase_num": 12}, {"num": 48, "title": "Rapport d'étude PV branded — Document professionnel remis au client final", "priority": "MAJEUR", "files": ["backend/domains/studies/studyReport.service.js (nouveau)", "backend/domains/studies/geometry/exportPdf.service.js (Phase 4 Step 20)"], "desc": "PDF distinct du devis commercial, remis au client final pour justifier techniquement et économiquement son investissement. Généré depuis un snapshot immuable (Phase 3).\n\nContenu du rapport :\n1. Page de garde : logo installateur, client, date, référence étude\n2. Résumé projet : adresse, puissance (kWc), nb panneaux, surface, orientation\n3. Plan de calepinage : image haute résolution de l'export géométrique (Phase 4 Step 20)\n4. Masque d'horizon : graphique radial 0-360° montrant les obstacles lointains\n5. Production estimée : graphique barres mensuel (kWh), production annuelle, PR\n6. Analyse économique : coût, aides, ROI, TRI, VAN, graphique de rentabilité cumulée\n7. Bilan carbone : CO₂ évité / an et sur 25 ans (équivalent km voiture)\n8. Fiche technique : caractéristiques des équipements (depuis catalogue)\n9. Pied de page : mentions légales, numéro RGE, assurance décennale\n\nTemplate personnalisable par organisation (couleurs, logo, mentions). Cohérence garantie avec le moteur financier (mêmes chiffres que le scénario verrouillé).", "success": "Le rapport d'étude et le devis commercial affichent exactement les mêmes chiffres de production et de ROI. Régénérer le rapport 12 mois plus tard produit le même document.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Pas de rapport d'étude professionnel = incapacité à convaincre un client sur un projet > 20 kWc.", "status": "TODO", "phase_num": 12}, {"num": 49, "title": "Intégration PVGIS — Données d'ensoleillement géolocalisées réelles", "priority": "MOYEN", "files": ["backend/domains/pv-catalog/pvgis.service.js (nouveau)"], "desc": "API PVGIS de la Commission Européenne (gratuite, données scientifiques validées) pour remplacer les approximations régionales.\n\nEndpoint : https://re.jrc.ec.europa.eu/api/v5_2/PVcalc\nParamètres : lat, lon, peakpower (kWc), angle, aspect, loss (défaut 14%), outputformat=json\n\nDonnées récupérées : production mensuelle (kWh/mois × 12), production annuelle, Performance Ratio, irradiation optimale.\n\nCache 30 jours par (coordonnées ±0.01°, orientation, inclinaison) : les données solaires sont stables sur des décennies.\n\nFallback si PVGIS indisponible : ratios régionaux internes (table par département) avec avertissement dans le rapport : 'Données PVGIS indisponibles — estimation régionale utilisée'. Ne jamais bloquer le calcul sur une indisponibilité API externe.\n\nCohérence avec le moteur énergétique (Phase 5 Step 22) : la production PVGIS est l'entrée du calcul 8760h.", "success": "La production annuelle dans un rapport SolarNext est basée sur des données PVGIS géolocalisées réelles. L'indisponibilité de l'API PVGIS ne bloque pas la création d'une étude.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans PVGIS, les productions sont basées sur des approximations régionales = écarts de 10-15%.", "status": "TODO", "phase_num": 12}]}, {"num": 13, "title": "PHASE 13 — UX Métier Installateur & Commercial Terrain", "subtitle": "Adapter SolarNext à l'usage réel : terrain, mobile, urgence, hors connexion", "score_before": "5/10", "score_after": "9/10", "requires": [2, 7, 12], "why": "Un commercial solaire utilise SolarNext chez le prospect sur son téléphone. Un installateur sur le chantier sur tablette. Si l'UX n'est pas pensée pour ces contextes spécifiques, l'outil est abandonné au profit de notes papier — et les données ne rentrent jamais dans le CRM.", "steps": [{"num": 50, "title": "Cohérence terminologique et navigation — Unifier 'Mail' → 'Messagerie' et badges dynamiques", "priority": "MOYEN", "files": ["frontend/src/layout/AppLayout.tsx", "frontend/src/pages/mail/ (tous)", "frontend/src/hooks/useNavBadges.ts (nouveau)"], "desc": "Deux corrections combinées dans cette étape :\n\n1. Unification terminologique :\ngrep -r '\"Mail\"' frontend/src/ → corriger tous les labels UI vers 'Messagerie'. Garder les routes /mail pour la compatibilité des bookmarks. Règle : 'Messagerie' (module), 'Boîte de réception' (onglet), 'Paramètres de messagerie' (config IMAP/SMTP).\n\n2. Badges de navigation dynamiques :\nHook useNavBadges() — polling 60s vers GET /api/nav/badges :\n{ leads_new, mail_unread, planning_today, invoices_overdue, studies_pending }\n• leads_new : leads en statut 'Nouveau' non traités depuis > 24h\n• mail_unread : messages non lus\n• planning_today : RDV du jour\n• invoices_overdue : factures en retard\n• studies_pending : études PV sans scénario financier créé\n\nBadge rouge si > 0, invisible si = 0. Afficher '9+' si > 9.", "success": "Le mot 'Mail' n'apparaît dans aucun label visible. Un commercial voit immédiatement combien de nouveaux leads et de RDV l'attendent sans naviguer dans chaque section.", "horizon": "LONG", "is_mvp": false, "is_enterprise": false, "tech_debt": "LOW", "rollback_needed": false, "risk": "Terminologie incohérente = confusion utilisateur + image non-professionnelle.", "status": "TODO", "phase_num": 13}, {"num": 51, "title": "Dashboard — KPIs PV en temps réel, graphiques et agenda du jour", "priority": "MAJEUR", "files": ["frontend/src/pages/Dashboard.tsx", "backend/domains/dashboard/router.js (nouveau)"], "desc": "Refondre le dashboard avec 4 zones adaptées au métier PV :\n\nZone 1 — KPIs du mois (cartes en haut) :\n• Leads entrants (vs mois précédent)\n• Devis envoyés (montant total €)\n• Taux de conversion leads → devis signés\n• CA facturé / CA encaissé\n• Puissance installée (kWc) — métrique métier PV unique\n\nZone 2 — Graphique pipeline (recharts) :\nRépartition leads par statut + évolution 30 jours.\n\nZone 3 — Planning du jour :\nRDV du jour (heure, client, adresse, lien Google Maps). Leads assignés sans activité depuis 7+ jours (alerte en rouge).\n\nZone 4 — Activité récente :\n5 derniers leads modifiés, 3 derniers devis envoyés.\n\nEndpoint GET /api/dashboard/stats : une requête SQL agrégée. Cache 5 minutes. Un COMMERCIAL voit ses propres stats, un ADMIN voit l'équipe entière.", "success": "En 5 secondes d'ouverture, un commercial sait où en sont ses leads, ses RDV et son CA. La puissance installée en kWc est visible directement depuis le dashboard.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans KPIs PV, le manager ne peut pas piloter la performance commerciale de son équipe.", "status": "TODO", "phase_num": 13}, {"num": 52, "title": "UX terrain — Mode mobile optimisé et PWA offline pour installateurs", "priority": "MAJEUR", "files": ["frontend/src/styles/solarnext-theme.css", "frontend/public/manifest.json (PWA)", "frontend/src/service-worker.ts (nouveau)", "frontend/src/components/mobile/"], "desc": "Les commerciaux utilisent SolarNext sur téléphone chez le prospect. Adaptations :\n\n1. Vue mobile Leads Kanban :\nBasculer vers vue liste triée par urgence sur écrans < 640px (scroll horizontal inconfortable sur mobile). Chaque item : nom client, statut, dernière activité, actions rapides.\n\n2. Formulaire de création de lead mobile :\nChamps obligatoires uniquement en première vue. Bouton 'Compléter plus tard'. Pré-remplissage adresse depuis géolocalisation GPS (permission demandée). Boutons d'action natifs : Appeler (tel:), SMS, Email, Itinéraire (maps:) — min 44×44px.\n\n3. PWA (Progressive Web App) :\nmanifest.json : name, short_name, icons (192px, 512px), theme_color, display: standalone. Service worker : cache des assets statiques et des derniers leads consultés. Offline : consultation des leads/devis en cache (lecture seule). Sync automatique des actions créées offline à la reconnexion.", "success": "Un commercial crée un lead depuis le parking d'un prospect en moins de 30 secondes sur téléphone. L'app fonctionne en consultation hors réseau (chantiers isolés).", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "UX non adaptée mobile = outil abandonné sur le terrain au profit de notes papier.", "status": "TODO", "phase_num": 13}, {"num": 53, "title": "Planning — Vue agenda, rappels automatiques et confirmation client", "priority": "MOYEN", "files": ["frontend/src/pages/planning/", "backend/domains/planning/router.js", "backend/workers/reminder.worker.js (nouveau)"], "desc": "Enrichir le module Planning :\n\n1. Vue agenda hebdomadaire/journalière :\nGrille horaire (type Google Calendar), créneaux 30 min. Couleurs par type de RDV (Prospection / Visite technique / Installation / SAV). Drag & drop pour déplacer.\n\n2. Rappels automatiques :\nWorker backend toutes les 15 minutes. Email au commercial : J-1 à 18h et J0 à 7h. Email au client (prospect) : J-1 avec détails et lien de confirmation.\n\n3. Lien de confirmation client :\nBouton 'Confirmer' / 'Demander un report' dans l'email. Mise à jour automatique du statut RDV. Notification au commercial en cas de report.\n\n4. Export iCal :\nURL d'abonnement calendrier (webcal://) pour synchronisation Google Calendar / Outlook / Apple Calendar.", "success": "Zéro RDV oublié par l'équipe. Le taux de no-show client diminue grâce aux rappels. Le planning SolarNext est visible dans Google Calendar sans export manuel.", "horizon": "LONG", "is_mvp": false, "is_enterprise": false, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans rappels automatiques, le taux de no-show client reste élevé.", "status": "TODO", "phase_num": 13}]}, {"num": 14, "title": "PHASE 14 — Performance Frontend & Scaling UI", "subtitle": "Une plateforme avec 3D, PDF, cartes, graphiques et moteur énergétique peut devenir extrêmement lourde", "score_before": "4/10", "score_after": "9/10", "requires": [2, 4, 13], "why": "SolarNext n'est pas une application web simple. Elle combine : rendu 3D WebGL (calpinage), graphiques recharts (production mensuelle, ROI), cartes (géolocalisation leads), génération PDF (Playwright), et un moteur de calcul énergétique. Sans optimisation frontend, cette combinaison produit une application qui rame sur les machines des commerciaux, plante sur les tablettes de chantier, et consomme 2 Go de RAM dans le navigateur. Cette phase rend SolarNext utilisable sur le matériel réel des installateurs solaires.", "steps": [{"num": 54, "title": "Code Splitting, React.lazy et Suspense — Chargement différé des modules lourds", "priority": "MAJEUR", "files": ["frontend/src/main.tsx", "frontend/src/router.tsx", "frontend/src/pages/ (tous les lazy imports)"], "desc": "Par défaut, Vite bundle toute l'application en un seul chunk. Avec les modules 3D et les graphiques, ce bundle peut dépasser 2 Mo.\n\nObjectif : le dashboard et le Kanban leads se chargent en moins de 2 secondes sans que le viewer 3D, les graphiques financiers ou l'éditeur de devis soient téléchargés.\n\nModules à lazy-loader en priorité :\n• SolarScene3DViewer et Inline3DViewerBridge (plus gros consumers)\n• QuoteBuilderPage et InvoiceBuilderPage\n• StudyDetail et ses sous-composants\n• Tous les onglets de LeadDetail (Phase 2 Step 10)\n• Les pages admin (PvCatalog, AuditLog, SuperAdmin)\n\nUtiliser React.lazy() + Suspense avec un fallback de chargement contextualisé :\n• Skeleton screens (pas de spinner générique) pour les vues de données\n• Overlay 'Chargement du viewer 3D...' pour le module calpinage\n\nAnalyser les chunks avec vite-bundle-visualizer avant et après : chaque module lazy doit former son propre chunk identifiable.", "success": "Le bundle initial (sans lazy modules) est inférieur à 400 Ko gzippé. Le viewer 3D ne se télécharge que quand l'utilisateur ouvre une étude PV.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Bundle > 2 Mo = temps de chargement inacceptable sur connexion 4G terrain.", "status": "TODO", "phase_num": 14}, {"num": 55, "title": "Virtualisation des listes et tableaux — Rendu performant sur grands volumes", "priority": "MAJEUR", "files": ["frontend/src/components/leads/LeadsListView.tsx", "frontend/src/pages/documents/", "frontend/src/pages/admin/AuditLog.tsx"], "desc": "Un installateur actif peut avoir 500+ leads, 1000+ documents et 10 000 entrées dans le journal d'audit. Rendre tous ces éléments dans le DOM simultanément provoque des gels de l'interface.\n\nInstaller @tanstack/virtual (react-virtual) et appliquer sur :\n• Vue liste des leads (LeadsListView) : rendu uniquement des lignes visibles + buffer\n• Liste des documents (Documents) : items visibles + 10 de chaque côté\n• Journal d'audit (AuditLog) : pagination virtuelle + scroll infini\n• Historique des mutations (Phase 3 mutation_log)\n\nPagination serveur obligatoire pour ces vues : ne jamais retourner plus de 50 éléments en une seule requête sans cursor. Le cursor-based pagination est plus performant que l'offset pour les grands volumes.\n\nTester avec un compte ayant 1000 leads : le scroll doit rester à 60 fps sur un laptop milieu de gamme.", "success": "Un compte avec 1000 leads charge la vue liste en moins de 500ms. Le scroll reste à 60 fps. Le DOM ne contient jamais plus de 100 items rendus simultanément.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "500+ leads rendus = gel interface sur les ordinateurs des commerciaux.", "status": "TODO", "phase_num": 14}, {"num": 56, "title": "Memoization et réduction des re-renders — React.memo, useMemo, useCallback", "priority": "MAJEUR", "files": ["frontend/src/components/ (composants critiques)", "frontend/src/hooks/ (hooks de données)"], "desc": "Identifier et corriger les re-renders inutiles avec React DevTools Profiler.\n\nCibles prioritaires (composants qui re-rendent le plus) :\n• LeadsKanbanView : chaque drag re-rend tout le board. Wrapper chaque colonne en React.memo(). Wrapper chaque carte en React.memo(). useMemo pour filtrer et trier les leads par colonne.\n\n• Dashboard KPIs : les cartes ne doivent pas re-rendre si les stats n'ont pas changé. React.memo + comparaison shallow des props.\n\n• LeadDetail onglets : chaque onglet ne doit re-rendre que si ses données changent. Isolation avec React.memo + TanStack Query (évite les re-fetches inutiles).\n\n• Viewer 3D : les callbacks passés en props (onPanelClick, onPolygonChange) doivent être stabilisés avec useCallback pour ne pas re-créer le scene graph.\n\nRègle : ne pas memoizer par défaut, mais seulement les composants identifiés comme bottleneck par le Profiler. Sur-mémoizer = dette de lisibilité.", "success": "Le Profiler React ne montre aucun composant se re-rendant plus de 3 fois lors d'un drag & drop d'une carte Kanban. Le viewer 3D ne recrée pas son scene graph à chaque render React.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Re-renders excessifs = interface qui rame lors des interactions Kanban.", "status": "TODO", "phase_num": 14}, {"num": 57, "title": "Optimisation du moteur 3D — Web Workers, OffscreenCanvas et LOD", "priority": "MAJEUR", "files": ["frontend/src/workers/geometryWorker.ts (nouveau)", "frontend/src/components/3d/SolarScene3DViewer.tsx", "frontend/src/components/3d/Inline3DViewerBridge.tsx"], "desc": "Le moteur 3D est le composant le plus coûteux de SolarNext. S'il bloque le thread principal, toute l'interface devient non-réactive.\n\n1. Web Worker géométrique (geometryWorker.ts) :\nDéplacer les calculs intensifs hors du thread principal :\n• Validation des polygones (Phase 4 Step 16)\n• Calcul des projections GPS → pixels\n• Pré-calcul des positions de panneaux\nCommunication via transferable objects (pas de serialisation JSON).\n\n2. OffscreenCanvas (si support navigateur) :\nDéléguer le rendu WebGL à un Web Worker. Fallback sur canvas normal si OffscreenCanvas non supporté.\n\n3. Level of Detail (LOD) :\n• Mode édition (interaction active) : géométrie complète, 60 fps\n• Mode navigation (caméra qui tourne) : mesh simplifié, 30 fps\n• Mode export PDF : qualité maximale, pas de contrainte fps\nSeuil d'alerte à 50 000 polygones dans le scene graph : afficher 'Scène complexe — performances réduites'.", "success": "Déplacer un panneau en vue 3D ne bloque pas le fil d'actualité. Le viewer 3D reste à 30+ fps sur un MacBook Air M1. Les calculs géométriques n'affectent pas la réactivité de l'UI.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Moteur 3D bloquant = toute l'interface se fige pendant les calculs géométriques.", "status": "TODO", "phase_num": 14}, {"num": 58, "title": "Bundle analysis, TanStack Query et monitoring performance continu", "priority": "MOYEN", "files": ["frontend/vite.config.ts", "frontend/src/lib/queryClient.ts", ".github/workflows/ci.yml (ajout Lighthouse CI)"], "desc": "1. Analyse du bundle :\nInstaller rollup-plugin-visualizer (vite-bundle-visualizer). Générer un rapport de taille par module à chaque build CI. Gate CI : si le bundle initial augmente de plus de 50 Ko gzippé, le build échoue avec le message 'Bundle size regression: +X Ko'. Identifier les dépendances non nécessaires (ex: lodash complet au lieu de lodash/get).\n\n2. TanStack Query — configuration du cache :\nstaleTime: 5 minutes pour les données statiques (catalogue produits, plans Stripe). staleTime: 30 secondes pour les données temps réel (leads, études). Partage de cache entre composants (évite les double-fetches). Invalidation précise au lieu de refetchAll après mutation.\n\n3. Lighthouse CI :\nExécuter Lighthouse sur les pages critiques à chaque PR. Seuils minimum : Performance ≥ 75, Accessibility ≥ 90, Best Practices ≥ 90. Alerter si le score Performance descend sous 70 sur mobile.", "success": "Le bundle initial ne dépasse pas 400 Ko gzippé. Lighthouse Performance ≥ 75 sur desktop, ≥ 60 sur mobile (acceptable avec le viewer 3D). Toute régression de bundle est détectée en CI.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans Lighthouse CI, les régressions de performance passent inaperçues jusqu'en production.", "status": "TODO", "phase_num": 14}]}, {"num": 15, "title": "PHASE 15 — Génération PDF & Fiabilité des Documents", "subtitle": "PDF robustes, cachés, limités et cohérents avec les snapshots contractuels", "score_before": "4/10", "score_after": "9/10", "requires": [3, 12, 14], "why": "La génération PDF dépend des snapshots immuables (Phase 3) pour la cohérence documentaire, des moteurs PV (Phases 4+5) pour les données, et de l'optimisation frontend (Phase 14) pour éviter les timeouts. Une panne PDF bloque tout le workflow commercial.", "steps": [{"num": 59, "title": "Génération PDF — File d'attente, pool Playwright, cache et protection OOM", "priority": "MAJEUR", "files": ["backend/services/pdfGeneration.service.js", "backend/workers/pdfQueue.worker.js (nouveau)"], "desc": "Problèmes actuels : Playwright consomme 1 Go+ par génération, pas de cache, PDF_RENDERER_BASE_URL non validé, un browser lancé par requête.\n\n1. Pool Playwright (2 contexts réutilisables) :\nMaintenir un pool de browser contexts pré-créés. Nettoyer chaque context après usage (clearCookies, clearStorage). Recréer un context si il a été utilisé > 50 fois (memory leak Chromium).\n\n2. File d'attente (p-queue, max 2 simultanés par instance) :\nLes requêtes supplémentaires attendent. Status 202 + endpoint de polling pour le frontend ('Votre document est en cours de génération...').\n\n3. Timeout strict : 30 secondes max (page.goto + page.pdf). Au-delà : 504 + log ERROR + alerte Sentry.\n\n4. Cache par snapshot hash (Phase 3 Step 14) :\nSi un PDF avec ce hash_snapshot existe en stockage, le retourner sans régénérer. Invalider uniquement si le template de rapport a changé.\n\n5. Validation au démarrage : PDF_RENDERER_BASE_URL validé par Phase 0 Step 2.", "success": "5 demandes de PDF simultanées ne plantent pas le serveur. Un devis identique est retourné en moins de 200ms depuis le cache. Le monitoring affiche la taille de la file d'attente en temps réel.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "5 PDFs simultanés plantent le serveur = indisponibilité en période de forte activité commerciale.", "status": "TODO", "phase_num": 15}]}, {"num": 16, "title": "PHASE 16 — Résilience & Protection Produit", "subtitle": "Backups, disaster recovery, archivage et protection contre les pertes de données irréversibles", "score_before": "2/10", "score_after": "9/10", "requires": [3, 7, 15], "why": "SolarNext stocke des données contractuelles, des études PV, des devis signés et des factures légalement requises. Une perte de données ou une impossibilité de restauration a des conséquences juridiques directes pour les installateurs clients. La résilience est une promesse implicite de tout SaaS.", "steps": [{"num": 60, "title": "Backups automatiques DB — Snapshots quotidiens, rétention et test de restauration", "priority": "CRITIQUE", "files": ["backend/scripts/backup.sh (nouveau)", "backend/scripts/restore-test.sh (nouveau)", ".github/workflows/backup-test.yml (nouveau)"], "desc": "Stratégie de backup en 3 niveaux :\n\n1. Backup continu (WAL archiving) :\nActiver pg_wal_archiving sur PostgreSQL. Archiver les WAL vers S3 (ou équivalent) en temps quasi-réel. Permet une restauration Point-In-Time Recovery (PITR) à la seconde près.\n\n2. Snapshots quotidiens :\npg_dump compressé (gzip ou zstd) chaque nuit à 3h. Rétention : 7 jours sur le serveur principal, 30 jours sur S3, 1 an pour les fins de mois.\nChiffrement AES-256 du backup avant upload (clé stockée dans un gestionnaire de secrets).\n\n3. Test de restauration automatique (hebdomadaire) :\nScript restore-test.sh : télécharger le dernier backup, le restaurer dans une DB temporelle, exécuter 5 requêtes de sanité (count leads, count quotes, intégrité FK), détruire la DB temporaire. CI hebdomadaire : si le test de restauration échoue, alerte immédiate. Un backup non testé n'est pas un backup.", "success": "Un test de restauration automatique s'exécute chaque semaine et confirme que le dernier backup est utilisable. RPO (Recovery Point Objective) < 1 heure grâce au WAL archiving.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "Un seul incident DB sans backup testé = perte définitive de toutes les études et devis clients.", "status": "TODO", "phase_num": 16}, {"num": 61, "title": "Disaster Recovery — Procédures, RTO/RPO et runbook d'incident", "priority": "CRITIQUE", "files": ["RUNBOOK.md (enrichir depuis Phase 1 Step 7)", "docs/disaster-recovery.md (nouveau)"], "desc": "Définir et documenter les procédures de récupération pour les incidents P0 :\n\nObjectifs à définir et mesurer :\n• RTO (Recovery Time Objective) : temps max acceptable pour restaurer le service. Cible : 4 heures pour un P0 (perte totale du serveur).\n• RPO (Recovery Point Objective) : perte de données max acceptable. Cible : 1 heure (grâce au WAL archiving).\n\nScénarios documentés dans disaster-recovery.md :\n• Scénario 1 — Corruption DB : PITR depuis WAL, procédure step-by-step\n• Scénario 2 — Perte totale serveur : restauration depuis snapshot S3 + nouveau VPS\n• Scénario 3 — Suppression accidentelle de données : soft delete (Phase 3) + corbeille\n• Scénario 4 — Bug de migration DB : rollback (Phase 1 Step 7)\n• Scénario 5 — Attaque ransomware : restauration depuis backup chiffré hors ligne\n\nExercice DR annuel : simuler le Scénario 2 en environnement de staging, mesurer le temps réel de restauration, mettre à jour les procédures.", "success": "En cas de perte totale du serveur de production, le service est restauré en moins de 4 heures. La procédure a été testée et validée au moins une fois par an.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": true, "risk": "Sans DR documenté, le RTO réel en cas de panne totale est de plusieurs jours.", "status": "TODO", "phase_num": 16}, {"num": 62, "title": "Archivage et conservation des documents critiques", "priority": "MAJEUR", "files": ["backend/workers/archival.worker.js (nouveau)", "backend/services/documentStorage.service.js"], "desc": "Les documents contractuels (devis signés, factures) ont des obligations légales de conservation :\n• Factures : 10 ans (obligation comptable et fiscale)\n• Devis signés : durée du contrat + 5 ans (prescription contractuelle)\n• Rapports d'étude PV : durée de garantie des équipements (jusqu'à 30 ans)\n\nArchitecture de stockage en 3 tiers :\n• Tier 1 (chaud) : S3 Standard — documents des 12 derniers mois, accès immédiat\n• Tier 2 (froid) : S3 Infrequent Access — documents 1-5 ans, accès en minutes\n• Tier 3 (glacier) : S3 Glacier — documents > 5 ans, accès en heures\n\nWorker d'archivage hebdomadaire :\nDéplacer automatiquement les documents vers le tier approprié selon leur âge. Ne jamais supprimer un document verrouillé (devis signé, facture émise) même si l'organisation a résilié son abonnement.\n\nIntégrité : recalculer le SHA-256 de chaque document archivé lors du déplacement et comparer avec le hash stocké en DB (Phase 3 Step 14).", "success": "Un devis signé il y a 8 ans est toujours téléchargeable depuis le CRM. Le hash du fichier est identique à celui stocké le jour de la signature.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Factures de > 5 ans non archivées = non-conformité comptable et fiscale.", "status": "TODO", "phase_num": 16}, {"num": 63, "title": "Redondance stockage fichiers et monitoring d'intégrité", "priority": "MAJEUR", "files": ["backend/services/documentStorage.service.js", "backend/workers/integrityCheck.worker.js (nouveau)"], "desc": "S3 ou équivalent offre une durabilité de 11 nines (99,999999999%), mais des erreurs de manipulation côté application peuvent corrompre les fichiers.\n\nProtections supplémentaires :\n1. Versioning S3 : activer S3 Object Versioning. Chaque upload crée une nouvelle version, les versions précédentes sont conservées 30 jours. Protection contre les écrasements accidentels.\n\n2. Réplication cross-région : configurer S3 Cross-Region Replication vers un bucket dans une région différente. Protection contre une panne complète d'une région AWS.\n\n3. Worker d'intégrité mensuel :\nSélectionner 5% des fichiers au hasard. Télécharger et recalculer leur SHA-256. Comparer avec le hash en DB. Logger les fichiers dont le hash ne correspond pas. Alerter immédiatement si un fichier verrouillé (devis signé, facture) est altéré.\n\n4. Monitoring stockage :\nAlerte si l'espace total dépasse 80% du quota. Rapport mensuel : volume total, croissance, coût S3 estimé par organisation.", "success": "Un fichier altéré sur S3 est détecté dans les 30 jours par le worker d'intégrité. La réplication cross-région protège les données en cas de panne AWS régionale.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Fichier altéré sur S3 non détecté = document contractuel corrompu servi au client.", "status": "TODO", "phase_num": 16}, {"num": 64, "title": "Stratégie d'incidents — Niveaux P0-P3, communication et post-mortem", "priority": "MOYEN", "files": ["docs/incident-management.md (nouveau)", "frontend/src/pages/StatusPage.tsx (nouveau ou lien externe)"], "desc": "Définir un processus d'incidents formel avant la mise en vente :\n\nNiveaux d'incidents :\n• P0 : plateforme totalement indisponible, données potentiellement perdues → réponse < 15 min\n• P1 : feature critique indisponible (PDF, devis, études PV) → réponse < 1h\n• P2 : dégradation de performance ou feature secondaire cassée → réponse < 4h\n• P3 : bug mineur, cosmétique → traité dans le prochain sprint\n\nCommunication client :\nPage de statut publique (statuspage.io ou équivalent) mise à jour lors de chaque P0/P1. Email automatique aux administrateurs des organisations affectées lors d'un P0.\n\nPost-mortem obligatoire après tout P0 ou P1 :\nTemplate : chronologie, causes racine (5 pourquoi), impact (durée × utilisateurs), actions correctives avec responsable et deadline. Publié en interne dans les 48h. Résumé non-technique envoyé aux clients affectés dans les 72h.", "success": "Lors du premier P0 en production, l'équipe sait exactement quoi faire en moins de 5 minutes grâce aux procédures documentées. Un post-mortem est publié dans les 48h.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans processus incident, un P0 provoque la panique et une communication client désastreuse.", "status": "TODO", "phase_num": 16}]}, {"num": 17, "title": "PHASE 17 — Features Métier Complémentaires", "subtitle": "Couvrir 100% du cycle de vie d'un projet solaire de A à Z", "score_before": "5/10", "score_after": "8/10", "requires": [3, 12, 13, 15], "why": "Un installateur gère ses projets de la prospection à la maintenance. Chaque module manquant force l'équipe à sortir de SolarNext, fragmentant les données et dégradant l'expérience. Ces étapes s'appuient sur l'intégrité documentaire (Phase 3) et les moteurs PV (Phases 4+5).", "steps": [{"num": 65, "title": "Documents — Versioning, prévisualisation et partage sécurisé", "priority": "MOYEN", "files": ["frontend/src/pages/documents/", "backend/domains/documents/router.js"], "desc": "1. Versioning :\nConserver toutes les versions d'un document (V1, V2...). Historique : version, date, auteur, taille, commentaire. Restaurer une version antérieure. Cohérence avec Phase 3 : les documents verrouillés (devis signé, rapport d'étude signé) ne peuvent pas être écrasés — toute mise à jour crée une nouvelle version.\n\n2. Prévisualisation in-app :\nPDF : iframe ou Mozilla PDF.js (sans téléchargement). Images (jpg, png) : lightbox. Autres formats : bouton téléchargement uniquement.\n\n3. Partage sécurisé :\nLien temporaire avec expiration (24h / 7j / 30j / permanent). Protection mot de passe optionnelle. Compteur de téléchargements. Révocation instantanée. Sans compte SolarNext requis pour le destinataire.\n\n4. Recherche :\nIndexer noms, tags, métadonnées. Résultats filtrables par lead, type, date.", "success": "Un document contractuel ne peut jamais être perdu grâce au versioning. Un devis verrouillé ne peut pas être écrasé silencieusement.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Versioning documents absent = écrasement accidentel d'un rapport d'étude validé.", "status": "TODO", "phase_num": 17}, {"num": 66, "title": "Portail Client — Suivi de projet, messagerie bidirectionnelle et NPS", "priority": "MOYEN", "files": ["frontend/src/pages/client-portal/", "backend/domains/clientPortal/router.js"], "desc": "Portail accessible via token (/client-portal/:token) — sans compte SolarNext :\n\n1. Timeline de projet : Prospect → Étude → Devis → Accepté → Installation → Mise en service → SAV. Dates réelles passées, estimées futures.\n\n2. Messagerie asynchrone :\nLe client envoie un message depuis le portail → arrive dans la Messagerie SolarNext du commercial. La réponse est visible dans le portail + email au client.\n\n3. Espace documents partagés :\nUniquement les documents explicitement partagés par l'installateur (intégrité garantie par Phase 3 — hash vérifié à chaque accès).\n\n4. NPS post-installation :\n7 jours après mise en service : formulaire NPS (0-10) + commentaire libre. Résultats dans le tableau admin SolarNext. Export pour identifier promoteurs et détracteurs.", "success": "Le client suit l'avancement de son installation en temps réel sans appeler le commercial. Le NPS est mesuré systématiquement et disponible dans le dashboard admin.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans portail client, chaque demande de suivi passe par téléphone → surcharge du commercial.", "status": "TODO", "phase_num": 17}, {"num": 67, "title": "Hub Financier — Analytics PV, export comptable et relances automatiques", "priority": "MOYEN", "files": ["frontend/src/pages/finance/", "backend/domains/invoices/router.js", "backend/workers/invoiceReminder.worker.js (nouveau)"], "desc": "Analytics financiers spécifiques PV :\n• CA par type de projet (résidentiel / tertiaire / agricole)\n• CA par puissance installée (kWc moyen, CA/kWc)\n• CA par commercial\n• DSO (délai moyen paiement)\n• Pipeline prévisionnel : devis en cours × taux de conversion historique\n\nExport comptable CSV/Excel :\nDate, numéro facture, client, SIRET, description, HT, TVA (taux + montant), TTC, statut, date paiement. Compatible Sage, EBP, Cegid.\n\nRelances automatiques :\nWorker quotidien. Email J+7, J+15, J+30 après échéance. Template personnalisable. Bouton 'Ne plus relancer' par facture. Historique des relances sur chaque facture.\n\nCohérence avec Phase 3 : les montants des rapports financiers sont lus depuis les snapshots verrouillés, jamais recalculés.", "success": "Zéro saisie manuelle pour le comptable. Le DSO est mesuré et affiché. Les relances d'impayés partent automatiquement sans intervention.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Export comptable absent = saisie manuelle par le comptable → erreurs et temps perdu.", "status": "TODO", "phase_num": 17}, {"num": 68, "title": "Super Admin — Dashboard multi-organisations et métriques SaaS", "priority": "MOYEN", "files": ["frontend/src/pages/admin/SuperAdmin.tsx", "backend/domains/superadmin/router.js"], "desc": "Enrichir /admin (SUPER_ADMIN uniquement) :\n\n1. Vue globale organisations :\nStatut abonnement, utilisateurs actifs, dernière activité, MRR par org, nombre de leads/études/devis.\n\n2. Métriques SaaS :\n• MRR total et évolution\n• Churn rate\n• New signups / semaine\n• Taux de conversion essai → payant\n• DAU / MAU\n• Temps médian génération PDF (P50, P95)\n• Temps médian calcul shading (P50, P95)\n\n3. Actions super admin :\n• Créer une organisation via UI (remplace définitivement le script CLI)\n• Impersonner (log dans journal d'audit — Phase 11 Step 45)\n• Suspendre / réactiver une organisation (accès bloqué, données conservées, backups maintenus — Phase 16)\n• Notification broadcast à toutes les organisations (page de maintenance planifiée)", "success": "Le fondateur suit MRR, churn et inscriptions en temps réel sans requête SQL. Le temps de calcul shading P95 est visible pour détecter les dégradations de performance moteur.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans métriques SaaS, impossible de piloter la croissance et le churn du produit.", "status": "TODO", "phase_num": 17}]}, {"num": 18, "title": "PHASE 18 — Conformité Légale & Go-to-Market", "subtitle": "Les prérequis légaux, commerciaux et documentaires pour un lancement en production", "score_before": "3/10", "score_after": "9/10", "requires": [3, 10, 16, 17], "why": "Sans CGU, RGPD, landing page et documentation, SolarNext ne peut pas être vendu légalement ni marketé. Ces éléments dépendent de la Phase 3 (immuabilité des données, export RGPD) et de la Phase 16 (résilience pour les SLA annoncés).", "steps": [{"num": 69, "title": "Conformité RGPD — CGU, Politique de confidentialité, DPA et droits utilisateurs", "priority": "CRITIQUE", "files": ["frontend/src/pages/legal/ (nouveau)", "backend/domains/gdpr/router.js (nouveau)"], "desc": "SolarNext traite des données personnelles de clients finaux (coordonnées, consommation électrique, données techniques du logement). La conformité RGPD est une obligation légale.\n\nDocuments à rédiger (avec juriste spécialisé SaaS) :\n• CGU : droits et obligations des parties, conditions d'utilisation\n• Politique de confidentialité : données collectées, durée de conservation, droits RGPD\n• DPA (Data Processing Agreement) : accord de sous-traitance pour les clients enterprise\n\nConsentement à l'inscription : case obligatoire non pré-cochée. Stocker : user_id, cgu_version, accepted_at.\n\nDroits RGPD à implémenter (s'appuie sur Phase 3 Step 13 — suppression contrôlée) :\n• GET /api/gdpr/export → ZIP contenant toutes les données personnelles de l'utilisateur\n• POST /api/gdpr/delete → anonymisation (nom → [SUPPRIMÉ], email → deleted@...), conservation des données comptables 10 ans (obligation légale)\n• GET /api/gdpr/portability → CSV de ses leads et documents\n\nVérifier DPA de tous les sous-traitants : Stripe, hébergeur, Sentry, PVGIS API.", "success": "SolarNext est conforme RGPD. L'export de données personnelles s'exécute en moins de 24h. Le droit à l'oubli préserve les données comptables légalement requises.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "Non-conformité RGPD = amende CNIL jusqu'à 4% du CA mondial + perte de confiance client.", "status": "TODO", "phase_num": 18}, {"num": 70, "title": "Landing Page — Positionnée plateforme PV enterprise, pas CRM générique", "priority": "MAJEUR", "files": ["frontend/src/pages/public/ (ou site statique Next.js/Astro séparé)"], "desc": "La landing page doit refléter que SolarNext est une plateforme spécialisée PV, pas un CRM parmi d'autres.\n\nSection 1 — Hero :\n'La plateforme de gestion pour les installateurs photovoltaïques professionnels.' CTA : 'Essayer 14 jours gratuitement →'. Screenshot ou GIF : Kanban leads + étude PV + devis PDF en 10 secondes.\n\nSection 2 — Problèmes spécifiques PV :\n'Vos devis prennent 3h sur Excel.' 'Vos calculs de production ne sont pas fiables.' 'Vous perdez des leads en période de forte demande.'\n\nSection 3 — Fonctionnalités PV (6 cartes) :\nCalpinage 3D • Moteur de production PVGIS • Devis PDF automatisés • Simulation ROI/TRI • Portail client • Facturation\n\nSection 4 — Tarification (3 plans). Section 5 — FAQ. Section 6 — Footer légal.\n\nSEO : balises meta OG, sitemap.xml, Core Web Vitals ≥ 90 (s'appuie sur Phase 14).", "success": "Un installateur solaire qui lit la landing page comprend immédiatement que SolarNext est fait pour lui, pas pour n'importe quel commercial.", "horizon": "LONG", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Landing page générique = faible taux de conversion, positionnement CRM générique.", "status": "TODO", "phase_num": 18}, {"num": 71, "title": "Documentation utilisateur et aide contextuelle in-app", "priority": "MOYEN", "files": ["docs/ (Docusaurus sur docs.solarnext.fr)", "frontend/src/components/HelpPanel.tsx (nouveau)"], "desc": "Documentation externe minimale (Docusaurus) :\n• Démarrage rapide : premier lead → estimation PV → devis (< 5 min)\n• Guide par module : Leads, Calpinage, Études PV, Devis, Facturation, Planning, Messagerie\n• Guide des calculs PV : comment les productions sont calculées, sources des données (PVGIS)\n• Guide RGE et mentions légales dans les documents générés\n• FAQ : questions des installateurs\n• Changelog : par version avec captures d'écran\n\nAide contextuelle in-app :\n• Icônes '?' sur les champs complexes (ex: 'Performance Ratio : rapport production réelle / production théorique. Défaut : 86%')\n• Panneau d'aide latéral : documentation de la page courante sans quitter l'app\n• Coach marks (bulles) pour les features clés : affichés une fois, stockés dans user_preferences\n\nNote sur l'IA : un chatbot d'aide contextuel (Crisp, Intercom) peut répondre aux questions sans intervention humaine — reportable si le budget ne le permet pas initialement.", "success": "80% des questions fréquentes trouvent une réponse dans la documentation sans contacter le support. La documentation des calculs PV renforce la confiance dans les chiffres.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans documentation, le taux de churn J30 reste élevé malgré un bon onboarding.", "status": "TODO", "phase_num": 18}, {"num": 72, "title": "Processus de release — Versioning sémantique, changelog et page 'Quoi de neuf'", "priority": "MOYEN", "files": ["CHANGELOG.md", "frontend/src/components/WhatsNew.tsx (nouveau)"], "desc": "Processus de release structuré qui renforce la confiance des clients :\n\n1. Versioning sémantique (semver MAJOR.MINOR.PATCH) :\nMAJOR : changements incompatibles (ex: schéma financier breaking). MINOR : nouvelles fonctionnalités rétrocompatibles. PATCH : corrections de bugs.\n\n2. CHANGELOG.md (format Keep a Changelog) :\nSection Added / Changed / Fixed / Deprecated / Security pour chaque release. Lien depuis la page 'Nouveautés' dans l'app.\n\n3. Composant WhatsNew (in-app) :\nAu premier login après une mise à jour : modal avec les 3 dernières nouveautés (titre + screenshot + description courte). Affiché une seule fois par version, stocké dans user_preferences { last_seen_version }.\n\n4. Roadmap publique :\nPage Notion ou Canny listant les features En cours / Planifiées / Sous évaluation. Les clients votent pour les prochaines features. Cela génère de l'engagement et guide les priorités produit.", "success": "Chaque client sait exactement ce qui a changé à chaque mise à jour. La roadmap publique génère des retours clients qui alimentent les prochains sprints.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans processus de release, les clients découvrent les changements par accident.", "status": "TODO", "phase_num": 18}, {"num": 73, "title": "Tableau de bord de santé de la plateforme — Vue systémique pour le CTO", "priority": "MOYEN", "files": ["frontend/src/pages/admin/PlatformHealth.tsx (nouveau)", "backend/domains/superadmin/router.js"], "desc": "Vue de synthèse accessible uniquement au SUPER_ADMIN : l'état de santé de toute la plateforme en une page.\n\nStatuts en temps réel (depuis /api/health/ready — Phase 7 Step 30) :\n• Database : latence, connexions actives\n• PDF Renderer : queue size, dernière génération réussie\n• PVGIS API : disponible / dégradé / indisponible\n• Mail : connexion IMAP/SMTP\n\nMétriques des moteurs PV (dernières 24h) :\n• Calculs shading exécutés, P50/P95 durée, erreurs\n• Calculs financiers exécutés, P50/P95 durée, erreurs\n• Tentatives de recalcul sur scénarios verrouillés (doit être 0)\n\nSanté de la résilience :\n• Dernier backup réussi : horodatage\n• Dernier test de restauration : date + résultat\n• Utilisation stockage S3 : total + croissance hebdomadaire\n• Documents dont le hash ne correspond plus (doit être 0)\n\nTout écart par rapport à la normale est affiché en rouge et lie vers la procédure d'incident correspondante (Phase 16 Step 64).", "success": "Le CTO voit en 10 secondes si la plateforme est saine. Zéro tentative de recalcul sur scénario verrouillé. Le dernier test de restauration est daté de moins de 7 jours.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "CTO sans visibilité système = réagit aux incidents au lieu de les anticiper.", "status": "TODO", "phase_num": 18}]}, {"num": 19, "title": "PHASE 19 — Multi-Tenant Hardening", "subtitle": "Isolation stricte des données par organisation — SaaS enterprise-grade multi-org", "score_before": "3/10", "score_after": "9/10", "requires": [2, 8, 10], "why": "SolarNext est un SaaS multi-tenant : plusieurs organisations installateurs coexistent sur la même instance. Sans isolation stricte, une faille dans la logique d'accès peut exposer les données d'une organisation à une autre. Une fuite de devis ou d'études PV entre installateurs concurrents est une faute grave avec des conséquences juridiques et commerciales immédiates. Cette phase implémente l'isolation au niveau de la base de données (Row-Level Security), du middleware applicatif, des quotas et des index — pas uniquement au niveau du code applicatif.", "steps": [{"num": 74, "title": "Row-Level Security PostgreSQL — Isolation garantie au niveau base de données", "priority": "CRITIQUE", "files": ["backend/db/migrations/ (activation RLS sur leads, studies, quotes, invoices, documents)", "backend/db/rls-policies.sql (nouveau)", "backend/db/seeds/test-rls.sql (tests d'isolation)"], "desc": "Activer PostgreSQL Row-Level Security (RLS) sur toutes les tables contenant des données organisation-spécifiques.\n\nTables concernées : leads, studies, quotes, invoices, documents, appointments, financial_scenarios, study_geometries, mutation_log, audit_logs.\n\nPolitique RLS type :\nALTER TABLE leads ENABLE ROW LEVEL SECURITY;\nCREATE POLICY leads_org_isolation ON leads\n  USING (organization_id = current_setting('app.current_org_id')::uuid);\n\nLe middleware backend pose current_setting('app.current_org_id') sur chaque connexion DB en début de requête.\n\nTests d'isolation automatisés :\n• Créer 2 organisations A et B avec données distinctes\n• Connecter avec le token de l'org A\n• Vérifier que SELECT sur leads retourne 0 lignes de l'org B\n• Vérifier qu'un UPDATE sur un lead de l'org B retourne 0 rows affected\nCes tests font partie de la suite CI (Phase 6).\n\nNote : RLS est un filet de sécurité. Il ne remplace pas la validation organization_id au niveau applicatif, mais la rend incontournable au niveau DB.", "success": "Même en cas de bug applicatif oubliant de filtrer par organization_id, PostgreSQL garantit qu'aucune donnée d'une organisation n'est lisible ou modifiable par une autre. Les tests d'isolation passent en CI.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 19}, {"num": 75, "title": "Middleware tenant-aware — Validation organization_id sur toutes les mutations", "priority": "CRITIQUE", "files": ["backend/middleware/tenantGuard.middleware.js (nouveau)", "backend/domains/*/router.js (tous — ajout du middleware)", "backend/middleware/tenantContext.middleware.js (nouveau)"], "desc": "Deux middlewares complémentaires pour l'isolation applicative :\n\n1. tenantContext — positionné au début de chaque requête authentifiée :\nExtrait l'organizationId depuis le JWT validé.\nPose req.tenantId et current_setting DB en une fois.\nToute requête sans tenantId résolu → 403 immédiat.\n\n2. tenantGuard(resource) — positionné avant chaque opération sensible :\nAvant UPDATE/DELETE, charger l'enregistrement et vérifier que resource.organization_id === req.tenantId.\nSi différent → 403 'Accès non autorisé à cette ressource'.\nLogger la tentative dans audit_log avec sévérité HIGH.\n\nPattern d'utilisation :\nrouter.put('/:id', auth, tenantGuard('leads'), controller.update)\n\nTests obligatoires :\n• Token org A + ID d'un lead org B → 403\n• Token org A + ID d'un lead org A → 200\n• Token sans organization → 403\nCes tests sont des E2E critiques (Phase 6 Step 27).", "success": "Il est impossible de modifier ou supprimer une ressource appartenant à une autre organisation, même avec un token valide. Chaque tentative est loggée.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 19}, {"num": 76, "title": "Quotas par organisation — Limites de ressources et protection contre les abus", "priority": "MAJEUR", "files": ["backend/config/plans.config.js (enrichir depuis Phase 10 Step 41)", "backend/middleware/quotaGuard.middleware.js (nouveau)", "backend/domains/organizations/quota.service.js (nouveau)"], "desc": "Les quotas protègent toutes les organisations contre les abus d'une seule.\n\nQuotas à implémenter par organisation :\n• Leads actifs : max selon plan (Starter: 50, Pro: illimité)\n• Études PV actives simultanément : max 100 (Starter: 10)\n• Utilisateurs membres : selon plan\n• Stockage documents S3 : selon plan (GB)\n• Requêtes calcul shading / heure : 50 (tous plans)\n• Requêtes calcul financier / heure : 100 (tous plans)\n• Générations PDF / heure : 20 (Starter: 5)\n\nquotaGuard(resource, action) middleware :\nVérifie le quota courant de l'organisation avant d'autoriser l'action.\nSi dépassé → 429 { error: 'QUOTA_EXCEEDED', resource: 'studies', current: 10, max: 10, upgradeUrl: '...' }\n\nDashboard quotas (admin org) :\nBarres de progression en temps réel. Alerte email à 80% du quota atteint. Alerte à 100% avec lien d'upgrade plan.", "success": "Une organisation Starter ne peut pas créer plus de 10 études actives. Une organisation abusant de l'API shading ne peut pas dégrader les performances des autres.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 19}, {"num": 77, "title": "Index multi-tenant et optimisation des requêtes cross-org", "priority": "MAJEUR", "files": ["backend/db/migrations/ (index composites organization_id + ...)", "backend/db/migrations/ (index partiels sur deleted_at IS NULL)"], "desc": "Sans index adaptés au multi-tenant, chaque requête filtrée par organization_id fait un seq scan sur toute la table.\n\nIndex composites à créer :\n• leads : (organization_id, status, created_at DESC)\n• leads : (organization_id, assigned_to, status)\n• studies : (organization_id, lead_id, created_at DESC)\n• quotes : (organization_id, status, created_at DESC)\n• invoices : (organization_id, status, due_date)\n• documents : (organization_id, lead_id, created_at DESC)\n• financial_scenarios : (study_id, version) + (organization_id via JOIN)\n• mutation_log : (organization_id, table_name, created_at DESC)\n\nIndex partiels (PostgreSQL partial indexes) :\n• leads WHERE deleted_at IS NULL (évite de filtrer les soft-deleted à chaque requête)\n• quotes WHERE locked_at IS NULL (devis modifiables uniquement)\n\nValidation : EXPLAIN ANALYZE sur chaque requête critique après ajout des index. Objectif : Seq Scan éliminé sur les tables > 1000 lignes.\n\nMonitoring continu : pg_stat_user_indexes dans le dashboard santé (Phase 18 Step 73).", "success": "Une requête 'liste des leads actifs d'une organisation avec 500 leads' s'exécute en moins de 5ms. Aucun Seq Scan sur les tables principales en production.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 19}, {"num": 78, "title": "Audit isolation et détection des anomalies cross-org", "priority": "MAJEUR", "files": ["backend/workers/tenantAnomalyDetector.worker.js (nouveau)", "backend/services/auditLog.service.js (enrichir Phase 11 Step 45)"], "desc": "Même avec RLS et tenantGuard, des anomalies d'accès doivent être détectées.\n\nÉvénements à logguer comme SUSPICIOUS dans audit_log :\n• Tentative d'accès à une ressource d'une autre org (même si bloquée par RLS)\n• Paramètre organization_id modifié dans le body d'une requête\n• Requête contenant des IDs d'une autre org dans le payload\n• Rate limit org dépassé + pattern suspect (scraping)\n\nWorker d'analyse hebdomadaire :\n• Compter les tentatives SUSPICIOUS par organisation et par utilisateur\n• Si > 10 tentatives SUSPICIOUS en 24h par un utilisateur → alert SUPER_ADMIN\n• Rapport d'isolation mensuel : 0 fuite confirmée = OK\n\nDashboard SUPER_ADMIN :\nCarte 'Isolation multi-tenant' avec :\n• Tentatives cross-org bloquées cette semaine\n• Dernière vérification RLS : date du dernier test CI passé\n• Organizations avec le plus de tentatives suspectes", "success": "Chaque tentative d'accès cross-org est loggée et visible dans le dashboard SUPER_ADMIN. Une anomalie de plus de 10 tentatives par jour déclenche une alerte automatique.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 19}]}, {"num": 20, "title": "PHASE 20 — Workers & Architecture Asynchrone", "subtitle": "Les calculs lourds ne doivent jamais bloquer le thread Node.js principal", "score_before": "2/10", "score_after": "9/10", "requires": [2, 6, 7], "why": "SolarNext effectue des calculs intensifs qui ne peuvent pas bloquer le thread Node.js : le shading 8760h peut prendre plusieurs secondes, la génération PDF consomme 1 Go de RAM, les simulations financières sont computationnellement coûteuses. Si ces traitements s'exécutent dans le thread principal, toute l'API devient non-réactive pendant les calculs — les autres utilisateurs de la plateforme subissent les latences d'une seule étude PV. BullMQ + Redis implémente une architecture de queues avec workers dédiés, retry intelligent, dead-letter queues et monitoring de la santé des jobs.", "steps": [{"num": 79, "title": "Infrastructure BullMQ + Redis — Architecture de queues principale", "priority": "CRITIQUE", "files": ["backend/queues/index.js (nouveau — registre de toutes les queues)", "backend/queues/shadingQueue.js (nouveau)", "backend/queues/pdfQueue.js (nouveau)", "backend/queues/mailQueue.js (nouveau)", "backend/queues/exportQueue.js (nouveau)", "docker-compose.yml (ajout Redis)"], "desc": "Installer bullmq + ioredis. Configurer Redis (docker-compose en dev, Redis Cloud ou ElastiCache en production).\n\nQueues à créer avec leurs paramètres :\n• shadingQueue : concurrency 2, priority (HIGH pour plan Pro), removeOnComplete 100, removeOnFail 50\n• pdfQueue : concurrency 2, timeout 45s, attempts 2, backoff { type: 'fixed', delay: 5000 }\n• mailQueue : concurrency 5, attempts 3, backoff { type: 'exponential', delay: 2000 }\n• exportQueue : concurrency 1, timeout 120s (exports complets)\n• reminderQueue : concurrency 3 (rappels RDV et relances factures)\n\nPattern de soumission standardisé :\nconst job = await shadingQueue.add('compute', { studyId, geometryVersion }, { priority: plan === 'pro' ? 1 : 10, jobId: `shading-${studyId}-${geometryVersion}` })\n\njobId idempotent : soumettre le même job deux fois ne crée pas de doublon.\n\nVariables d'environnement ajoutées à la validation Phase 0 Step 2 :\nREDIS_URL (obligatoire en production).", "success": "Un calcul shading soumis à la queue n'est pas relancé si soumis deux fois avec le même jobId. Redis est visible dans le health check /api/health/ready.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 20}, {"num": 80, "title": "Workers PDF et shading — Traitement hors thread principal", "priority": "CRITIQUE", "files": ["backend/workers/shadingWorker.js (nouveau)", "backend/workers/pdfWorker.js (nouveau)", "backend/domains/studies/geometry/shading.service.js (adapter pour worker)"], "desc": "Deux workers critiques à implémenter :\n\nshadingWorker.js :\nTraite les jobs de la shadingQueue.\nExécute shading.service.js (Phase 4 Step 18) dans le contexte du worker.\nProgression en temps réel : job.updateProgress(percentage) toutes les 100 heures calculées.\nLe frontend peut poller GET /api/jobs/:jobId/progress pour afficher une barre de progression.\nEn cas d'erreur : log structuré avec studyId + engine_version + stack trace → Sentry.\n\npdfWorker.js :\nTraite les jobs de la pdfQueue.\nGère le pool Playwright (Phase 15 Step 59) dans le worker.\nStocke le PDF généré en S3 et met à jour documents.file_hash.\nNotifie le frontend via Server-Sent Events (SSE) ou WebSocket quand le PDF est prêt.\n\nPattern de notification frontend :\n1. POST /api/studies/:id/pdf → { jobId, status: 'queued' }\n2. GET /api/jobs/:jobId → { status: 'processing', progress: 45 }\n3. SSE event 'pdf-ready' → { url: '...', hash: '...' }\n\nLes workers redémarrent automatiquement via PM2 ou les politiques Kubernetes en cas de crash.", "success": "Lancer 5 calculs shading simultanément n'affecte pas la latence de l'API REST. La barre de progression du shading avance en temps réel dans le frontend.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 20}, {"num": 81, "title": "Workers mail, relances et exports — Traitements non-urgents découplés", "priority": "MAJEUR", "files": ["backend/workers/mailWorker.js (nouveau)", "backend/workers/reminderWorker.js (nouveau)", "backend/workers/exportWorker.js (nouveau)", "backend/domains/planning/router.js (refactor rappels vers reminderQueue)"], "desc": "Trois workers pour les traitements non-urgents :\n\nmailWorker.js :\nConsomme mailQueue. Gère nodemailer / SMTP.\nRetry exponentiel : 2s, 4s, 8s sur erreur SMTP transitoire.\nDead-letter si 3 échecs : alerter SUPER_ADMIN avec détail de l'erreur.\nNe jamais perdre un email de confirmation de devis signé (priorité HIGH).\n\nreminderWorker.js :\nConsomme reminderQueue. Déclenché par un cron BullMQ toutes les 15 minutes.\nGère : rappels RDV (Phase 13 Step 53), relances factures (Phase 17 Step 67),\nalertes expiration essai Stripe, alertes quota à 80%.\nIdempotent : vérifier que le rappel n'a pas déjà été envoyé (colonne reminder_sent_at).\n\nexportWorker.js :\nExports lourds : export CSV leads, export comptable, export RGPD (Phase 18 Step 69).\nCes exports peuvent prendre 30-60s sur de gros comptes.\nPattern : soumission → email 'votre export est prêt' avec lien de téléchargement.\nFichier d'export stocké 24h en S3 puis supprimé automatiquement.", "success": "Envoyer un email de relance de facture n'affecte pas la latence de l'API. Un export CSV de 1000 leads ne bloque pas le serveur. Les rappels RDV partent à l'heure exacte.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 20}, {"num": 82, "title": "Dead-letter queues, retry strategy et jobs idempotents", "priority": "MAJEUR", "files": ["backend/queues/deadLetterQueue.js (nouveau)", "backend/workers/dlqProcessor.js (nouveau)", "backend/domains/superadmin/router.js (ajout dashboard jobs)"], "desc": "Stratégie de retry et de dead-letter pour la résilience des jobs :\n\nRetry strategy par type de job :\n• shadingQueue : 2 tentatives, backoff fixed 10s (calcul déterministe — même résultat à chaque fois)\n• pdfQueue : 2 tentatives, backoff fixed 5s (timeout Playwright transitoire)\n• mailQueue : 3 tentatives, backoff exponentiel 2s/4s/8s (SMTP flaky)\n• exportQueue : 1 tentative (pas de retry, l'export doit être relancé manuellement)\n\nDead-letter queue (DLQ) :\nAprès N échecs, le job est déplacé dans deadLetterQueue.\nLe SUPER_ADMIN voit la DLQ dans le dashboard jobs.\nActions disponibles : retry manuel, inspecter l'erreur, ignorer.\nAlerte email si un job de priorité HIGH atterrit en DLQ.\n\nIdempotence des jobs :\nChaque worker vérifie l'état actuel avant d'agir.\nExemple : shadingWorker vérifie que study.geometry_version correspond au job avant de lancer le calcul (évite de recalculer si la géométrie a changé entre-temps).\n\nDashboard jobs (Super Admin) :\n• Queues actives avec taille et lag\n• Jobs en cours avec progression\n• DLQ avec détail des erreurs\n• Taux d'erreur par type de job (dernières 24h)", "success": "Un job PDF qui échoue 2 fois arrive en DLQ avec l'erreur complète. Le SUPER_ADMIN peut le réessayer manuellement sans redéploiement. Le taux d'erreur par queue est visible en temps réel.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 20}, {"num": 83, "title": "Monitoring des workers et alertes de santé des queues", "priority": "MAJEUR", "files": ["backend/domains/health/router.js (enrichir Phase 7 Step 30)", "backend/metrics/queues.metrics.js (nouveau)", "frontend/src/pages/admin/PlatformHealth.tsx (enrichir Phase 18 Step 73)"], "desc": "Les queues doivent être monitorées comme les autres dépendances critiques.\n\nMétriques Prometheus exposées (GET /api/metrics) :\n• solarnext_queue_size{queue='shading'} — jobs en attente\n• solarnext_queue_lag_seconds{queue='shading'} — délai entre soumission et traitement\n• solarnext_job_duration_seconds{queue,status} — durée des jobs (histogram)\n• solarnext_job_failures_total{queue} — counter des échecs\n• solarnext_dlq_size{queue} — taille de la dead-letter queue\n\nAlertes automatiques :\n• shadingQueue lag > 60s → alerte (calcul en attente > 1 min = UX dégradée)\n• pdfQueue lag > 30s → alerte\n• DLQ shadingQueue > 0 → alerte immédiate (calcul perdu)\n• Worker down (heartbeat absent) → alerte P1\n\nHealth check enrichi :\nGET /api/health/ready inclut maintenant :\n{ redis: { ok: true, latency: 1 }, queues: { shading: { size: 3, lag: 2 }, pdf: { size: 0, lag: 0 } } }", "success": "Un pic de calculs shading qui fait grossir la queue est visible dans le dashboard en temps réel. Un worker qui crashe déclenche une alerte P1 en moins de 2 minutes.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 20}]}, {"num": 21, "title": "PHASE 21 — API Publique & Écosystème Partenaires", "subtitle": "SolarNext devient une plateforme connectée — intégrations, webhooks et API partenaires", "score_before": "0/10", "score_after": "8/10", "requires": [8, 10, 19], "why": "Les installateurs solaires professionnels utilisent des ERP, des logiciels de comptabilité (Sage, EBP) et des outils métier (Enedis pour les raccordements). Sans intégrations, SolarNext est une île isolée qui force des ressaisies manuelles. Une API publique documentée permet aux partenaires et aux gros installateurs de connecter leurs outils, de construire leurs propres workflows, et de faire de SolarNext le hub central de leur activité PV. Cette phase positionne SolarNext comme une plateforme enterprise et non un outil fermé.", "steps": [{"num": 84, "title": "API keys et OAuth partenaires — Authentification des intégrations tierces", "priority": "MAJEUR", "files": ["backend/domains/api-keys/router.js (nouveau)", "backend/middleware/apiKeyAuth.middleware.js (nouveau)", "backend/db/migrations/ (table api_keys)", "frontend/src/pages/settings/ApiKeys.tsx (nouveau)"], "desc": "Deux modes d'authentification pour l'API publique :\n\n1. API Keys (cas d'usage simple — scripts, intégrations légères) :\nGénérer une clé préfixée : snx_live_xxxx (production) / snx_test_xxxx (sandbox).\nLa clé est affichée une seule fois à la création, puis stockée hachée (SHA-256).\nAttributs : name, organization_id, scopes [], last_used_at, created_at, expires_at (optionnel).\nScopes disponibles : leads:read, leads:write, studies:read, quotes:read, billing:read.\nHeader : Authorization: Bearer snx_live_xxxx\n\n2. OAuth 2.0 (cas d'usage partenaire — accès délégué) :\nFlow Authorization Code pour les intégrations ERP/compta.\nAccess token 1h, refresh token 30j rotatif.\nScope granulaire identique aux API keys.\n\nInterface Paramètres > API :\nListe des clés actives, création, révocation, logs de dernière utilisation.\nRate limiting propre à chaque clé (via quotas Phase 19 Step 76).\n\nSandbox : clés snx_test_ n'affectent que les données de test, sans impacter les données de production.", "success": "Un ERP partenaire s'authentifie avec une API key et lit les leads de l'organisation sans accéder à l'interface SolarNext. La révocation d'une clé est immédiate.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 21}, {"num": 85, "title": "Versioning API et documentation développeur", "pri
