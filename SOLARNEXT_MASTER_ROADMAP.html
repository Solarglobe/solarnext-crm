ority": "MAJEUR", "files": ["backend/domains/api/v1/ (namespace versionné)", "docs/api/ (OpenAPI 3.0 spec — openapi.yaml)", "backend/scripts/generate-openapi.js (nouveau)"], "desc": "L'API publique doit être stable et versionnée pour que les intégrations partenaires ne cassent pas à chaque mise à jour de SolarNext.\n\nVersioning URL : /api/v1/leads, /api/v1/studies, /api/v1/quotes.\nHeader Accept: application/vnd.solarnext.v1+json (alternative REST-pure).\n\nPolitique de version :\n• Les endpoints v1 sont stables pendant 18 mois minimum après la v2\n• Tout breaking change nécessite une nouvelle version majeure\n• Deprecated endpoints retournent Deprecation: <date> header\n\nSpécification OpenAPI 3.0 :\nGénérée automatiquement depuis les schémas Zod (Phase 1) + annotations JSDoc.\nHébergée sur docs.solarnext.fr/api avec Swagger UI ou Redoc.\nInclut : description des endpoints, paramètres, exemples de requêtes/réponses, codes d'erreur, scopes requis, rate limits.\n\nSandbox interactive :\nClés snx_test_ utilisables directement dans Swagger UI pour tester sans impacter les données de production.\n\nCI : la spec OpenAPI est générée et validée à chaque PR. Un endpoint non documenté fait échouer le build.", "success": "Un développeur peut intégrer SolarNext depuis la documentation sans jamais contacter le support. La spec OpenAPI est toujours à jour avec le code.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 21}, {"num": 86, "title": "Webhooks — Notifications temps réel vers les systèmes externes", "priority": "MAJEUR", "files": ["backend/domains/webhooks/router.js (nouveau)", "backend/workers/webhookWorker.js (nouveau — via webhookQueue)", "backend/db/migrations/ (tables webhook_endpoints, webhook_deliveries)", "frontend/src/pages/settings/Webhooks.tsx (nouveau)"], "desc": "Les webhooks permettent aux systèmes externes de réagir aux événements SolarNext sans polling permanent.\n\nÉvénements disponibles :\n• lead.created, lead.status_changed, lead.assigned\n• quote.created, quote.sent, quote.signed, quote.locked\n• invoice.created, invoice.paid, invoice.overdue\n• study.completed, study.scenario_locked\n• subscription.created, subscription.canceled\n\nPayload standardisé :\n{ event: 'quote.signed', data: { quoteId, organizationId, ... }, timestamp: ISO8601, webhookId: uuid }\n\nLivraison fiable :\n• Via webhookQueue (Phase 20) — découplé du thread principal\n• Signature HMAC-SHA256 dans header X-SolarNext-Signature\n• Retry : 3 tentatives en backoff exponentiel si non-200\n• Timeout : 10s par tentative\n• Historique des 100 dernières livraisons par endpoint\n\nInterface Paramètres > Webhooks :\nCréer des endpoints, sélectionner les événements, voir l'historique avec statut et payload.", "success": "Quand un devis est signé dans SolarNext, un ERP externe reçoit un webhook en moins de 5 secondes et crée automatiquement la commande. La signature HMAC est vérifiable par le destinataire.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 21}, {"num": 87, "title": "Intégration Enedis et fournisseurs énergie — Données de raccordement réelles", "priority": "MOYEN", "files": ["backend/domains/integrations/enedis.service.js (nouveau)", "backend/domains/integrations/router.js (nouveau)", "frontend/src/components/lead-detail/EnedisPanel.tsx (nouveau)"], "desc": "L'intégration Enedis permet de récupérer les données de consommation réelles du client final, rendant les calculs financiers plus précis.\n\nDonnées récupérables via API Enedis (avec consentement client) :\n• Puissance souscrite au contrat\n• Consommation annuelle réelle (kWh/an)\n• Profil de consommation horaire (si compteur Linky)\n• Tarif actuel (HP/HC ou base)\n\nCes données remplacent la consommation estimée dans le moteur financier (Phase 5) par des données réelles → ROI plus précis et plus crédible.\n\nFlow de consentement :\n1. Commercial entre le numéro PDL (Point De Livraison) dans la fiche lead\n2. SolarNext envoie un email au client avec lien de consentement Enedis\n3. Après consentement : import automatique des données dans le scénario financier\n\nAutres intégrations à planifier (pour version ultérieure) :\n• RTE (gestionnaire réseau transport) — données production régionale\n• Fournisseurs : EDF OA, Urssaf (OA déclarations)\n• Registre RGE : vérification automatique du numéro RGE à l'inscription", "success": "Le moteur financier utilise la consommation Linky réelle au lieu d'une estimation. La précision du ROI passe de ±15% à ±3% pour les installations résidentielles.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 21}, {"num": 88, "title": "Connecteurs ERP, comptabilité et export données structuré", "priority": "MOYEN", "files": ["backend/domains/integrations/erp.service.js (nouveau)", "backend/domains/integrations/export.service.js (nouveau)", "frontend/src/pages/settings/Integrations.tsx (nouveau)"], "desc": "Les installateurs pro utilisent des logiciels de comptabilité. SolarNext doit s'y connecter.\n\nExports structurés :\n• Format FEC (Fichier des Écritures Comptables) — obligation légale France\n• Format Sage (import direct dans Sage 50/100)\n• Format EBP (import EBP Compta)\n• Format CSV générique (pour autres logiciels)\n\nSynchronisation bidirectionnelle (phase ultérieure) :\n• Vers Sage : créer les factures automatiquement à l'émission\n• Depuis Sage : importer les paiements reçus pour mettre à jour les statuts\n\nMarketplace d'intégrations (roadmap) :\nPage Paramètres > Intégrations avec carte pour chaque intégration disponible :\nEnedis, Sage, EBP, Zapier (via webhooks), n8n, Make.\n\nDocumentation développeur pour chaque intégration :\nGuide pas-à-pas avec captures d'écran. Contact support dédié pour les intégrations enterprise.", "success": "Un comptable exporte les écritures du mois en format FEC en 30 secondes. Le fichier est importable directement dans Sage sans retraitement.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 21}]}, {"num": 22, "title": "PHASE 22 — RBAC Métier Avancé", "subtitle": "Un commercial, un technicien et un installateur ne voient pas les mêmes données", "score_before": "4/10", "score_after": "9/10", "requires": [2, 10, 19], "why": "Le RBAC (Role-Based Access Control) actuel de SolarNext est basique : ADMIN / USER. Dans la réalité d'une entreprise d'installation PV, les rôles sont plus complexes : un commercial voit les leads et devis mais pas les marges fournisseurs, un technicien voit les études PV mais pas les conditions financières, un installateur sur chantier voit uniquement son planning et ses documents techniques. Sans RBAC métier fin, soit on donne trop d'accès (risque de fuite d'informations sensibles), soit trop peu (outil inutilisable sur le terrain).", "steps": [{"num": 89, "title": "Matrice de permissions par rôle métier — 6 rôles différenciés", "priority": "CRITIQUE", "files": ["backend/config/rbac.config.js (nouveau — matrice des permissions)", "backend/middleware/rbacGuard.middleware.js (nouveau)", "backend/db/migrations/ (table user_roles enrichie)"], "desc": "Définir 6 rôles métier avec permissions précises dans rbac.config.js :\n\nSUPER_ADMIN : accès total plateforme multi-org\nADMIN : accès total sur son organisation (actuel)\nCOMMERCIAL : leads, devis, clients, planning — pas les marges d'achat\nTECHNICIEN : études PV, géométrie, shading, rapports techniques — pas les prix\nINSTALLATEUR : planning chantier, documents techniques, statut avancement\nSAV : tickets SAV, historique interventions, documents garantie\n\nStructure permission dans rbac.config.js :\nCOMMERCIAL: {\n  leads: ['read', 'write', 'delete_own'],\n  quotes: ['read', 'write', 'send'],\n  quotes_purchase_price: [], // Aucun accès\n  studies: ['read'],\n  invoices: ['read'],\n  financial_scenarios: ['read_summary'], // Pas les détails marges\n  admin: [],\n}\n\nMiddleware rbacGuard(resource, action) :\nrouter.delete('/:id', auth, rbacGuard('leads', 'delete_own'), controller.delete)\n\ndelete_own : autorisé seulement si user est l'auteur ou l'assigné du lead.", "success": "Un commercial ne peut pas voir le prix d'achat des panneaux. Un technicien ne peut pas créer de devis. Un installateur ne voit que son planning et ses documents. La matrice est testée en CI.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 22}, {"num": 90, "title": "Permissions financières granulaires — Visibilité limitée des données sensibles", "priority": "CRITIQUE", "files": ["backend/domains/quotes/service.js (filtrage conditionnel par rôle)", "backend/domains/studies/financial/scenario.service.js (filtrage)", "frontend/src/hooks/usePermissions.ts (nouveau)"], "desc": "Les données financières sensibles ne doivent être visibles que par les rôles autorisés.\n\nDonnées à masquer selon le rôle :\n• Prix d'achat fournisseurs : uniquement ADMIN (calcul de marge)\n• Marge unitaire et marge totale : uniquement ADMIN\n• Remises commerciales > X% : uniquement ADMIN (paramétrable)\n• TRI, VAN détaillés : COMMERCIAL et TECHNICIEN voient uniquement le résumé\n• Conditions de financement (taux, durée) : ADMIN + COMMERCIAL senior\n• CA par commercial : ADMIN uniquement\n\nImplémentation backend :\nLe service retourne des objets filtrés selon req.user.role :\nif (role !== 'ADMIN') { delete quote.purchase_price; delete quote.margin; }\n\nImplémentation frontend :\nHook usePermissions() : { can: (resource, action) => boolean }.\nComposant <PermissionGate resource='quotes_margin' action='read'> — masque l'UI si non autorisé (complémentaire au filtrage backend).\n\nAudit des accès financiers : logguer chaque consultation de données à visibilité restreinte.", "success": "Un commercial qui imprime un devis voit le prix client mais pas la marge. Un technicien qui consulte un scénario voit la production mais pas le ROI détaillé. Les tests vérifient chaque combinaison rôle/donnée.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 22}, {"num": 91, "title": "Permissions études et documents — Accès contextuel par projet", "priority": "MAJEUR", "files": ["backend/domains/studies/router.js", "backend/domains/documents/router.js", "backend/middleware/projectAccess.middleware.js (nouveau)"], "desc": "Les permissions sur les études et documents doivent être contextuelles au projet.\n\nRègles d'accès aux études PV :\n• TECHNICIEN : peut créer et modifier des études sur les leads assignés à son équipe\n• COMMERCIAL : peut consulter les études liées à ses leads, pas les modifier\n• INSTALLATEUR : voit uniquement les études des chantiers sur son planning\n\nRègles d'accès aux documents :\n• Catégories de documents avec visibilité par rôle :\n  - 'technique' : TECHNICIEN, INSTALLATEUR, ADMIN\n  - 'commercial' : COMMERCIAL, ADMIN\n  - 'financier' : ADMIN, COMMERCIAL senior\n  - 'juridique' : ADMIN uniquement\n• Un document partagé avec le client (portail) est visible par tous les rôles\n\nMiddleware projectAccess :\nVérifie que l'utilisateur est bien dans le contexte du projet (lead assigné, chantier planifié). Complète tenantGuard (Phase 19 Step 75) avec la granularité projet.\n\nInterface admin :\nVue des permissions par utilisateur sur chaque projet — utile pour l'ADMIN qui configure les accès d'une équipe terrain.", "success": "Un installateur ne voit que les documents techniques de son chantier du jour. Un technicien ne peut pas accéder aux études PV d'une équipe commerciale qui n'est pas la sienne.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 22}, {"num": 92, "title": "Rôles personnalisés par organisation", "priority": "MOYEN", "files": ["backend/domains/organizations/roles.service.js (nouveau)", "backend/db/migrations/ (tables custom_roles, role_permissions)", "frontend/src/pages/settings/RolesManager.tsx (nouveau)"], "desc": "Les 6 rôles prédéfinis couvrent la majorité des cas, mais les grandes organisations ont des besoins spécifiques.\n\nRôles personnalisés :\nL'ADMIN peut créer des rôles personnalisés en cochant des permissions depuis la matrice rbac.config.js.\nExemples : 'Chef de projet' (TECHNICIEN + accès planning), 'Coordinateur SAV' (SAV + accès partiel aux devis).\n\nLimites :\nUn rôle personnalisé ne peut pas avoir plus de permissions que l'ADMIN.\nMaximum 5 rôles personnalisés par organisation (Starter), illimité (Pro/Enterprise).\n\nInterface Paramètres > Équipe > Rôles :\nListe des rôles (système + personnalisés), membres assignés à chaque rôle, éditeur de permissions avec aperçu en temps réel.\n\nHéritage de rôle :\nUn rôle personnalisé peut 'étendre' un rôle système : COMMERCIAL + [accès études en lecture] = rôle 'Commercial PV senior'.", "success": "Un ADMIN crée un rôle 'Commercial PV senior' avec accès lecture aux études en 5 minutes. Le rôle est actif immédiatement sans redéploiement.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 22}, {"num": 93, "title": "Audit des permissions et détection des anomalies RBAC", "priority": "MOYEN", "files": ["backend/services/auditLog.service.js (enrichir)", "frontend/src/pages/admin/PermissionsAudit.tsx (nouveau)"], "desc": "Les changements de permissions sont critiques et doivent être tracés.\n\nÉvénements loggués dans audit_log :\n• Attribution / révocation d'un rôle à un utilisateur\n• Création / modification / suppression d'un rôle personnalisé\n• Tentative d'action non autorisée (rbacGuard → 403)\n• Escalade de privilèges suspecte (ex: COMMERCIAL qui tente d'accéder à admin)\n\nDashboard Permissions Audit (ADMIN) :\n• Historique des changements de rôles sur 90 jours\n• Qui a accès à quoi (vue matricielle rôle × permission)\n• Utilisateurs avec les accès les plus larges (tri par permissions accordées)\n• Tentatives d'accès refusées par utilisateur (détection comportement anormal)\n\nPrincipe du moindre privilège :\nAlert si un utilisateur n'a eu aucune activité sur une permission depuis 90 jours → suggestion de réduire ses accès.\n\nExport pour audit externe :\nCSV 'Qui a accès à quoi' — utile pour les certifications ISO 27001.", "success": "L'ADMIN peut prouver à tout moment qui avait accès à quoi et depuis quand. Les tentatives d'escalade de privilèges sont détectées en moins de 24h.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 22}]}, {"num": 23, "title": "PHASE 23 — Performance & Scaling Infrastructure", "subtitle": "SolarNext à 100+ organisations et 50 000+ leads — tenir la charge sans dégradation", "score_before": "3/10", "score_after": "9/10", "requires": [7, 14, 20], "why": "La performance à l'échelle est le défi de tout SaaS en croissance. SolarNext combine des calculs intensifs (shading, financier), du stockage de fichiers (PDFs, documents), une base PostgreSQL multi-tenant qui grossit avec chaque nouvel installateur, et un frontend avec 3D + graphiques. Sans une stratégie de scaling proactive, les premiers succès commerciaux dégraderont les performances de tous les clients existants — et la plateforme sera associée à la lenteur plutôt qu'à la fiabilité.", "steps": [{"num": 94, "title": "Scaling horizontal et load balancing — Architecture multi-instances", "priority": "MAJEUR", "files": ["docker-compose.prod.yml (configuration multi-instances)", "backend/config/session.config.js (sessions centralisées Redis)", "nginx/nginx.conf (load balancer)"], "desc": "Préparer SolarNext pour scaler horizontalement (plusieurs instances backend).\n\nPrérequis pour le scaling horizontal :\n1. Sessions sans état : les refresh tokens sont en DB (Phase 8 Step 35), pas en mémoire → compatible multi-instances ✓\n2. Queues centralisées : BullMQ + Redis (Phase 20 Step 79) → compatible ✓\n3. Uploads : via S3 directement depuis le frontend (pre-signed URLs) → évite les uploads via le backend (Point important)\n4. WebSocket/SSE : utiliser Redis pub/sub pour diffuser aux instances correctes\n\nConfiguration load balancer Nginx :\nupstream solarnext_backend {\n  least_conn; # Algorithme least connections\n  server backend1:3000;\n  server backend2:3000;\n  keepalive 32;\n}\n\nHealth check Nginx : proxy_next_upstream error timeout http_503.\nUne instance down est retirée automatiquement sans interruption de service.\n\nAuto-scaling (objectif) :\nDéfinir les métriques de scale-out : CPU > 70% ou queue lag > 30s → +1 instance.", "success": "Déployer une 2ème instance backend ne nécessite aucune modification du code. Le load balancer redirige automatiquement en cas d'instance down.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 23}, {"num": 95, "title": "Cache Redis stratégique — Données fréquentes et sessions distribuées", "priority": "MAJEUR", "files": ["backend/services/cache.service.js (nouveau)", "backend/domains/dashboard/router.js (cache stats)", "backend/domains/pv-catalog/pvgis.service.js (cache PVGIS Phase 12)"], "desc": "Stratégie de cache Redis par type de donnée :\n\nCache court (30s-5min) — données temps réel :\n• Stats dashboard (GET /api/dashboard/stats) : 5 min\n• Badges navigation (GET /api/nav/badges) : 60s\n• Quotas organisation (vérification fréquente) : 30s\n\nCache moyen (30min-1h) — données semi-statiques :\n• Plans Stripe et limits : 1h (changent rarement)\n• Catalogue produits PV : 30min\n• Résultats PVGIS : 30 jours (données stables)\n\nCache long (24h+) — données très stables :\n• Masque d'horizon IGN (Phase 4 Step 18) : 1 an\n• Ratios régionaux ensoleillement fallback : 7 jours\n\nInvalidation de cache :\nPattern cache-aside avec invalidation sur mutation.\nClés structurées : org:{orgId}:dashboard:stats, pvgis:{lat}:{lon}:{orientation}.\nÉviter le thundering herd : jitter de ±10% sur les TTLs.\n\nMonitoring cache :\n• Hit rate (cible > 80%) exposé dans les métriques Prometheus\n• Mémoire Redis utilisée dans le health check", "success": "Le dashboard se charge en moins de 100ms pour 90% des requêtes. Le hit rate Redis est supérieur à 80%. Les données PVGIS ne sont jamais re-téléchargées pour une localisation déjà calculée.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 23}, {"num": 96, "title": "Optimisation PostgreSQL — Requêtes lentes, vacuum et connection pooling", "priority": "MAJEUR", "files": ["backend/config/database.js (pg-bounce ou pgcat connection pooler)", "backend/db/migrations/ (index manquants identifiés par pg_stat_statements)", "backend/scripts/db-slow-queries.js (analyse hebdomadaire)"], "desc": "PostgreSQL optimisé pour le multi-tenant à grande échelle.\n\nActivation de pg_stat_statements :\nActiver l'extension pg_stat_statements pour identifier les requêtes les plus coûteuses.\nRapport hebdomadaire automatique : top 10 requêtes par temps total consommé.\n\nConnection pooling (PgBouncer ou pgcat) :\nMode transaction pooling : chaque requête prend une connexion du pool, la libère immédiatement. Réduit le nombre de connexions PostgreSQL de N_workers × N_instances (potentiellement 200+) à un pool de 20-50.\nObligatoire avant le scaling horizontal (Phase 23 Step 94).\n\nVACUUM et AUTOVACUUM :\nConfigurer autovacuum agressif sur les tables à haute volumétrie de mutations :\n• mutation_log (INSERT intensive)\n• audit_logs (INSERT intensive)\n• leads (UPDATE fréquents — changements de statut)\n\nAnalyse des plans d'exécution :\nPour chaque requête critique (dashboard, liste leads, calcul shading) :\nEXPLAIN (ANALYZE, BUFFERS) → documenter le plan optimisé.\nCes plans deviennent la baseline — alerter si le plan change en production.", "success": "Aucune requête SQL ne dépasse 100ms en p99 sous charge normale. Le nombre de connexions PostgreSQL ne dépasse jamais 50 même avec 100 instances backend actives.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 23}, {"num": 97, "title": "CDN, optimisation des assets et stratégie stockage", "priority": "MOYEN", "files": ["frontend/vite.config.ts (optimisation build)", "backend/services/documentStorage.service.js (pre-signed URLs S3)", "nginx/nginx.conf (cache-control headers)"], "desc": "Réduire la charge serveur en déléguant au CDN et à S3.\n\nCDN pour les assets frontend :\nConfigurer Cloudflare ou CloudFront devant le serveur statique.\nCache-Control: public, max-age=31536000, immutable pour les chunks Vite (nom contenant le hash du contenu).\nCache-Control: public, max-age=60 pour index.html (permet les mises à jour rapides sans vider tout le cache).\n\nPre-signed URLs S3 pour les documents :\nAu lieu de proxifier les documents via le backend (POST /api/documents/:id/download → lire S3 → streamer au client), générer une pre-signed URL valide 15 minutes.\nLe client télécharge directement depuis S3 → le backend n'est pas impliqué.\nRéduit drastiquement la bande passante et la charge CPU du backend.\n\nOptimisation des assets statiques :\n• Images : format WebP avec fallback PNG\n• Fonts : subset uniquement les caractères utilisés\n• Favicons : generer tous les formats depuis une seule source SVG\n\nStratégie coûts S3 :\nRapport mensuel : volume par organisation, coût estimé, croissance.\nAlerter si une organisation dépasse son quota de stockage (Phase 19 Step 76).", "success": "Les assets statiques sont servis par le CDN à moins de 50ms depuis n'importe quel pays européen. Les téléchargements de documents ne consomment pas de bande passante backend.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 23}, {"num": 98, "title": "Profiling backend/frontend et optimisation mobile low-end", "priority": "MOYEN", "files": ["backend/middleware/requestProfiler.middleware.js (enrichir Phase 7 Step 32)", "frontend/src/ (audit React DevTools Profiler)", ".github/workflows/ci.yml (ajout profiling continu)"], "desc": "Le profiling continu détecte les régressions de performance avant la production.\n\nProfiling backend :\nIntégrer clinicjs ou 0x pour profiler Node.js sur un jeu de données réaliste.\nIdentifier les fonctions qui consomment le plus de CPU dans les calculs PV.\nObjectifs : aucune fonction synchrone ne bloque > 50ms le thread Node.js.\n\nProfiling frontend avec React DevTools :\n• Session hebdomadaire de profiling sur les pages les plus utilisées\n• Documenter les flamegraphs des interactions clés (drag Kanban, ouverture étude)\n• Comparer avant/après chaque optimisation\n\nTests de performance sur mobile low-end :\nLighthouse avec device emulation 'Moto G4' (CPU throttle 4×).\nObjectif : First Contentful Paint < 2s sur 4G.\nLe viewer 3D doit détecter le GPU intégré et réduire la qualité automatiquement.\n\nPerformance budget CI :\nDéfinir un performance budget dans Lighthouse CI.\n• Taille du bundle initial < 400 Ko gzippé\n• Time to Interactive < 3s sur desktop\n• LCP < 2.5s sur desktop\nSi un PR dépasse le budget → commentaire automatique sur la PR avec les détails.", "success": "Chaque PR qui dégrade les performances de plus de 10% est automatiquement identifiée avant le merge. Le viewer 3D est utilisable sur les tablettes bas de gamme des installateurs.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 23}]}, {"num": 24, "title": "PHASE 24 — Stratégie Incidents & Opérations", "subtitle": "Réponse aux incidents, runbooks, et communication de crise — avant qu'il soit trop tard", "score_before": "2/10", "score_after": "9/10", "requires": [7, 16, 22], "why": "Tous les SaaS ont des incidents. La différence entre un SaaS amateur et une plateforme enterprise se mesure à la vitesse et à la qualité de la réponse. Sans procédures documentées, chaque incident P0 est une improvisation stressante qui dure 3× plus longtemps que nécessaire. Les runbooks, les niveaux d'escalade et la communication client structurée transforment les incidents en opportunités de montrer la maturité opérationnelle — un critère déterminant pour les contrats enterprise.", "steps": [{"num": 99, "title": "Niveaux d'incidents P0-P3 et procédures d'escalade", "priority": "CRITIQUE", "files": ["docs/incident-management.md (créer / enrichir Phase 16 Step 64)", "docs/escalation-matrix.md (nouveau)", "backend/config/alerting.config.js (nouveau)"], "desc": "Définir formellement les niveaux d'incidents avec critères, délais et responsables :\n\nP0 — Critique (réponse < 15 min) :\n• Plateforme totalement indisponible\n• Corruption de données confirmée\n• Faille de sécurité active\n• Perte de données client\nResponsable : fondateur + tous les dev disponibles\n\nP1 — Majeur (réponse < 1h) :\n• Feature critique indisponible (PDF, calcul shading, création devis)\n• API externe critique down (Stripe, PVGIS) depuis > 30 min\n• Performance dégradée > 50% (timeout généralisés)\nResponsable : dev d'astreinte + manager\n\nP2 — Modéré (réponse < 4h) :\n• Feature non-critique cassée\n• Performance dégradée < 50%\n• Bug avec workaround disponible\n\nP3 — Mineur (prochain sprint) :\n• Bug cosmétique\n• Amélioration UX mineure\n\nMatrice d'escalade (escalation-matrix.md) :\nContacts nominatifs par niveau, canaux d'alerte (Slack, PagerDuty, téléphone), critères d'escalade au niveau supérieur.", "success": "Lors du premier P0 en production, l'équipe identifie le responsable, commence la communication client et démarre le diagnostic en moins de 10 minutes — sans improviser.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 24}, {"num": 100, "title": "Runbooks opérationnels — Procédures pas-à-pas par scénario", "priority": "CRITIQUE", "files": ["docs/runbooks/ (nouveau dossier)", "docs/runbooks/database-corruption.md", "docs/runbooks/stripe-outage.md", "docs/runbooks/pvgis-unavailable.md", "docs/runbooks/pdf-generation-failure.md", "docs/runbooks/memory-leak-nodejs.md"], "desc": "Un runbook est une procédure pas-à-pas pour résoudre un incident connu. Chaque runbook doit être exécutable par un dev qui découvre l'incident à 3h du matin sans contexte préalable.\n\nStructure d'un runbook :\n1. Symptômes (comment détecter cet incident)\n2. Impact (quels utilisateurs, quelles features)\n3. Diagnostic (commandes à exécuter, métriques à vérifier)\n4. Actions correctives (steps numérotés, commandes exactes)\n5. Rollback (si l'action corrective échoue)\n6. Vérification (comment confirmer que l'incident est résolu)\n7. Post-incident (actions à faire dans les 48h)\n\nRunbooks prioritaires à créer :\n• database-corruption : PITR depuis WAL (Phase 16 Step 61)\n• stripe-outage : basculement en mode dégradé, communication clients\n• pvgis-unavailable : activation du fallback régional (Phase 12 Step 49)\n• pdf-generation-failure : vidage de la queue, relance du pool Playwright\n• memory-leak-nodejs : détection, profiling, restart en rolling\n\nTests annuels : chaque runbook est exécuté en staging une fois par an pour vérifier qu'il est toujours valide.", "success": "Un développeur junior peut résoudre un incident 'PDF queue bloquée' en moins de 20 minutes en suivant le runbook. Les runbooks sont testés annuellement en staging.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 24}, {"num": 101, "title": "Procédures faille sécurité et corruption de données", "priority": "CRITIQUE", "files": ["docs/runbooks/security-breach.md (nouveau)", "docs/runbooks/data-corruption.md (nouveau)", "docs/security-policy.md (nouveau)"], "desc": "Deux scénarios critiques nécessitant des procédures spécifiques :\n\nFaille de sécurité (security-breach.md) :\n1. Détecter : alerte Sentry, anomalie audit_log, signalement client\n2. Isoler : révoquer toutes les sessions actives (global logout)\n3. Évaluer : données exposées ? quelles organisations ? durée d'exposition ?\n4. Contenir : rotation des secrets (JWT_SECRET, API keys),    re-déploiement avec nouvelles clés\n5. Notifier : CNIL dans les 72h si données personnelles exposées (RGPD)\n6. Notifier : organisations affectées dans les 24h\n7. Post-mortem : dans les 48h avec analyse des causes racines\n\nCorruption de données (data-corruption.md) :\n1. Stopper les écritures immédiatement (mode maintenance)\n2. Identifier le périmètre : tables, organisations, timeframe\n3. PITR depuis le WAL (Phase 16 Step 61) vers l'instant précédant la corruption\n4. Rejouer les transactions légitimes depuis les logs d'audit\n5. Vérifier les hashes des snapshots (Phase 3 Step 11)\n6. Communication client avec transparence sur l'impact\n\nPolitique de sécurité (security-policy.md) :\nProgramme de bug bounty, responsible disclosure, contact sécurité.", "success": "En cas de faille de sécurité, l'équipe notifie la CNIL dans les 72h et les clients affectés dans les 24h, comme le requiert le RGPD. La procédure a été simulée au moins une fois.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 24}, {"num": 102, "title": "Communication d'incident et page de statut", "priority": "MAJEUR", "files": ["docs/communication-templates/ (templates d'emails d'incident)", "infrastructure/statuspage.io ou instatus.com (configuration)"], "desc": "La communication pendant un incident est aussi importante que la résolution technique.\n\nPage de statut publique (statuspage.io, Instatus, ou auto-hébergé) :\n• Composants monitorés : API, Calcul PV, Génération PDF, Stockage, Email\n• Mise à jour pendant les incidents : toutes les 30 minutes minimum\n• Abonnement aux notifications : email ou webhook\n• Accessible même si la plateforme principale est down\n\nTemplates de communication client :\n• Début d'incident P0 : 'Nous avons identifié un problème affectant [feature].   Nos équipes travaillent à sa résolution. Prochain update dans 30 min.'\n• Update en cours : 'Le problème est identifié : [cause].   Correction en cours. ETA : [heure]. Aucune donnée n'est perdue.'\n• Résolution : 'L'incident est résolu. Merci de votre patience.   Post-mortem disponible dans 48h.'\n\nPost-mortem public (résumé non-technique) :\nPublié sur le blog ou la page de statut dans les 72h.\nFormat : ce qui s'est passé, impact, cause racine (simplifiée), actions correctives déjà prises et planifiées.", "success": "Pendant le premier P0, les clients reçoivent un update toutes les 30 minutes et savent exactement ce qui se passe. La page de statut est mise à jour en temps réel. Le post-mortem est publié dans les 72h.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 24}, {"num": 103, "title": "Post-mortem systématique et boucle d'amélioration continue", "priority": "MAJEUR", "files": ["docs/post-mortems/ (dossier archivé)", "docs/post-mortem-template.md (nouveau)"], "desc": "Chaque P0 et P1 doit produire un post-mortem. C'est l'outil principal d'amélioration continue de la fiabilité.\n\nTemplate post-mortem (blameless — sans désigner de coupable) :\n1. Résumé : durée, impact (N organisations, N utilisateurs, N€ de perte estimée)\n2. Chronologie : events timeline minute par minute\n3. Causes racines (5 pourquoi)\n4. Ce qui a bien fonctionné (les détections et réponses correctes)\n5. Ce qui a mal fonctionné\n6. Actions correctives :\n   - Immédiates (déjà effectuées)\n   - Court terme (< 2 semaines) — avec responsable + deadline\n   - Long terme (roadmap) — avec issue/ticket créé\n\nProcessus :\n• Post-mortem brouillon rédigé dans les 24h\n• Review en équipe dans les 48h\n• Archivé dans docs/post-mortems/YYYY-MM-DD-titre.md\n• Actions intégrées dans le sprint courant\n\nRevue trimestrielle :\nAnalyser tous les post-mortems du trimestre :\n• Patterns récurrents (toujours la même composante qui échoue)\n• Actions correctives non réalisées → escalader\n• Métriques de fiabilité : MTTR (temps moyen de résolution), MTTD (temps de détection)", "success": "Après 6 mois, l'analyse des post-mortems révèle les 3 composantes les plus fragiles de la plateforme. Le MTTR diminue de 50% grâce aux runbooks améliorés après chaque incident.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 24}]}, {"num": 25, "title": "PHASE 25 — Gouvernance Produit & Dette Technique", "subtitle": "Construire SolarNext pour durer — décisions documentées, ownership clair et dette maîtrisée", "score_before": "3/10", "score_after": "8/10", "requires": [6, 18, 20], "why": "La dette technique non gérée est le cancer des SaaS en croissance. Sans ADR (Architecture Decision Records), les décisions architecturales sont oubliées et refaites à l'envers 6 mois plus tard. Sans ownership clair des modules, personne n'est responsable de rien. Sans processus de release, les déploiements en production sont stressants et les régressions passent inaperçues. Cette phase établit les pratiques d'ingénierie qui font la différence entre un produit qui s'améliore continuellement et un produit qui accumule de la dette.", "steps": [{"num": 104, "title": "ADR — Architecture Decision Records, décisions documentées et consultables", "priority": "MAJEUR", "files": ["docs/adr/ (nouveau dossier)", "docs/adr/0001-postgresql-vs-mongodb.md", "docs/adr/0002-bullmq-vs-kafka.md", "docs/adr/0003-zod-canonical-schemas.md", "docs/adr/template.md (nouveau)"], "desc": "Les ADR documentent les décisions architecturales importantes : pourquoi cette décision a été prise, quelles alternatives ont été considérées, et quelles sont les conséquences attendues.\n\nFormat ADR (Lightweight) :\n# ADR-0003 : Schémas Zod canoniques comme source de vérité\n**Statut** : Accepté\n**Date** : 2024-01-15\n**Décideurs** : [noms]\n\n**Contexte** : Chaque module redéfinit ses propres types...\n**Décision** : Créer shared/schemas/ avec Zod...\n**Alternatives considérées** : JSON Schema, io-ts, validation manuelle\n**Conséquences** : + Validation unifiée / - Dépendance partagée...\n\nADR à créer en priorité (décisions déjà prises) :\n• Choix PostgreSQL et architecture multi-tenant RLS\n• BullMQ + Redis vs Kafka pour les queues\n• Zod comme source de vérité des schémas\n• Immuabilité et snapshots contractuels (Phase 3)\n• Architecture world-space / image-space (Phase 4)\n\nRègle : toute décision architecturale significative doit avoir un ADR AVANT d'être implémentée. Le template est fourni.", "success": "Un nouveau développeur comprend en 30 minutes pourquoi SolarNext utilise BullMQ plutôt que Kafka, et quelles alternatives ont été rejetées. Les décisions futures sont documentées avant implémentation.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 25}, {"num": 105, "title": "Ownership des modules et stratégie de branches Git", "priority": "MAJEUR", "files": ["CODEOWNERS (nouveau)", "docs/git-workflow.md (nouveau)", ".github/branch-protection-rules.yml (nouveau)"], "desc": "Clarifier qui est responsable de quoi dans la codebase.\n\nFichier CODEOWNERS :\n# Moteurs PV — reviewer obligatoire pour toute modification\nbackend/domains/studies/geometry/ @lead-pv-engine\nbackend/domains/studies/financial/ @lead-pv-engine\nshared/schemas/ @lead-architecture\nbackend/middleware/immutabilityGuard* @lead-architecture @lead-pv-engine\n\nLes CODEOWNERS sont intégrés à GitHub : tout PR modifiant un fichier protégé nécessite la review du responsable désigné.\n\nStratégie Git (git-workflow.md) :\n• Branches : main (production), develop (intégration), feature/* (features), hotfix/* (correctifs urgents)\n• Règle : pas de commit direct sur main ou develop\n• PR obligatoire avec : description, tests, screenshot si UI, reviewers\n• Squash merge sur main (historique linéaire lisible)\n• Tags semver sur chaque release (Phase 18 Step 72)\n\nBranch protection rules :\n• main : 2 reviewers, CI verte, no force push\n• develop : 1 reviewer, CI verte\n• Moteurs PV : CODEOWNER review obligatoire", "success": "Aucune modification des moteurs PV ou des schémas canoniques ne peut être mergée sans review d'un expert désigné. L'historique Git de main est linéaire et lisible.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 25}, {"num": 106, "title": "Roadmap dette technique formalisée — TECH_DEBT.md vivant", "priority": "MAJEUR", "files": ["TECH_DEBT.md (enrichir depuis Phase 0 Step 4)", "docs/debt-review-process.md (nouveau)", ".github/workflows/ci.yml (validation TECH_DEBT.md)"], "desc": "TECH_DEBT.md est le registre vivant de la dette technique connue.\n\nStructure d'une entrée de dette :\n## [DEBT-042] Suppression asynchrone S3 non confirmée\n**Priorité** : MEDIUM\n**Module** : backend/services/documentStorage.service.js\n**Date identifiée** : 2024-03-15\n**Symptôme** : Si la suppression S3 échoue, le fichier reste en stockage mais\n             la DB ne le référence plus — orphan file non tracé.\n**Impact si non traité** : Coût S3 croissant + fichiers orphelins non supprimables\n**Effort estimé** : 2j\n**Dépendances** : Phase 20 (workers) — nécessite la worker queue\n**Ticket** : #ISSUE-127\n\nProcessus de revue de dette (trimestriel) :\n• Prioriser la dette par impact × probabilité\n• Dédier 20% de chaque sprint à la réduction de dette (dette budget)\n• Escalader les dettes CRITICAL qui bloquent la roadmap\n• Archiver les dettes résolues (ne pas supprimer — historique)\n\nValidation CI :\nChaque 'any' TypeScript non documenté dans TECH_DEBT.md bloque le merge. (s'appuie sur Phase 0 Step 4)", "success": "L'équipe connaît les 10 dettes techniques les plus coûteuses et leur impact. 20% du temps de développement est consacré à la réduction de dette. Aucun 'any' TypeScript non documenté.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 25}, {"num": 107, "title": "Conventions code et règles de migrations — Standards non négociables", "priority": "MOYEN", "files": ["CONTRIBUTING.md (nouveau — guide du contributeur)", ".eslintrc.js (règles supplémentaires)", "docs/migration-rules.md (nouveau)"], "desc": "Les conventions documentées éliminent les discussions infinies en code review et garantissent la cohérence de la base de code.\n\nCONTRIBUTING.md (guide du contributeur) :\n• Setup local en 5 commandes\n• Règles de nommage : fichiers kebab-case, composants PascalCase,   constantes UPPER_SNAKE_CASE, variables camelCase\n• Règles de commit : Conventional Commits (feat:, fix:, refactor:, chore:)\n• Checklist PR : tests passent, coverage maintenue,   TECH_DEBT.md mis à jour si debt ajoutée\n\nRules ESLint supplémentaires :\n• no-direct-db-access : interdire les imports DB dans les controllers   (forcer le passage par les services)\n• no-any-in-critical-paths : erreur si 'any' dans les fichiers   matching shared/schemas/ ou domains/studies/financial/\n\nRègles de migrations (migration-rules.md) :\n• Toute migration a un down() testé\n• Pas de DROP COLUMN sans 3-étapes (deprecate → migrate → drop)\n• Migrations renommées avec préfixe date : 20240315_add_locked_at.js\n• Exécution en transactions quand possible\n• Jamais de logique métier dans une migration", "success": "Un nouveau contributeur peut faire sa première PR correcte en suivant CONTRIBUTING.md sans guidance supplémentaire. Aucune migration ne manque de down() en CI.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 25}, {"num": 108, "title": "Stratégie freeze avant release et critères de go/no-go", "priority": "MOYEN", "files": ["docs/release-process.md (nouveau)", "docs/go-nogo-criteria.md (nouveau)", ".github/workflows/release.yml (automatisation release)"], "desc": "Un processus de release formalisé évite les déploiements risqués sous pression.\n\nRelease process (release-process.md) :\n• Code freeze J-3 avant la release : pas de nouvelle feature, bugfixes seulement\n• Déploiement en staging J-2 : validation fonctionnelle complète\n• Smoke tests en staging J-1 : 5 flows E2E critiques (Phase 6)\n• Deploy en production J0 : heure précise (14h heure de Paris, faible trafic)\n• Surveillance renforcée J0 à J+2 : Sentry + métriques toutes les 15 min\n\nCritères go/no-go (go-nogo-criteria.md) :\nNO-GO automatique si :\n• CI échoue sur n'importe quel gate\n• Test de restauration backup non passé cette semaine (Phase 16)\n• P0 ou P1 ouvert non résolu\n• Score Lighthouse < seuil minimum\n• Tests de non-régression financière échoués (Phase 5)\n\nWorkflow GitHub Actions automatisé :\n• Tag semver → création draft release avec CHANGELOG automatique\n• Approval manuelle requise avant déploiement production\n• Notification Slack/email à l'équipe et aux clients (page de statut)\n\nRollback automatique (hotfix) :\nSi le smoke test post-deploy échoue → rollback automatique vers la version précédente.", "success": "Chaque release production a passé tous les critères go/no-go. Un smoke test qui échoue en post-déploiement déclenche un rollback automatique en moins de 5 minutes.", "horizon": "LONG", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "", "status": "TODO", "phase_num": 25}]}];
const STORAGE_KEY = 'snx-roadmap-v1';

// State
let state = {
  statuses: {},
  notes: {},
  filter: { horizon:'ALL', priority:'ALL', status:'ALL', search:'', view:'ALL' },
  activePhase: 0
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      state.statuses = s.statuses || {};
      state.notes = s.notes || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      statuses: state.statuses,
      notes: state.notes
    }));
  } catch(e) {}
}

function getStatus(stepNum) {
  return state.statuses[stepNum] || 'TODO';
}

function setStatus(stepNum, status) {
  state.statuses[stepNum] = status;
  saveState();
  renderAll();
}

function getNotes(stepNum) {
  return state.notes[stepNum] || '';
}

function setNotes(stepNum, text) {
  state.notes[stepNum] = text;
  saveState();
}

// Filters
function setView(v) {
  state.filter.view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function toggleFilter(type, val, btn) {
  state.filter[type] = val;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function onSearch(val) {
  state.filter.search = val.toLowerCase();
  renderAll();
}

function stepVisible(step) {
  const f = state.filter;
  const status = getStatus(step.num);
  if (f.view === 'MVP' && !step.is_mvp) return false;
  if (f.view === 'ENTERPRISE' && !step.is_enterprise) return false;
  if (f.horizon !== 'ALL' && step.horizon !== f.horizon) return false;
  if (f.priority !== 'ALL' && step.priority !== f.priority) return false;
  if (f.status !== 'ALL' && status !== f.status) return false;
  if (f.search) {
    const hay = (step.title + step.desc + (step.files||[]).join(' ')).toLowerCase();
    if (!hay.includes(f.search)) return false;
  }
  return true;
}

function phaseVisible(phase) {
  if (state.filter.view === 'DASHBOARD') return false;
  return phase.steps.some(s => stepVisible(s));
}

// Colors
const PHASE_COLORS = [
  ['#1e3a5f','#60a5fa'],['#1a2e2a','#34d399'],['#3b2d6b','#c4b5fd'],['#7f1d1d','#fca5a5'],
  ['#1a3a2a','#4ade80'],['#3b1f00','#fb923c'],['#1e3a5f','#93c5fd'],['#2d1f3b','#d8b4fe'],
  ['#1a2e3b','#38bdf8'],['#14532d','#86efac'],['#1f2937','#d1d5db'],['#1a1a3b','#818cf8'],
  ['#1a3a1a','#16a34a'],['#3b2a00','#f59e0b'],['#1a2a3b','#0ea5e9'],['#3b1a2a','#f43f5e'],
  ['#1a3a3a','#06b6d4'],['#2a3b1a','#84cc16'],['#3b2a1a','#fb923c'],['#1a1f3b','#6366f1'],
  ['#2a1a3b','#a78bfa'],['#1a3a2a','#10b981'],['#3b1a1a','#f87171'],['#1a2a3b','#38bdf8'],
  ['#2a3b2a','#4ade80'],['#1a1a2a','#a5b4fc'],
];
function phaseColor(num) {
  return PHASE_COLORS[num % PHASE_COLORS.length] || ['#334155','#94a3b8'];
}

function globalStats() {
  let done=0, inprogress=0, blocked=0;
  PHASES.forEach(p => p.steps.forEach(s => {
    const st = getStatus(s.num);
    if(st==='DONE') done++;
    else if(st==='IN_PROGRESS') inprogress++;
    else if(st==='BLOCKED') blocked++;
  }));
  return {done, inprogress, blocked, total:108};
}

// ─── Render sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  PHASES.forEach(phase => {
    const done = phase.steps.filter(s => getStatus(s.num)==='DONE').length;
    const total = phase.steps.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const [bg, fg] = phaseColor(phase.num);
    const isActive = state.activePhase === phase.num;
    const div = document.createElement('div');
    div.className = 'phase-nav' + (isActive ? ' active' : '');
    div.innerHTML = `
      <div class="phase-num" style="background:${bg};color:${fg}">P${phase.num}</div>
      <div class="phase-nav-info">
        <div class="phase-nav-title">${phase.title.replace(/PHASE \d+ — /,'')}</div>
        <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="phase-count">${done}/${total}</div>
    `;
    div.onclick = () => scrollToPhase(phase.num);
    sb.appendChild(div);
  });
}

function scrollToPhase(num) {
  state.activePhase = num;
  renderSidebar();
  const el = document.getElementById('phase-block-'+num);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── Render content ───────────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');
  const dash = document.getElementById('dashboard-view');
  if(state.filter.view === 'DASHBOARD') {
    content.style.display = 'none';
    dash.style.display = 'block';
    renderDashboard();
    return;
  }
  content.style.display = 'block';
  dash.style.display = 'none';
  content.innerHTML = '';

  PHASES.forEach(phase => {
    const visSteps = phase.steps.filter(s => stepVisible(s));
    if(!phaseVisible(phase)) return;

    const done = phase.steps.filter(s => getStatus(s.num)==='DONE').length;
    const total = phase.steps.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const [bg, fg] = phaseColor(phase.num);

    const block = document.createElement('div');
    block.className = 'phase-block';
    block.id = 'phase-block-'+phase.num;

    const deps = phase.requires.length ? `← Dépend de: ${phase.requires.map(r=>'Phase '+r).join(' · ')}` : '';
    const whyId = 'why-'+phase.num;

    block.innerHTML = `
      <div class="phase-header">
        <div class="phase-header-top">
          <div class="phase-badge" style="background:${bg};color:${fg}">P${phase.num}</div>
          <div class="phase-info">
            <div class="phase-title">${phase.title}</div>
            <div class="phase-subtitle">${phase.subtitle}</div>
            <div class="phase-meta">
              ${phase.score_before ? `<span class="phase-score">Score: <span>${phase.score_before}</span> → <span>${phase.score_after}</span></span>` : ''}
              ${deps ? `<span class="phase-deps">${deps}</span>` : ''}
              <span class="phase-score"><span>${done}</span>/${total} étapes terminées</span>
            </div>
          </div>
        </div>
        <div class="phase-progress-h">
          <div class="phase-bar-bg"><div class="phase-bar-fill" style="width:${pct}%"></div></div>
          <div class="phase-bar-label">${pct}%</div>
        </div>
        ${phase.why ? `<div class="phase-why-toggle" onclick="document.getElementById('${whyId}').classList.toggle('show')">▸ Pourquoi cette phase ?</div><div class="phase-why" id="${whyId}">${phase.why}</div>` : ''}
      </div>
    `;

    visSteps.forEach(step => {
      block.appendChild(renderStep(step));
    });

    content.appendChild(block);
  });

  if(content.innerHTML === '') {
    content.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Aucune étape ne correspond aux filtres sélectionnés.</div>';
  }
}

function renderStep(step) {
  const status = getStatus(step.num);
  const detailId = 'detail-'+step.num;
  const card = document.createElement('div');
  card.className = 'step-card' + (status==='DONE'?' done':'') + (status==='BLOCKED'?' blocked':'');
  card.id = 'step-card-'+step.num;

  const files = (step.files||[]).map(f=>`<span class="file-tag">${f}</span>`).join(' ');
  const statusIcon = status==='DONE'?'✓':status==='IN_PROGRESS'?'⟳':status==='BLOCKED'?'✗':'';

  card.innerHTML = `
    <div class="step-top" onclick="toggleDetail(${step.num})">
      <div class="step-check ${status.toLowerCase()}" onclick="event.stopPropagation();cycleStatus(${step.num})" title="Cliquer pour changer le statut">${statusIcon}</div>
      <div class="step-num">#${step.num}</div>
      <div class="step-title">${step.title}</div>
      <div class="badges">
        <span class="badge prio-${step.priority}">${step.priority}</span>
        <span class="badge status-badge status-${status}" onclick="event.stopPropagation();openStatusMenu(${step.num},event)">${statusLabel(status)}</span>
        <span class="badge h-badge h-${step.horizon}">${step.horizon}</span>
        ${step.is_mvp?'<span class="tag tag-mvp">MVP</span>':''}
        ${step.is_enterprise?'<span class="tag tag-enterprise">ENT</span>':''}
        ${step.rollback_needed?'<span class="tag tag-rollback">ROLLBACK</span>':''}
      </div>
    </div>
    <div class="step-detail" id="${detailId}">
      <div class="detail-grid">
        <div class="detail-section detail-full">
          <div class="detail-label">📋 Description</div>
          <div class="detail-content desc">${step.desc}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">✅ Critère de succès</div>
          <div class="detail-content success-text">${step.success}</div>
        </div>
        ${step.risk ? `<div class="detail-section"><div class="detail-label">⚠️ Risque si non fait</div><div class="detail-content risk-text">${step.risk}</div></div>` : ''}
        <div class="detail-section detail-full">
          <div class="detail-label">📁 Fichiers impactés</div>
          <div class="detail-content">${files||'<span style="color:var(--muted)">Non spécifié</span>'}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">🔧 Dette technique</div>
          <div class="detail-content td-${step.tech_debt}">${step.tech_debt}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">🔄 Rollback nécessaire</div>
          <div class="detail-content">${step.rollback_needed?'<span style="color:var(--amber)">Oui — plan requis</span>':'Non'}</div>
        </div>
        <div class="detail-section detail-full">
          <div class="detail-label">🎯 Statut</div>
          <select class="status-select" onchange="setStatus(${step.num},this.value)">
            <option value="TODO" ${status==='TODO'?'selected':''}>📋 À faire</option>
            <option value="IN_PROGRESS" ${status==='IN_PROGRESS'?'selected':''}>⟳ En cours</option>
            <option value="DONE" ${status==='DONE'?'selected':''}>✅ Terminé</option>
            <option value="BLOCKED" ${status==='BLOCKED'?'selected':''}>🚫 Bloqué</option>
          </select>
        </div>
        <div class="detail-section detail-full">
          <div class="detail-label">📝 Notes</div>
          <textarea class="notes-area" placeholder="Ajouter des notes, blockers, liens..." onchange="setNotes(${step.num},this.value)">${getNotes(step.num)}</textarea>
        </div>
      </div>
    </div>
  `;
  return card;
}

function statusLabel(s) {
  return {TODO:'À faire',IN_PROGRESS:'En cours',DONE:'Terminé',BLOCKED:'Bloqué'}[s]||s;
}

function toggleDetail(num) {
  const d = document.getElementById('detail-'+num);
  if(d) d.classList.toggle('open');
}

function cycleStatus(num) {
  const cycle = ['TODO','IN_PROGRESS','DONE','BLOCKED'];
  const cur = getStatus(num);
  const next = cycle[(cycle.indexOf(cur)+1)%cycle.length];
  setStatus(num, next);
}

function openStatusMenu(num, e) {
  // Simple — use the select inside the detail panel
  const detail = document.getElementById('detail-'+num);
  if(detail) {
    if(!detail.classList.contains('open')) detail.classList.add('open');
    detail.querySelector('select')?.focus();
  }
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const stats = globalStats();
  const pct = Math.round(stats.done/stats.total*100);
  const mvpDone = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.is_mvp && getStatus(s.num)==='DONE').length, 0);
  const mvpTotal = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.is_mvp).length, 0);
  const critDone = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.priority==='CRITIQUE' && getStatus(s.num)==='DONE').length, 0);
  const critTotal = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.priority==='CRITIQUE').length, 0);

  const dash = document.getElementById('dashboard-view');
  dash.innerHTML = `
    <div class="dash-cards">
      <div class="dash-card"><div class="dash-card-val">${pct}%</div><div class="dash-card-lbl">Avancement global</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--green)">${stats.done}</div><div class="dash-card-lbl">Étapes terminées</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--amber)">${stats.inprogress}</div><div class="dash-card-lbl">En cours</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--red)">${stats.blocked}</div><div class="dash-card-lbl">Bloquées</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--purple)">${mvpDone}/${mvpTotal}</div><div class="dash-card-lbl">MVP</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--blue)">${critDone}/${critTotal}</div><div class="dash-card-lbl">CRITIQUE résolues</div></div>
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Avancement par phase</div>
      ${PHASES.map(p => {
        const done = p.steps.filter(s => getStatus(s.num)==='DONE').length;
        const pct2 = p.steps.length ? Math.round(done/p.steps.length*100) : 0;
        const [bg,fg] = phaseColor(p.num);
        return `<div class="phase-row">
          <div class="phase-row-name"><span style="background:${bg};color:${fg};padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700;margin-right:6px">P${p.num}</span>${p.title.replace(/PHASE \d+ — /,'')}</div>
          <div class="phase-row-bar"><div class="phase-row-fill" style="width:${pct2}%;background:${pct2===100?'var(--green)':pct2>50?'var(--amber)':'var(--blue)'}"></div></div>
          <div class="phase-row-pct">${pct2}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Répartition par horizon</div>
      ${['COURT','MOYEN','LONG'].map(h => {
        const steps = PHASES.flatMap(p=>p.steps).filter(s=>s.horizon===h);
        const done = steps.filter(s=>getStatus(s.num)==='DONE').length;
        const pct3 = steps.length ? Math.round(done/steps.length*100) : 0;
        const col = h==='COURT'?'var(--blue)':h==='MOYEN'?'var(--purple)':'var(--green)';
        return `<div class="phase-row">
          <div class="phase-row-name"><span class="h-badge h-${h}" style="margin-right:6px">${h}</span> (${steps.length} étapes)</div>
          <div class="phase-row-bar"><div class="phase-row-fill" style="width:${pct3}%;background:${col}"></div></div>
          <div class="phase-row-pct">${pct3}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="dash-section">
      <div class="dash-section-title">🚫 Étapes bloquées</div>
      ${PHASES.flatMap(p=>p.steps).filter(s=>getStatus(s.num)==='BLOCKED').map(s=>`
        <div style="background:var(--surface);border:1px solid var(--red);border-radius:6px;padding:8px 12px;margin-bottom:4px;font-size:11px">
          <span style="color:var(--muted)">#${s.num} P${s.phase_num}</span>
          <span style="margin:0 8px;font-weight:600">${s.title}</span>
          ${s.risk?`<span style="color:var(--red);font-size:10px">⚠ ${s.risk.substring(0,100)}...</span>`:''}
        </div>
      `).join('') || '<div style="color:var(--green);font-size:12px">Aucune étape bloquée ✓</div>'}
    </div>
  `;
}

// ─── Global stats update ──────────────────────────────────────────────────────
function updateGlobalStats() {
  const s = globalStats();
  const pct = Math.round(s.done/s.total*100);
  document.getElementById('global-bar').style.width = pct+'%';
  document.getElementById('global-label').textContent = s.done+' / '+s.total;
  document.getElementById('stat-done').textContent = s.done;
  document.getElementById('stat-progress').textContent = s.inprogress;
  document.getElementById('stat-blocked').textContent = s.blocked;
}

function renderAll() {
  renderSidebar();
  renderContent();
  updateGlobalStats();
}

// ─── Export Markdown ──────────────────────────────────────────────────────────
function exportMarkdown() {
  let md = '# SolarNext — Master Roadmap\n\n';
  md += `> Exporté le ${new Date().toLocaleDateString('fr-FR')} | ${globalStats().done}/108 étapes terminées\n\n`;
  md += '## Table des matières\n\n';
  PHASES.forEach(p => {
    md += `- [Phase ${p.num}: ${p.title.replace(/PHASE \d+ — /,'')}](#phase-${p.num})\n`;
  });
  md += '\n---\n\n';
  PHASES.forEach(phase => {
    const done = phase.steps.filter(s=>getStatus(s.num)==='DONE').length;
    const pct = Math.round(done/phase.steps.length*100);
    md += `## Phase ${phase.num}: ${phase.title.replace(/PHASE \d+ — /,'')}\n\n`;
    md += `**Sous-titre**: ${phase.subtitle}\n`;
    if(phase.score_before) md += `**Score**: ${phase.score_before} → ${phase.score_after}\n`;
    if(phase.requires.length) md += `**Dépend de**: ${phase.requires.map(r=>'Phase '+r).join(', ')}\n`;
    md += `**Avancement**: ${done}/${phase.steps.length} (${pct}%)\n\n`;
    if(phase.why) md += `> ${phase.why.substring(0,200)}...\n\n`;
    phase.steps.forEach(step => {
      const status = getStatus(step.num);
      const check = status==='DONE'?'[x]':'[ ]';
      md += `### ${check} #${step.num} — ${step.title}\n\n`;
      md += `| Champ | Valeur |\n|---|---|\n`;
      md += `| Priorité | ${step.priority} |\n`;
      md += `| Statut | ${statusLabel(status)} |\n`;
      md += `| Horizon | ${step.horizon} |\n`;
      md += `| MVP | ${step.is_mvp?'Oui':'Non'} |\n`;
      md += `| Enterprise | ${step.is_enterprise?'Oui':'Non'} |\n`;
      md += `| Dette technique | ${step.tech_debt} |\n`;
      md += `| Rollback nécessaire | ${step.rollback_needed?'Oui':'Non'} |\n\n`;
      if(step.desc) md += `**Description**:\n${step.desc.substring(0,400)}...\n\n`;
      if(step.success) md += `**Critère de succès**: ${step.success}\n\n`;
      if(step.risk) md += `**Risque si non fait**: ${step.risk}\n\n`;
      if(step.files?.length) md += `**Fichiers impactés**: ${step.files.join(', ')}\n\n`;
      const notes = getNotes(step.num);
      if(notes) md += `**Notes**: ${notes}\n\n`;
      md += '---\n\n';
    });
  });

  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SolarNext_Master_Roadmap.md';
  a.click();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadState();
renderAll();
</script>
</body>
</html>
