<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SolarNext — Master Roadmap CTO</title>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273549;--border:#334155;
  --accent:#ea580c;--accent2:#f97316;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --sidebar-w:300px;--header-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5;overflow:hidden;height:100vh;display:flex;flex-direction:column}
/* Header */
#header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;position:relative;z-index:10}
#header .logo{color:var(--accent);font-weight:800;font-size:16px;white-space:nowrap}
#header .subtitle{color:var(--muted);font-size:11px}
#global-progress-wrap{flex:1;display:flex;align-items:center;gap:10px;max-width:400px;margin:0 20px}
#global-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
#global-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
#global-label{font-size:11px;color:var(--muted);white-space:nowrap}
.header-stats{display:flex;gap:12px}
.hstat{text-align:center}
.hstat-val{font-weight:700;font-size:14px;color:var(--text)}
.hstat-lbl{font-size:10px;color:var(--muted)}
/* Filters */
#filters{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.filter-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s}
.filter-pill:hover,.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
#search-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-size:12px;width:180px;outline:none}
#search-input:focus{border-color:var(--accent)}
.filter-sep{width:1px;height:20px;background:var(--border)}
.view-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s}
.view-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* Main layout */
#main{flex:1;display:flex;overflow:hidden}
/* Sidebar */
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.phase-nav{padding:4px 8px;cursor:pointer;border-radius:6px;margin:1px 6px;display:flex;align-items:center;gap:8px;transition:background .15s}
.phase-nav:hover{background:var(--surface2)}
.phase-nav.active{background:var(--surface2);border-left:3px solid var(--accent);padding-left:5px}
.phase-num{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.phase-nav-info{flex:1;min-width:0}
.phase-nav-title{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.phase-progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.phase-count{font-size:10px;color:var(--muted);white-space:nowrap}
/* Content */
#content{flex:1;overflow-y:auto;padding:16px}
.phase-block{margin-bottom:32px}
.phase-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px}
.phase-header-top{display:flex;align-items:flex-start;gap:12px}
.phase-badge{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.phase-info{flex:1}
.phase-title{font-size:14px;font-weight:700;color:var(--text)}
.phase-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.phase-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.phase-score{font-size:11px;color:var(--muted)}
.phase-score span{color:var(--text);font-weight:600}
.phase-deps{font-size:11px;color:var(--purple)}
.phase-progress-h{margin-top:8px;display:flex;align-items:center;gap:8px}
.phase-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.phase-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.phase-bar-label{font-size:10px;color:var(--muted);white-space:nowrap}
.phase-why{margin-top:8px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;display:none}
.phase-why.show{display:block}
.phase-why-toggle{font-size:10px;color:var(--accent);cursor:pointer;margin-top:4px}
/* Steps */
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.step-card:hover{border-color:var(--accent)}
.step-card.done{opacity:.6}
.step-card.done .step-title{text-decoration:line-through;color:var(--muted)}
.step-card.blocked{border-color:var(--red)}
.step-top{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.step-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.step-check:hover{border-color:var(--accent)}
.step-check.done{background:var(--green);border-color:var(--green)}
.step-check.in_progress{background:var(--amber);border-color:var(--amber)}
.step-check.blocked{background:var(--red);border-color:var(--red)}
.step-num{font-size:10px;color:var(--muted);flex-shrink:0;width:24px}
.step-title{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.prio-CRITIQUE{background:#7f1d1d;color:#fca5a5}
.prio-MAJEUR{background:#78350f;color:#fcd34d}
.prio-MOYEN{background:#14532d;color:#86efac}
.status-badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;cursor:pointer}
.status-TODO{background:var(--surface2);color:var(--muted)}
.status-IN_PROGRESS{background:#1d3a6b;color:#93c5fd}
.status-DONE{background:#14532d;color:#86efac}
.status-BLOCKED{background:#7f1d1d;color:#fca5a5}
.h-badge{font-size:10px;padding:2px 6px;border-radius:8px;}
.h-COURT{background:#1e3a5f;color:#60a5fa}
.h-MOYEN{background:#3b2d6b;color:#c4b5fd}
.h-LONG{background:#1a2e2a;color:#34d399}
.tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.tag-mvp{background:#7c3aed;color:#e9d5ff}
.tag-enterprise{background:#0e7490;color:#a5f3fc}
.tag-rollback{background:#7f1d1d;color:#fca5a5}
/* Step detail */
.step-detail{padding:0 14px 12px 46px;display:none;border-top:1px solid var(--border)}
.step-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.detail-section{background:var(--surface2);border-radius:6px;padding:8px 10px}
.detail-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-content{font-size:11px;color:var(--text)}
.detail-content.desc{white-space:pre-wrap;font-size:11px;color:var(--muted);line-height:1.6}
.detail-full{grid-column:1/-1}
.file-tag{display:inline-block;background:var(--border);padding:1px 6px;border-radius:4px;font-size:10px;color:var(--muted);margin:1px;font-family:monospace}
.risk-text{color:#fca5a5;font-size:11px}
.success-text{color:#86efac;font-size:11px}
.td-CRITICAL{color:#fca5a5}
.td-HIGH{color:#fcd34d}
.td-MEDIUM{color:#93c5fd}
.td-LOW{color:#86efac}
.status-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;cursor:pointer;outline:none}
.notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;resize:vertical;min-height:60px;font-family:inherit;outline:none}
.notes-area:focus{border-color:var(--accent)}
/* Dashboard */
#dashboard-view{padding:16px;display:none}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.dash-card-val{font-size:28px;font-weight:800;color:var(--accent)}
.dash-card-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.dash-section{margin-bottom:20px}
.dash-section-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.phase-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.phase-row-name{font-size:11px;color:var(--muted);width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-row-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.phase-row-fill{height:100%;border-radius:3px;background:var(--green)}
.phase-row-pct{font-size:10px;color:var(--muted);width:32px;text-align:right}
/* Export button */
#export-btn{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(234,88,12,.4);z-index:100}
#export-btn:hover{background:var(--accent2)}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
/* Hidden */
.hidden{display:none!important}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo">⚡ SolarNext</div>
    <div class="subtitle">Master Roadmap — CTO Operating System</div>
  </div>
  <div id="global-progress-wrap">
    <div id="global-bar-bg"><div id="global-bar" style="width:0%"></div></div>
    <div id="global-label">0 / 108</div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="stat-done">0</div><div class="hstat-lbl">Terminées</div></div>
    <div class="hstat"><div class="hstat-val" id="stat-progress">0</div><div class="hstat-lbl">En cours</div></div>
    <div class="hstat"><div class="hstat-val" id="stat-blocked">0</div><div class="hstat-lbl">Bloquées</div></div>
    <div class="hstat"><div class="hstat-val">26</div><div class="hstat-lbl">Phases</div></div>
    <div class="hstat"><div class="hstat-val">108</div><div class="hstat-lbl">Étapes</div></div>
  </div>
</div>

<div id="filters">
  <span style="font-size:11px;color:var(--muted);font-weight:600">VUE</span>
  <button class="view-btn active" onclick="setView('ALL')">Tout</button>
  <button class="view-btn" onclick="setView('DASHBOARD')">📊 Dashboard</button>
  <button class="view-btn" onclick="setView('MVP')">🎯 MVP</button>
  <button class="view-btn" onclick="setView('ENTERPRISE')">🏢 Enterprise</button>
  <div class="filter-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-weight:600">HORIZON</span>
  <button class="filter-pill active" data-filter="horizon" data-val="ALL" onclick="toggleFilter('horizon','ALL',this)">Tous</button>
  <button class="filter-pill" data-filter="horizon" data-val="COURT" onclick="toggleFilter('horizon','COURT',this)">Court terme</button>
  <button class="filter-pill" data-filter="horizon" data-val="MOYEN" onclick="toggleFilter('horizon','MOYEN',this)">Moyen terme</button>
  <button class="filter-pill" data-filter="horizon" data-val="LONG" onclick="toggleFilter('horizon','LONG',this)">Long terme</button>
  <div class="filter-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-weight:600">PRIORITÉ</span>
  <button class="filter-pill active" data-filter="priority" data-val="ALL" onclick="toggleFilter('priority','ALL',this)">Toutes</button>
  <button class="filter-pill" data-filter="priority" data-val="CRITIQUE" onclick="toggleFilter('priority','CRITIQUE',this)">Critique</button>
  <button class="filter-pill" data-filter="priority" data-val="MAJEUR" onclick="toggleFilter('priority','MAJEUR',this)">Majeur</button>
  <div class="filter-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-weight:600">STATUT</span>
  <button class="filter-pill active" data-filter="status" data-val="ALL" onclick="toggleFilter('status','ALL',this)">Tous</button>
  <button class="filter-pill" data-filter="status" data-val="TODO" onclick="toggleFilter('status','TODO',this)">À faire</button>
  <button class="filter-pill" data-filter="status" data-val="IN_PROGRESS" onclick="toggleFilter('status','IN_PROGRESS',this)">En cours</button>
  <button class="filter-pill" data-filter="status" data-val="BLOCKED" onclick="toggleFilter('status','BLOCKED',this)">Bloqué</button>
  <button class="filter-pill" data-filter="status" data-val="DONE" onclick="toggleFilter('status','DONE',this)">Terminé</button>
  <div class="filter-sep"></div>
  <input id="search-input" type="search" placeholder="🔍 Rechercher..." oninput="onSearch(this.value)">
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="content"></div>
  <div id="dashboard-view"></div>
</div>

<button id="export-btn" onclick="exportMarkdown()">⬇ Export Markdown</button>

<script>
const PHASES = [{"num": 0, "title": "PHASE 0 — Fondation Produit & Stabilisation Métier", "subtitle": "Éliminer la dette immédiate avant de construire quoi que ce soit d'autre", "score_before": "4/10", "score_after": "8/10", "requires": [], "why": "Toute amélioration construite sur une base instable est deux fois plus coûteuse à maintenir. Cette phase est le prérequis absolu de toutes les autres : un build cassé ne peut pas être déployé, des erreurs silencieuses produisent des bugs impossibles à diagnostiquer.", "steps": [{"num": 1, "title": "Corriger les erreurs de compilation pré-existantes", "priority": "CRITIQUE", "files": ["frontend/src/components/3d/Inline3DViewerBridge.tsx (ligne 1078 tronquée)", "frontend/src/components/3d/SolarScene3DViewer.tsx (ligne 3451 tronquée)"], "desc": "Ces deux fichiers du moteur calpinage 3D sont tronqués et provoquent des erreurs 'Unexpected end of file' au build Vite. Aucun déploiement ne peut réussir dans cet état.\n\nProcédure de récupération :\n1. git log --oneline -- frontend/src/components/3d/Inline3DViewerBridge.tsx pour identifier le dernier commit valide\n2. git show <sha>:frontend/src/components/3d/Inline3DViewerBridge.tsx > fichier_restored.tsx pour extraire la version complète\n3. Si aucun commit antérieur ne contient la version complète : reconstruire les composants à partir du dernier état cohérent, des props et des imports visibles dans les fichiers partiels\n4. Vérifier que le build Vite passe : npx vite build --mode production 2>&1 | grep -E 'error|Error'\n\nCes fichiers appartiennent au module Étude PV (calpinage 3D), pas à la DP. Une fois corrigés, ils seront le point d'entrée de la Phase 4 (Moteur Géométrique PV).", "success": "npx vite build --mode production se termine sans erreur. Les modules 3D s'affichent correctement en développement.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "Build cassé = aucun déploiement possible. Bloque toute la roadmap.", "status": "TODO", "phase_num": 0}, {"num": 2, "title": "Validation des variables d'environnement au démarrage serveur", "priority": "CRITIQUE", "files": ["backend/config/env.js (nouveau)", "backend/server.js (import en premier)"], "desc": "Créer backend/config/env.js, importé en toute première ligne de server.js, avant Express, avant la connexion DB, avant tout autre module.\n\nVariables à valider avec leurs contraintes strictes :\n• DATABASE_URL — doit commencer par postgresql:// ou postgres://\n• JWT_SECRET — longueur minimum 32 caractères\n• PDF_RENDERER_BASE_URL — URL http/https valide et joignable\n• SMTP_HOST, SMTP_PORT (entier), SMTP_USER, SMTP_PASS\n• NODE_ENV — enum strict : 'development' | 'production' | 'test'\n\nEn NODE_ENV=production : process.exit(1) immédiat avec message lisible si variable absente ou invalide. En développement : warning coloré mais pas d'arrêt pour les variables optionnelles. Ce module sera enrichi en Phase 9 (Stripe) et Phase 5 (moteur financier).", "success": "Un déploiement avec JWT_SECRET trop court plante au démarrage avec un message explicite. Aucune erreur cryptique ne survient 30 minutes après le lancement.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Variables manquantes découvertes en prod = crash mystérieux 30 min après démarrage.", "status": "TODO", "phase_num": 0}, {"num": 3, "title": "Gestion globale des erreurs frontend — Error Boundary & toasts cohérents", "priority": "MAJEUR", "files": ["frontend/src/components/ErrorBoundary.tsx (nouveau)", "frontend/src/lib/api.ts", "frontend/src/main.tsx"], "desc": "Deux axes complémentaires indispensables avant tout développement de nouvelles features :\n\n1. Error Boundary React (main.tsx) : intercepte les erreurs de rendu non gérées. Affiche une page d'erreur conviviale : logo SolarNext, message 'Une erreur inattendue est survenue', bouton 'Recharger', lien 'Retour au tableau de bord'. Relaie l'erreur vers Sentry dès la Phase 7.\n\n2. Intercepteur HTTP centralisé (api.ts) :\n• 401 → 'Session expirée' + redirection /login automatique\n• 403 → 'Action non autorisée pour votre rôle'\n• 422 → afficher les erreurs de validation champ par champ (venant du middleware Zod — Phase 2)\n• 429 → 'Trop de requêtes, attendez X secondes' (lire header Retry-After)\n• 500-599 → 'Erreur serveur, notre équipe a été notifiée'\n• Timeout → 'Connexion perdue, vérifiez votre réseau'\n\nFormat unifié des erreurs backend : { error: string, code?: string, details?: Record<string, string[]> }. Aucun message technique (stack trace, identifiant interne) visible par l'utilisateur final.", "success": "Chaque erreur HTTP a un toast clair en français. Aucune stack trace n'est visible par un utilisateur. L'Error Boundary empêche un crash de paralyser toute l'application.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Erreurs silencieuses = utilisateurs qui perdent des données sans comprendre pourquoi.", "status": "TODO", "phase_num": 0}, {"num": 4, "title": "Assainissement TypeScript — Strict mode et suppression des 'any'", "priority": "MOYEN", "files": ["tsconfig.json (strict: true)", "frontend/src/ (global)", "TECH_DEBT.md (nouveau)"], "desc": "Activer strict: true, noUnusedLocals: true, noUnusedParameters: true dans tsconfig.json. Corriger les erreurs remontées par ordre de criticité :\n\n1. Tous les 'as any' dans les appels API (remplacer par les types Zod inférés — voir Phase 1)\n2. Props non typées dans les composants React\n3. Imports inutilisés\n4. console.log résiduels en dehors des tests\n\nCréer TECH_DEBT.md listant les 'any' tolérés temporairement avec justification et ticket associé. Ce fichier est la mémoire de la dette technique : il doit être maintenu à jour à chaque PR.\n\nObjectif : tsc --noEmit retourne 0 erreur. Le CI (Phase 6) bloquera tout nouveau 'any' non documenté.", "success": "tsc --noEmit retourne 0 erreur. Chaque nouveau 'any' introduit par un développeur déclenche une erreur CI documentée dans TECH_DEBT.md.", "horizon": "COURT", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Dette TypeScript croissante = bugs de type découverts en runtime plutôt qu'à la compilation.", "status": "TODO", "phase_num": 0}]}, {"num": 1, "title": "PHASE 1 — Single Source of Truth & Contrats de Données", "subtitle": "Définir une fois, utiliser partout — les schémas canoniques de SolarNext", "score_before": "4/10", "score_after": "8/10", "requires": [0], "why": "Sans source de vérité unique, chaque module redéfinit ses propres types, crée ses propres validations et diverge silencieusement. Pour une plateforme manipulant des données contractuelles et financières, cette divergence est inacceptable. Les Phases 4 et 5 (moteurs géométrique et financier) dépendent directement de cette phase.", "steps": [{"num": 5, "title": "Schémas Zod canoniques — Lead, Étude, Géométrie, Scénario Financier, Devis, Facture", "priority": "CRITIQUE", "files": ["shared/schemas/lead.schema.ts (nouveau)", "shared/schemas/study.schema.ts", "shared/schemas/geometry.schema.ts (nouveau — pour Phase 4)", "shared/schemas/scenario.schema.ts (nouveau — pour Phase 5)", "shared/schemas/quote.schema.ts", "shared/schemas/invoice.schema.ts"], "desc": "Créer un dossier shared/schemas/ à la racine contenant les schémas Zod qui font autorité pour toute la plateforme. Chaque entité a trois schémas :\n• CreateXxxSchema — validation à la création, avec toutes les règles métier\n• UpdateXxxSchema — tous les champs optionnels (patch partiel)\n• XxxResponseSchema — ce que le backend retourne, avec les champs calculés\n\nSchéma géométrique (nouveau — fondation Phase 4) :\n• Point2D, Point3D : { x, y, z? } avec validation coordonnées GPS\n• RoofPolygon : tableau de points fermé, winding order CW ou CCW\n• PanelLayout : position, rotation, inclinaison, orientation\n• ShadingResult : ombrage horaire ou mensuel par panneau\n\nSchéma scénario financier (nouveau — fondation Phase 5) :\n• EnergyScenario : production mensuelle[12], annuelle, ratio autoconsommation\n• FinancialSnapshot : coût installation, aides, ROI, TRI, VAN, OA — avec hash d'intégrité\n• VirtualBatteryConfig : capacité, DoD, efficacité charge/décharge\n\nTypes TypeScript inférés automatiquement : type Lead = z.infer<typeof LeadResponseSchema>.", "success": "Modifier une règle métier dans un schéma la propage immédiatement au formulaire frontend ET à la validation backend. Un champ géométrique invalide est refusé en amont du moteur de calcul.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "Sans schémas canoniques, chaque module redéfinit ses types — divergence silencieuse garantie.", "status": "TODO", "phase_num": 1}, {"num": 6, "title": "Versioning des contrats de données — Snapshots et détection de breaking changes", "priority": "MAJEUR", "files": ["shared/schemas/CHANGELOG.md (nouveau)", "backend/middleware/schemaVersion.middleware.js (nouveau)", ".github/workflows/schema-check.yml"], "desc": "Chaque schéma Zod a une version sémantique. Tout changement est documenté dans CHANGELOG.md. Le backend retourne le header X-Schema-Version: <hash> sur chaque réponse. Le frontend détecte un changement de version et force un reload propre (évite les états React désynchronisés après un déploiement).\n\nCI : un job GitHub Actions génère un snapshot JSON de chaque schéma et le compare au snapshot précédent. Si un champ requis change de type ou est supprimé, le CI échoue avec le message 'BREAKING CHANGE detected in scenario.schema.ts: field roi_years changed from number to string'. Le développeur doit documenter explicitement le changement ET créer la migration DB correspondante.\n\nRègle absolue : tout changement de schéma impliquant une colonne DB doit avoir une migration SQL correspondante. Pas de changement de schéma sans migration. Documenté dans CONTRIBUTING.md.", "success": "Un changement breaking de schéma non documenté bloque le CI avant le merge. Le frontend se recharge proprement après tout déploiement sans état React corrompu.", "horizon": "COURT", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": true, "risk": "Breaking change non détecté → frontend désynchronisé → données corrompues.", "status": "TODO", "phase_num": 1}, {"num": 7, "title": "Stratégie de migration DB — Rollback, compatibilité et snapshots de schéma", "priority": "MAJEUR", "files": ["backend/db/migrations/ (156 existantes)", "backend/scripts/db-snapshot.js (nouveau)", "RUNBOOK.md (nouveau)"], "desc": "Avec 156 migrations existantes, le risque d'une migration cassante en production est réel. Toute nouvelle migration doit avoir une fonction down() testée.\n\n1. Audit des 20 dernières migrations : vérifier que chacune a un down() valide.\n\n2. Snapshot de schéma : script db-snapshot.js dump pg_dump --schema-only vers db/schema.sql committé dans git à chaque migration. Historique visuel des changements de schéma.\n\n3. Règle de compatibilité ascendante (blue/green) : pas de DROP COLUMN immédiat. Cycle en 3 migrations : déprecation → migration des données → suppression en migration séparée.\n\n4. RUNBOOK.md : procédure de rollback en production (<5 min), liste des contacts d'urgence, définition des niveaux d'incident (P0/P1/P2), checklist post-incident. Ce document est critique pour la Phase 16 (Résilience).", "success": "En cas de migration cassante, le rollback s'exécute en moins de 5 minutes sans perte de données. Le schema.sql dans git montre chaque changement de façon lisible.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": true, "risk": "Migration cassante en production = perte de données ou indisponibilité prolongée.", "status": "TODO", "phase_num": 1}]}, {"num": 2, "title": "PHASE 2 — Architecture Backend par Domaines Métier", "subtitle": "Passer d'un backend plat à une structure lisible par domaine — prérequis du moteur PV", "score_before": "5/10", "score_after": "8/10", "requires": [0, 1], "why": "La restructuration par domaines est le prérequis pour que les Phases 4 et 5 (moteurs géométrique et financier) puissent être construits de façon isolée et testable. Un domaine pv-engine/ indépendant permet de tester les calculs sans dépendance Express.", "steps": [{"num": 8, "title": "Restructurer le backend par domaines métier (DDD léger)", "priority": "MAJEUR", "files": ["backend/domains/ (nouveau)", "backend/domains/pv-engine/ (nouveau — prépare Phase 4 et 5)"], "desc": "Réorganiser la structure de backend/ :\n\nbackend/domains/\n  ├── auth/            (login, register, refresh, MFA)\n  ├── leads/           (CRUD, Kanban, assignation)\n  ├── studies/         (études PV, versioning — contient les moteurs)\n  │   ├── geometry/    (moteur géométrique — Phase 4)\n  │   └── financial/   (moteur financier — Phase 5)\n  ├── quotes/          (devis, lignes, remises, PDF)\n  ├── invoices/        (factures, paiements, relances)\n  ├── planning/        (RDV, rappels, iCal)\n  ├── mail/            (IMAP/SMTP, outbox worker)\n  ├── documents/       (upload, versioning, partage)\n  ├── billing/         (Stripe, plans, webhooks)\n  ├── organizations/   (membres, RBAC, onboarding)\n  └── pv-catalog/      (panneaux, onduleurs, batteries)\n\nChaque domaine : router.js, service.js, repository.js, validator.js (middleware Zod). Migration progressive : commencer par leads et quotes, maintenir les anciens chemins en réexportations.", "success": "Chaque domaine est modifiable indépendamment. Le domaine studies/geometry/ peut être testé sans démarrer Express.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Backend monolithique = impossible d'isoler et tester les moteurs PV indépendamment.", "status": "TODO", "phase_num": 2}, {"num": 9, "title": "Middleware de validation Zod centralisé — Validation des entrées API", "priority": "MAJEUR", "files": ["backend/middleware/validate.middleware.js (nouveau)", "backend/domains/*/router.js (tous)"], "desc": "Middleware générique validate({ body?, params?, query? }) qui applique les schémas Zod importés depuis shared/schemas/ (Phase 1) :\n\nrouter.post('/studies/:id/geometry', validate({ body: UpdateGeometrySchema, params: StudyParamsSchema }), controller)\n\nLe middleware :\n1. Parse et valide avec le schéma Zod\n2. Si valide : remplace req.body par les données typées et nettoyées\n3. Si invalide : 422 avec { error: 'Validation failed', details: { 'roof_polygon': ['Minimum 3 points requis'] } }\n\nLes controllers ne font plus aucune validation manuelle. Les types sont garantis au niveau du controller. Critique pour les endpoints du moteur géométrique (Phase 4) et financier (Phase 5) où des données malformées peuvent corrompre des calculs.", "success": "Aucun controller ne contient de code de validation. Passer une géométrie invalide (polygone non fermé) au moteur de calcul retourne 422 avant d'atteindre le moteur.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Validation dispersée = données malformées atteignent les moteurs de calcul.", "status": "TODO", "phase_num": 2}, {"num": 10, "title": "Refactoring LeadDetail.tsx — Découper le monolithe de 2248 lignes", "priority": "MAJEUR", "files": ["frontend/src/pages/LeadDetail.tsx", "frontend/src/components/lead-detail/ (nouveau dossier à créer)"], "desc": "LeadDetail.tsx fait 2248 lignes. Ce fichier concentre trop de responsabilités, est impossible à maintenir et bloque l'ajout des vues PV spécialisées de la Phase 12.\n\nDécouper en composants autonomes dans frontend/src/components/lead-detail/ :\n• LeadDetailHeader.tsx — titre, statut Kanban, actions rapides (appel, email, RDV)\n• LeadOverviewTab.tsx — informations client, adresse, source, tags\n• LeadPvSummaryCard.tsx — résumé PV : puissance visée, surface, orientation (fondation Phase 12)\n• LeadStudiesTab.tsx — liste études PV liées avec statut et version\n• LeadAppointmentsTab.tsx — RDV passés et à venir\n• LeadNotesTab.tsx — notes libres avec horodatage et auteur\n• LeadHistoryTab.tsx — journal d'activité automatique\n• LeadDocumentsTab.tsx — documents attachés\n• LeadFinancialTab.tsx — devis et factures liés, montants, statuts\n\nLeadDetail.tsx conserve uniquement : useQuery, état partagé (activeTab, leadId), router d'onglets et layout. Chaque onglet chargé avec React.lazy() (fondation Phase 14).", "success": "LeadDetail.tsx fait moins de 200 lignes. L'onglet LeadPvSummaryCard peut afficher les données du moteur géométrique sans toucher au reste de la fiche lead.", "horizon": "COURT", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Monolithe 2248 lignes = impossible d'ajouter les vues PV spécialisées sans régressions.", "status": "TODO", "phase_num": 2}]}, {"num": 3, "title": "PHASE 3 — Philosophie «Plateforme Critique»", "subtitle": "SolarNext manipule des données contractuelles, financières et techniques : tracer, protéger, immuabiliser", "score_before": "3/10", "score_after": "8/10", "requires": [1, 2], "why": "SolarNext n'est pas un CRM générique. Il génère des devis signés, des factures légales, des rapports d'étude PV remis à des clients finaux, et des calculs financiers qui engagent contractuellement l'installateur. Une erreur de calcul ou une modification silencieuse après signature a des conséquences juridiques et financières directes. Cette phase établit les principes d'architecture qui gouvernent toute la plateforme.", "steps": [{"num": 11, "title": "Immuabilité des données contractuelles — Snapshots et verrou post-signature", "priority": "CRITIQUE", "files": ["backend/db/migrations/ (colonnes locked_at, snapshot_hash)", "backend/middleware/immutabilityGuard.middleware.js (nouveau)", "backend/domains/quotes/service.js", "backend/domains/invoices/service.js"], "desc": "Règle fondamentale de la plateforme : une fois qu'un devis est signé ou une facture émise, aucune donnée le composant ne peut être modifiée silencieusement.\n\nImplémentation :\n1. Champ locked_at : TIMESTAMP nullable sur les tables quotes, invoices, studies. Mis à jour automatiquement au moment de la signature / émission.\n\n2. Middleware immutabilityGuard : toute tentative de mutation (PUT/PATCH/DELETE) sur un enregistrement avec locked_at non nul retourne 409 Locked avec le message 'Ce document est verrouillé — il a été signé le JJ/MM/YYYY. Créer un avenant ou un avoir.'\n\n3. Snapshot JSON immuable : à chaque verrouillage, sérialiser l'état complet (lignes, prix, calculs, paramètres PV) dans une colonne JSONB snapshot_v1. Calculer un SHA-256 du snapshot et le stocker dans snapshot_hash. Ce hash permet de prouver l'intégrité du document à tout moment.\n\n4. Actions autorisées après verrouillage : annulation (crée un avoir), duplication (crée une nouvelle version non verrouillée). Jamais de modification in-place.", "success": "Modifier une ligne de prix d'un devis signé retourne 409 Locked. Le SHA-256 du snapshot permet de prouver qu'aucune modification n'a eu lieu depuis la signature.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": true, "risk": "Modification silencieuse d'un devis signé = risque juridique direct pour l'installateur.", "status": "TODO", "phase_num": 3}, {"num": 12, "title": "Auditabilité totale des mutations — Qui a fait quoi et quand sur chaque donnée", "priority": "CRITIQUE", "files": ["backend/services/mutationLog.service.js (nouveau)", "backend/db/migrations/ (table mutation_log)", "backend/middleware/auditMutation.middleware.js (nouveau)"], "desc": "Table mutation_log : id, organization_id, user_id, table_name, record_id, operation (INSERT/UPDATE/DELETE), field_name, old_value (JSONB), new_value (JSONB), ip_address, created_at.\n\nEnregistrer automatiquement chaque mutation de données sensibles :\n• Toutes les modifications sur : leads, studies, quotes, invoices, documents, users\n• Champs à granularité fine : si 3 champs changent, créer 3 entrées (une par champ)\n• Les valeurs old/new sont stockées de façon lisible (pas d'ID opaque)\n\nImplémentation : trigger PostgreSQL sur les tables critiques (plus fiable qu'un middleware applicatif qui peut être bypassé). Alternativement : service auditMutation appelé explicitement dans chaque service métier.\n\nDifférent du journal de sécurité (Phase 11 Step 29) qui trace les événements auth. Ce journal trace les modifications de données métier.\n\nAccès : ADMIN voit les mutations de son organisation. SUPER_ADMIN voit tout. Rétention : 1 an en table chaude, archivage S3 au-delà.", "success": "L'administrateur peut répondre à la question 'Qui a modifié le prix de ce devis, de combien, et quand ?' en moins de 30 secondes.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Sans audit trail, impossible de répondre 'qui a modifié ce prix ?' → perte de confiance client.", "status": "TODO", "phase_num": 3}, {"num": 13, "title": "Suppression contrôlée — Soft delete, confirmation et période de grâce", "priority": "MAJEUR", "files": ["backend/db/migrations/ (colonne deleted_at sur toutes les tables critiques)", "backend/middleware/softDelete.middleware.js (nouveau)", "frontend/src/components/DeleteConfirmModal.tsx (nouveau)"], "desc": "Aucune donnée critique de SolarNext ne peut être détruite définitivement par un utilisateur standard.\n\nSoft delete : ajouter deleted_at TIMESTAMP NULL sur leads, studies, quotes, invoices, documents. Toutes les requêtes de lecture filtrent WHERE deleted_at IS NULL. La suppression applicative pose deleted_at = NOW() et anonymise les données PII (nom → [SUPPRIMÉ], email → deleted@...) mais conserve les agrégats financiers (montants).\n\nPériode de grâce (30 jours) : pendant cette période, l'administrateur peut restaurer l'enregistrement. Interface Admin > Corbeille avec liste et bouton 'Restaurer'.\n\nSuppression définitive : uniquement SUPER_ADMIN ou après délai de grâce. Déclenchée manuellement ou par un cron hebdomadaire de nettoyage.\n\nFrontend : tout bouton de suppression ouvre DeleteConfirmModal avec :\n• La description précise de ce qui sera supprimé\n• Le nombre d'éléments liés (études, devis, documents)\n• Champ de saisie du nom pour confirmation explicite\n• Message 'Vous avez 30 jours pour restaurer cet élément'", "success": "Une suppression accidentelle d'un lead avec 3 études et 2 devis est restaurable en 30 secondes depuis la corbeille, sans perte de données.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Suppression définitive accidentelle d'un lead avec 3 études et 2 devis = perte irréversible.", "status": "TODO", "phase_num": 3}, {"num": 14, "title": "Intégrité documentaire — Cohérence PDF ↔ Backend ↔ CRM", "priority": "CRITIQUE", "files": ["backend/services/documentIntegrity.service.js (nouveau)", "backend/domains/quotes/service.js", "backend/domains/studies/service.js"], "desc": "Un PDF généré par SolarNext fait foi contractuellement. Il doit être bit-à-bit identique au document que le backend a signé, et les données affichées dans le CRM doivent correspondre exactement au PDF.\n\nPrincipes :\n1. Un PDF est généré depuis un snapshot immuable (Step 11), pas depuis l'état courant de la DB. Si le devis est régénéré 6 mois plus tard, il produit le même document.\n\n2. Hash du PDF : calculer SHA-256 du fichier PDF généré. Stocker dans documents.file_hash. À chaque téléchargement, recalculer et comparer — alerter si le fichier a été altéré.\n\n3. Cohérence CRM ↔ PDF : les montants affichés dans la fiche lead financière sont lus depuis le snapshot verrouillé, pas recalculés. Jamais de 'total calculé à la volée' pour un devis verrouillé.\n\n4. Traçabilité de génération : logguer chaque génération de PDF : qui l'a demandée, à quelle heure, depuis quel snapshot, hash du résultat.", "success": "Régénérer un devis signé 12 mois plus tard produit exactement le même PDF. Le hash stocké prouve que le fichier n'a pas été altéré depuis sa génération.", "horizon": "COURT", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": true, "risk": "PDF généré différemment de ce qui a été signé = document contractuel invalide.", "status": "TODO", "phase_num": 3}]}, {"num": 4, "title": "PHASE 4 — Moteur Géométrique Photovoltaïque", "subtitle": "Architecture 2D/3D canonique, synchronisation, shading et performance — le cœur technologique de SolarNext", "score_before": "4/10", "score_after": "9/10", "requires": [1, 2, 3], "why": "Le moteur calpinage/3D/shading est le plus grand avantage technologique de SolarNext face à tout CRM générique. Ce n'est pas une feature visuelle — c'est l'infrastructure de calcul sur laquelle reposent les productions annuelles, les études PV et les rapports clients. Une désynchronisation entre la géométrie 2D et le modèle 3D produit des calculs faux qui se propagent dans les devis et les rapports. Cette phase établit l'architecture géométrique qui rend la plateforme fiable, cohérente et maintenable à long terme.", "steps": [{"num": 15, "title": "Source unique géométrique — Représentation canonique world-space / image-space", "priority": "CRITIQUE", "files": ["backend/domains/studies/geometry/canonical.service.js (nouveau)", "shared/schemas/geometry.schema.ts (de Phase 1)", "backend/db/migrations/ (table study_geometries)"], "desc": "Problème actuel : la géométrie 2D (coordonnées pixels sur image satellite) et la géométrie 3D (coordonnées métriques ou GPS) sont gérées séparément, créant des risques de désynchronisation silencieuse.\n\nArchitecture canonique à implémenter :\n1. World-space (source de vérité) : toutes les coordonnées sont stockées en GPS (latitude/longitude/altitude WGS84). C'est la représentation physiquement correcte.\n\n2. Image-space (dérivé) : les coordonnées pixels sur l'image satellite sont calculées à partir du world-space via la matrice de projection. Elles ne sont jamais stockées de façon indépendante — toujours recalculées.\n\n3. Table study_geometries : id, study_id, version, polygons (JSONB world-space), projection_params (JSONB — zoom, bounds, image_id), created_at, locked_at.\n\n4. Service canonical.service.js :\n• worldToImage(point: GPS, projection) → Point2D\n• imageToWorld(point: Point2D, projection) → GPS\n• validatePolygon(points: GPS[]) → ValidationResult (fermeture, winding order, intersection)\n\nCette architecture garantit que 2D et 3D sont toujours cohérents car ils partagent la même source.", "success": "Modifier un point de la géométrie 2D sur l'image satellite met à jour automatiquement la représentation 3D sans aucune action manuelle. Les deux vues sont toujours cohérentes.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": true, "risk": "Désynchronisation 2D/3D = calculs de production faux → devis incorrects remis à des clients.", "status": "TODO", "phase_num": 4}, {"num": 16, "title": "Validation géométrique — Intégrité topologique, obstacles et contraintes panneaux", "priority": "CRITIQUE", "files": ["backend/domains/studies/geometry/validator.service.js (nouveau)", "backend/domains/studies/geometry/panelLayout.service.js (nouveau)"], "desc": "Tout polygone de toiture entrant dans le moteur doit passer une validation complète avant de déclencher le moindre calcul de calepinage ou de shading.\n\nValidations géométriques :\n• Fermeture du polygone : le dernier point doit être identique au premier (tolérance 1cm)\n• Winding order : imposer CCW (counter-clockwise) pour les polygones de toiture\n• Auto-intersection : aucune arête ne croise une autre\n• Surface minimale : au moins 6 m² pour accueillir 1 panneau standard\n• Convexité locale : alerter (sans bloquer) si le polygone a des angles rentrants complexes\n\nContraintes des panneaux :\n• Chaque panneau placé doit être entièrement contenu dans le polygone de toiture\n• Distance minimale entre panneaux (définie par le catalogue)\n• Distance minimale aux bordures (réglementation)\n• Interdiction de placement sur les zones obstacles (cheminées, fenêtres de toit, VMC)\n\nExtensions de toiture : un panneau peut à déborder sur une zone adjacente si une extension explicite a été définie et validée.\n\nRésultat de validation : { isValid, errors: [{code, message, geometry}], warnings: [...] }", "success": "Un panneau placé en dehors du polygone de toiture ou sur un obstacle est rejeté avec le code d'erreur précis. La validation est exécutable en isolation sans le renderer 3D.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Panneau placé hors toiture = étude PV techniquement invalide remise au client.", "status": "TODO", "phase_num": 4}, {"num": 17, "title": "Synchronisation 2D ↔ 3D — Prévention des désynchronisations géométriques", "priority": "CRITIQUE", "files": ["frontend/src/components/3d/SolarScene3DViewer.tsx", "frontend/src/components/3d/Inline3DViewerBridge.tsx", "frontend/src/hooks/useGeometrySync.ts (nouveau)"], "desc": "La désynchronisation entre vue 2D et vue 3D est la source de la majorité des bugs du module calpinage. Elle se produit quand l'une des vues est mise à jour sans que l'autre soit notifiée.\n\nArchitecture de synchronisation :\n1. Store géométrique partagé (Zustand ou React Context) : useGeometryStore() expose { polygons, panels, projection, version }. Toute modification passe obligatoirement par ce store — jamais d'état local non partagé.\n\n2. Event bus géométrique : chaque modification émet un événement typé :\n• POLYGON_UPDATED → recalcul 3D + recalcul shading\n• PANEL_ADDED/REMOVED → recalcul des ombres locales\n• PROJECTION_CHANGED → recalcul image-space de tous les points\n\n3. Version de synchronisation : chaque état géométrique a un numéro de version. Si la vue 3D affiche la version N-1 pendant le rendu de la version N, elle affiche un indicateur 'Mise à jour en cours...' plutôt qu'un état incohérent.\n\n4. Test de cohérence : hook de développement qui vérifie à chaque render que les coordonnées 2D et 3D correspondent (désactivé en production).", "success": "Déplacer un pan de toiture en vue 2D met à jour la vue 3D en moins de 200ms sans état intermédiaire incohérent visible. Les coordonnées 2D et 3D sont toujours identiques au centimètre près.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "État incohérent entre 2D et 3D = bugs visuels impossibles à reproduire et diagnostiquer.", "status": "TODO", "phase_num": 4}, {"num": 18, "title": "Pipeline shading — Ombres proches (obstacles toiture) et lointaines (IGN/RGE ALTI)", "priority": "MAJEUR", "files": ["backend/domains/studies/geometry/shading.service.js (nouveau)", "backend/domains/studies/geometry/horizonMask.service.js (nouveau)", "backend/services/ignAltitude.service.js (nouveau)"], "desc": "Le calcul d'ombrage est le facteur le plus impactant sur la production annuelle. Un shading mal calculé peut fausser la production de 15 à 40%.\n\nShading proche (obstacles sur le toit) :\n• Modélisation des obstacles : cheminée, fenêtre de toit, VMC, antenne, mitoyenneté\n• Chaque obstacle a : position GPS, hauteur, forme (box/cylinder/polygon)\n• Calcul des ombres portées par ray casting pour chaque heure de la journée (8760h/an)\n• Résultat : matrice d'ombrage horaire par panneau (fraction [0-1])\n\nShading lointain (horizon masks) :\n• Récupérer les données altimétriques IGN RGE ALTI (résolution 1m) via API WCS\n• ou fallback SRTM (résolution 90m) si IGN indisponible\n• Calculer le masque d'horizon sur 360° autour de l'installation (rayon 500m)\n• Déterminer les heures de l'année où le soleil est sous ce masque\n• Combiner avec le shading proche pour obtenir l'ombrage total par panneau\n\nValidation physique : pour une installation en orientation sud à 30° à Lyon, le ratio de production avec/sans ombrage ne doit pas dépasser 25% d'écart sauf cas extrêmes documentés.", "success": "Le calcul d'ombrage d'une installation standard (10 panneaux, 2 cheminées, relief local) termine en moins de 5 secondes. Le masque d'horizon IGN est téléchargé et mis en cache automatiquement.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Shading mal calculé = écart de 15-40% sur la production annuelle → ROI client faux.", "status": "TODO", "phase_num": 4}, {"num": 19, "title": "Cache shading et performance du moteur géométrique", "priority": "MAJEUR", "files": ["backend/domains/studies/geometry/shadingCache.service.js (nouveau)", "backend/db/migrations/ (table shading_cache)", "frontend/src/components/3d/ (optimisation WebGL)"], "desc": "Le calcul 8760h est coûteux. Sans cache, chaque modification mineure (déplacer un panneau de 10cm) relance le calcul complet.\n\nStratégie de cache shading :\n• Clé de cache : hash(polygons_wkt + obstacles_json + location_GPS + month) Les données d'ensoleillement solaire ne varient pas d'une année sur l'autre pour une localisation donnée.\n• Le masque d'horizon IGN est mis en cache 1 an (données statiques)\n• Le shading proche est invalidé uniquement si un obstacle est ajouté/modifié\n• Le shading lointain n'est jamais invalidé pour la même localisation\n\nPerformance frontend 3D :\n• Utiliser OffscreenCanvas pour les calculs WebGL dans un Web Worker (non bloquant)\n• Level of Detail (LOD) : réduire la complexité du mesh 3D en mode édition, augmenter uniquement pour l'export PDF\n• Limiter à 30 fps en mode navigation, 60 fps uniquement en mode interaction active\n• Seuil d'alerte si le scene graph dépasse 50 000 polygones (toitures complexes multi-pans)", "success": "Modifier la position d'un panneau ne relance pas le calcul de shading lointain (mis en cache). Le rendu 3D reste fluide même sur une machine avec GPU intégré.", "horizon": "MOYEN", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans cache shading, chaque micro-modification relance un calcul de 5s = UX inutilisable.", "status": "TODO", "phase_num": 4}, {"num": 20, "title": "Export calpinage PDF et cohérence études ↔ implantation réelle", "priority": "MAJEUR", "files": ["backend/domains/studies/geometry/exportPdf.service.js (nouveau)", "backend/domains/studies/geometry/coherenceCheck.service.js (nouveau)"], "desc": "L'export du plan de calepinage dans le rapport d'étude doit représenter exactement ce que le moteur a calculé — pas une approximation visuelle.\n\nExport PDF du calpinage :\n• Rendu haute résolution (300 DPI minimum) de la vue 2D sur image satellite\n• Numérotation des panneaux (P1, P2... Pn)\n• Légende : nombre de panneaux, surface totale, puissance installée\n• Orientation Nord indiquée (flèche)\n• Coordonnées GPS du site\n• La position exacte de chaque panneau correspond aux coordonnées GPS calculées par le moteur\n\nCohérence études ↔ implantation réelle :\n• Validation GPS : les coordonnées de l'installation doivent correspondre à l'adresse du lead (tolérance 500m). Alerter si l'écart est supérieur.\n• Cohérence puissance : puissance totale du calepinage = somme des puissances panneau × nombre. Si l'écart dépasse 5% par rapport au devis, afficher un avertissement.\n• Cohérence surface : surface calepinée ≤ surface déclarée dans le lead. Bloquer si > 110%.", "success": "Le plan de calepinage exporté en PDF correspond pixel-à-pixel à la vue dans l'application. La surface calepinée ne dépasse jamais la surface déclarée.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Export PDF calepinage incohérent avec le viewer = document non conforme à l'installation réelle.", "status": "TODO", "phase_num": 4}]}, {"num": 5, "title": "PHASE 5 — Moteur Financier & Énergétique", "subtitle": "Fiabilité, reproductibilité et intégrité des calculs — une erreur ici impacte directement les devis clients", "score_before": "4/10", "score_after": "9/10", "requires": [1, 3, 4], "why": "Une erreur dans le moteur financier de SolarNext engendre un devis faux envoyé à un client réel, potentiellement signé et opposable. La cohérence entre production énergétique, autoconsommation, aides financières et ROI est le fondement de la proposition commerciale de tout installateur solaire. Ces calculs doivent être justes, reproductibles, versionnés et protégés contre tout recalcul silencieux après validation.", "steps": [{"num": 21, "title": "Schéma canonique scenarios_v2 — Structure immuable et versionnée", "priority": "CRITIQUE", "files": ["backend/domains/studies/financial/scenario.service.js (nouveau)", "shared/schemas/scenario.schema.ts (de Phase 1)", "backend/db/migrations/ (table financial_scenarios)"], "desc": "La table financial_scenarios est le registre de tous les scénarios de simulation financière liés à une étude PV. Elle est la source de vérité pour tout calcul économique.\n\nStructure de la table :\n• id, study_id, version (auto-increment par étude), label ('Scénario sans batterie', etc.)\n• input_params (JSONB) : tous les paramètres d'entrée du calcul (figés)\n• results (JSONB) : tous les résultats calculés\n• input_hash : SHA-256 des paramètres d'entrée\n• result_hash : SHA-256 des résultats\n• engine_version : version du moteur de calcul ayant produit ces résultats\n• created_at, locked_at\n\nParamètres d'entrée (input_params) :\n• Puissance installée (kWc), orientation, inclinaison\n• Production annuelle PVGIS (kWh/an)\n• Prix électricité actuel (€/kWh), taux d'augmentation annuel (%)\n• Coût installation HT, TVA applicable\n• Aides : prime à l'autoconsommation (OA), MaPrimeRénov, CEE, aides locales\n• Durée d'analyse (années, généralement 25 ou 30)\n• Dégradation annuelle des panneaux (%)", "success": "Deux calculs lancés avec les mêmes input_params et la même engine_version produisent des résultats identiques au centime près, quelle que soit la date d'exécution.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": true, "risk": "Scénarios non versionnés = recalcul silencieux après signature → devis basé sur chiffres obsolètes.", "status": "TODO", "phase_num": 5}, {"num": 22, "title": "Moteur calcul énergétique — Cohérence mensuelle, annuelle et 8760h", "priority": "CRITIQUE", "files": ["backend/domains/studies/financial/energyCalculator.js (nouveau)", "backend/domains/studies/financial/__tests__/energyCalculator.test.js"], "desc": "Le moteur énergétique calcule la production et la consommation heure par heure sur une année complète (8760 heures).\n\nRègles de cohérence obligatoires :\n• Cohérence mensuelle ↔ annuelle : sum(production_mensuelle[i]) = production_annuelle ± 0.1%\n• Cohérence 8760h ↔ mensuelle : sum(production_horaire[mois]) = production_mensuelle[mois] ± 0.01%\n• Pas d'énergie négative : production horaire ≥ 0 à tout moment\n• Cohérence physique : production_max_horaire ≤ puissance_crete_kWc (non-dépassement physique)\n\nCalculs produits :\n• Production horaire (Wh) × 8760 vecteurs\n• Consommation horaire (Wh) × 8760 vecteurs (profil type selon convention ou saisie client)\n• Injection réseau horaire = max(0, production - consommation)\n• Autoconsommation horaire = min(production, consommation)\n• Taux d'autoconsommation annuel = sum(autoconsommation) / sum(production)\n• Taux d'autosuffisance annuel = sum(autoconsommation) / sum(consommation)\n\nCe module est pur (pas de dépendance HTTP/DB) et entièrement testé unitairement.", "success": "La somme des productions mensuelles equals exactement la production annuelle à 0.1% près. Le module passe 100% des tests unitaires y compris les cas limites (production nulle en décembre polaire).", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "Incohérence mensuelle/annuelle = rapport d'étude avec production totale incorrecte.", "status": "TODO", "phase_num": 5}, {"num": 23, "title": "Batteries physiques et virtuelles — Autoconsommation et autonomie énergétique", "priority": "MAJEUR", "files": ["backend/domains/studies/financial/batterySimulator.js (nouveau)", "backend/domains/studies/financial/virtualBattery.js (nouveau)", "shared/schemas/scenario.schema.ts (VirtualBatteryConfig)"], "desc": "SolarNext doit simuler deux types de stockage d'énergie :\n\nBatterie physique (équipement réel installé) :\n• Paramètres : capacité utile (kWh), DoD (Depth of Discharge, %), efficacité charge (%), efficacité décharge (%), dégradation annuelle (%)\n• Simulation heure par heure : SOC (State of Charge), charge si excédent PV, décharge si déficit, pertes de conversion, aging sur 25 ans\n• Résultat : taux d'autoconsommation avec batterie, taux d'autosuffisance avec batterie, énergie stockée annuellement\n\nBatterie virtuelle (virtual battery) :\n• Modèle de contrat avec le fournisseur réseau : l'énergie injectée est créditée et peut être soustraite de la facture ultérieurement\n• Paramètres : plafond annuel (kWh), taux de crédit (€/kWh)\n• Calcul du bénéfice économique vs batterie physique\n\nCohérence : autoconsommation_avec_batterie ≥ autoconsommation_sans_batterie toujours vrai. Autonomie ≤ 100% (physiquement impossible d'injecter plus qu'on ne produit).", "success": "Le simulateur de batterie produit les mêmes résultats qu'un tableur expert pour un cas de référence documenté. L'autoconsommation avec batterie est toujours supérieure ou égale à celle sans batterie.", "horizon": "MOYEN", "is_mvp": false, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Absence simulation batterie = offre commerciale incomplète face à la concurrence.", "status": "TODO", "phase_num": 5}, {"num": 24, "title": "Calcul ROI, TRI, VAN et Obligation d'Achat — Validation et reproductibilité", "priority": "CRITIQUE", "files": ["backend/domains/studies/financial/roiCalculator.js (nouveau)", "backend/domains/studies/financial/__tests__/roiCalculator.test.js"], "desc": "Ces indicateurs financiers sont présentés aux clients finaux pour justifier l'investissement. Toute erreur est directement opposable commercialement.\n\nIndicateurs calculés :\n• ROI simple : (économies cumulées - coût net) / coût net × 100%\n• Temps de retour sur investissement : première année où le bilan cumulé devient positif\n• TRI (Taux de Rentabilité Interne) : Newton-Raphson sur les flux annuels sur 25 ans\n• VAN (Valeur Actuelle Nette) : taux d'actualisation paramétrable (défaut 4%)\n• Obligation d'Achat (OA) : calcul exact selon barème CRE en vigueur (taux par tranche de puissance, indexation annuelle)\n\nRègles de validation :\n• TRI ne peut pas être calculé si flux de trésorerie entièrement négatifs → erreur explicite\n• VAN doit être cohérente avec le TRI : si TRI > taux d'actualisation, VAN > 0\n• OA : vérifier que la puissance entre dans le barème applicable (≤ 3 kWc / 9 kWc / 36 kWc / 100 kWc selon les tranches CRE)\n• Plausibilité : ROI > 100 ans ou < 2 ans → avertissement, pas blocage\n\nTests de référence documentés dans le code : cas types avec résultats attendus au centime.", "success": "Le calcul ROI/TRI/VAN est validé sur 5 cas de référence industriels. Deux calculs avec les mêmes paramètres produisent le même TRI au millième de pourcent près.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "ROI/TRI erronés présentés à un client = contestation commerciale et perte de confiance.", "status": "TODO", "phase_num": 5}, {"num": 25, "title": "Cohérence production ↔ finance ↔ devis — Protection contre recalculs incohérents", "priority": "CRITIQUE", "files": ["backend/domains/studies/financial/coherenceGuard.service.js (nouveau)", "backend/domains/quotes/service.js", "backend/middleware/immutabilityGuard.middleware.js (Phase 3)"], "desc": "Règle absolue : une fois un scénario financier validé et un devis créé depuis ce scénario, le scénario est verrouillé. Aucun recalcul silencieux ne peut modifier les résultats sur lesquels le devis est fondé.\n\nVérifications de cohérence avant verrouillage :\n• Production annuelle dans le devis = production dans le scénario ± 1 kWh\n• Coût installation dans le devis = coût dans le scénario ± 1 €\n• Aides dans le devis = aides dans le scénario (montants identiques)\n• Puissance dans le devis = puissance dans le scénario (±0.01 kWc)\n\nSi une incohérence est détectée au moment de créer le devis : erreur bloquante avec détail des écarts. Le commercial doit relancer un nouveau scénario.\n\nRecalcul contrôlé : si les paramètres changent après verrouillage (ex: le prix de l'électricité est actualisé), créer un nouveau scénario v2 en conservant v1. Ne jamais écraser v1. Afficher dans l'UI : 'Scénario v1 (utilisé pour le devis) / Scénario v2 (mis à jour)'.", "success": "Il est impossible de créer un devis dont les montants diffèrent du scénario financier ayant servi de base. Tout recalcul crée une nouvelle version sans altérer l'ancienne.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": true, "risk": "Devis créé avec chiffres différents du scénario validé = document contractuellement incorrect.", "status": "TODO", "phase_num": 5}, {"num": 26, "title": "Versioning des calculs et non-régression financière", "priority": "MAJEUR", "files": ["backend/domains/studies/financial/engineVersion.js (nouveau)", "backend/domains/studies/financial/__tests__/regression.test.js"], "desc": "Chaque version du moteur de calcul financier produit des résultats légèrement différents (correction de bug, mise à jour d'une formule). Sans versioning, il est impossible de savoir si une différence de ROI entre deux études vient d'une modification des paramètres ou d'un changement du moteur.\n\n1. Version du moteur : constante FINANCIAL_ENGINE_VERSION = '2.1.0' dans engineVersion.js. Incrémentée à chaque changement de formule ou de logique. Stockée dans chaque scénario (engine_version).\n\n2. Tests de non-régression : suite de tests qui exécute le moteur sur 10 scénarios de référence (fichiers JSON fixtures) et vérifie que les résultats sont identiques à une tolérance de ±0.01%. Ces tests échouent si le moteur change de comportement de façon non intentionnelle.\n\n3. Rapport de régression : si la version du moteur change, générer un rapport listant les scénarios existants dont les résultats seraient différents avec le nouveau moteur. Afficher dans l'admin : 'X scénarios affectés par la mise à jour du moteur v2.0 → v2.1'.", "success": "Tout changement dans le moteur de calcul est détecté par les tests de régression avant le merge. L'équipe sait exactement combien d'études existantes seraient affectées par une mise à jour du moteur.", "horizon": "MOYEN", "is_mvp": false, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Changement de formule non détecté = études existantes dont les résultats ont changé silencieusement.", "status": "TODO", "phase_num": 5}]}, {"num": 6, "title": "PHASE 6 — Tests E2E & Pipeline CI/CD", "subtitle": "Garantir que les flux critiques métier fonctionnent à chaque déploiement", "score_before": "2/10", "score_after": "8/10", "requires": [3, 4, 5], "why": "Les moteurs géométrique et financier (Phases 4 et 5) et les données contractuelles (Phase 3) doivent être protégés par des tests automatisés. Sans CI/CD, chaque déploiement expose la plateforme à des régressions sur des calculs critiques.", "steps": [{"num": 27, "title": "Tests E2E Playwright — Flows critiques métier de bout en bout", "priority": "MAJEUR", "files": ["e2e/ (nouveau)", "e2e/auth.spec.ts", "e2e/lead-to-quote.spec.ts", "e2e/study-geometry.spec.ts (nouveau)", "e2e/financial-scenario.spec.ts (nouveau)", "playwright.config.ts"], "desc": "Flows à couvrir en priorité (order = criticité métier) :\n\n1. Auth complet : inscription → vérification email → login → dashboard\n2. Lead → Étude PV → Calepinage → Scénario financier → Devis → PDF\n3. Devis → Verrouillage → Tentative de modification → Rejet 409 (Phase 3)\n4. Forgot password → Reset → Reconnexion\n5. Facturation : Devis signé → Facture → Statut payée\n\nTests spécifiques moteurs :\n• Placer un panneau hors toiture → rejet avec message d'erreur précis (Phase 4)\n• Modifier un scénario verrouillé → rejet 409 (Phase 3 + 5)\n• Générer un devis → vérifier cohérence scénario vs devis (Phase 5)\n\nConfiguration : DB de test isolée (NODE_ENV=test). Les tests créent leurs données et les nettoient. Headless en CI, headed en développement.", "success": "Les 5 flows critiques passent en CI sur chaque PR. Une régression sur le verrouillage d'un devis est détectée avant le merge.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Sans E2E, chaque déploiement peut casser le flow lead→devis sans qu'on le sache avant les clients.", "status": "TODO", "phase_num": 6}, {"num": 28, "title": "Tests unitaires — Moteurs PV, calculs financiers et validateurs géométriques", "priority": "MAJEUR", "files": ["backend/domains/studies/geometry/__tests__/", "backend/domains/studies/financial/__tests__/", "e2e/fixtures/ (scénarios de référence JSON)"], "desc": "Tests unitaires ciblés sur les modules purs (sans dépendance HTTP/DB) :\n\nMoteur géométrique (Phase 4) :\n• validatePolygon : cas valides, polygone non fermé, auto-intersection, surface insuffisante\n• worldToImage / imageToWorld : aller-retour GPS→pixels→GPS avec tolérance 1cm\n• Placement panneau : dans toiture valide, hors toiture, sur obstacle\n\nMoteur énergétique (Phase 5) :\n• Cohérence mensuelle ↔ annuelle sur 5 sites différents\n• Simulation batterie : cas sans batterie, avec batterie pleine, avec batterie virtuelle\n• ROI/TRI/VAN : 5 cas de référence documentés avec résultats attendus\n• OA : barème CRE par tranche de puissance\n\nCouverture cible : 80% sur pv-calculator.js, energyCalculator.js, roiCalculator.js. Ces fichiers ne doivent jamais descendre sous 70% de couverture (gate CI).", "success": "Toute correction de bug dans le moteur de calcul est accompagnée d'un test qui aurait détecté ce bug. La couverture ne descend jamais sous 70% sur les modules critiques.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Moteur de calcul sans tests = régression silencieuse sur ROI ou shading → bug en production.", "status": "TODO", "phase_num": 6}, {"num": 29, "title": "Pipeline CI/CD — GitHub Actions avec gates de qualité et déploiement automatisé", "priority": "MAJEUR", "files": [".github/workflows/ci.yml (nouveau)", ".github/workflows/deploy.yml (nouveau)", ".github/workflows/schema-check.yml (de Phase 1)"], "desc": "CI (déclenchée sur chaque PR) — gates séquentiels :\n1. Lint : eslint + tsc --noEmit (0 erreur)\n2. Tests unitaires : vitest (couverture ≥ 70% sur modules critiques)\n3. Build frontend : vite build (doit réussir)\n4. Tests E2E Playwright : 5 flows critiques\n5. Snapshot schemas : détection de breaking changes (Phase 1)\n6. Tests de non-régression financière (Phase 5 Step 26)\n\nDeploy (push sur main après PR mergée) :\n1. Mêmes gates CI\n2. Build image Docker\n3. Migrations DB avec rollback automatique si échec (Phase 1 Step 7)\n4. Déploiement Vercel / VPS\n5. Smoke test post-déploiement : GET /api/health/ready retourne 200\n6. Test de santé du moteur financier : calcul sur un scénario de référence\n\nBranch protection : aucun merge sans CI verte, 1 reviewer minimum.", "success": "Aucun bug de régression sur le moteur financier ou géométrique n'atteint la production. Chaque déploiement est automatisé, auditable et réversible.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": true, "risk": "Sans CI/CD, les déploiements sont manuels, risqués et non auditables.", "status": "TODO", "phase_num": 6}]}, {"num": 7, "title": "PHASE 7 — Observabilité", "subtitle": "Voir ce qui se passe avant que les clients ne le signalent — positionnée tôt, bénéfice immédiat", "score_before": "2/10", "score_after": "9/10", "requires": [0, 6], "why": "L'observabilité positionnée tôt alimente toutes les phases suivantes. Un bug dans le moteur financier découvert par un client est catastrophique. Découvert par le monitoring à 3h du matin, il est corrigé avant l'ouverture des bureaux.", "steps": [{"num": 30, "title": "Health Check Endpoint — /api/health/live et /api/health/ready", "priority": "MAJEUR", "files": ["backend/domains/health/router.js (nouveau)"], "desc": "Deux endpoints complémentaires :\n\nGET /api/health/live — réponse immédiate 200 {status:'ok', uptime, version}. Utilisé par le load balancer. Répond toujours, même si la DB est down.\n\nGET /api/health/ready — vérifie toutes les dépendances :\n• database : SELECT 1 avec mesure de latence (ms)\n• pdf_renderer : GET {PDF_RENDERER_BASE_URL}/health timeout 3s\n• mail : connexion IMAP/SMTP (timeout 2s)\n• shading_cache : accessibilité du cache (Redis ou DB)\n• pvgis_api : GET PVGIS health endpoint timeout 5s\n\nHTTP 200 si tout OK. HTTP 503 si dégradé, avec body JSON :\n{ status:'degraded', checks:{ database:{ok:true,latency:12}, pvgis_api:{ok:false,error:'ETIMEDOUT'} } }\n\nConfigurer monitoring externe (Uptime Robot ou Better Uptime) pour appeler /api/health/ready toutes les 60s et alerter en cas de 503.", "success": "Une panne de connexion DB est détectée par le monitoring en moins de 2 minutes. L'indisponibilité de l'API PVGIS est signalée avant que les utilisateurs ne tentent de créer une étude.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Panne DB découverte par un client 20 min après qu'elle survient.", "status": "TODO", "phase_num": 7}, {"num": 31, "title": "Error Tracking Sentry — Backend, frontend et contexte métier PV", "priority": "MAJEUR", "files": ["backend/server.js", "frontend/src/main.tsx", "package.json"], "desc": "Installer @sentry/node (backend) et @sentry/react (frontend).\n\nBackend : initialiser Sentry avant les routes. Capturer uncaughtException et unhandledRejection. Enrichir chaque événement avec : userId, organizationId, role. Ajouter le contexte métier PV pour les erreurs du moteur :\n• study_id, scenario_version, engine_version\n• geometry_hash, calculation_type ('shading' | 'financial' | 'roi')\nCela permet de grouper les erreurs par type de calcul et d'identifier si une erreur est systématique sur un type de géométrie.\n\nFrontend : Error Boundary (Phase 0 Step 3) relaie vers Sentry. Session Replay à 5% (utile pour reproduire les bugs de l'interface 3D). Filtrer : erreurs réseau attendues (429, connexion perdue).\n\nAlertes Sentry :\n• Nouvelle erreur → alerte email immédiate\n• Erreur moteur financier : alerte Slack/email avec priorité haute quelle que soit sa fréquence\n• Score Apdex < 0.8 → alerte", "success": "Chaque exception dans le moteur financier ou géométrique est capturée avec engine_version, study_id et stack trace complète. Zéro erreur de calcul découverte par un client sans que Sentry ne l'ait signalée.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Bug dans le moteur financier découvert par un client = données contractuelles incorrectes remises.", "status": "TODO", "phase_num": 7}, {"num": 32, "title": "Logs structurés JSON et métriques de performance", "priority": "MAJEUR", "files": ["backend/config/logger.js (nouveau)", "backend/middleware/requestLogger.middleware.js"], "desc": "Remplacer tous les console.log par pino (JSON natif, rapide).\n\nFormat : { \"time\":\"ISO8601\", \"level\":\"info|warn|error\", \"requestId\":\"uuid\", \"userId\":\"...\", \"organizationId\":\"...\", \"method\":\"POST\", \"path\":\"/api/studies/geometry\", \"statusCode\":200, \"durationMs\":450, \"context\":{ \"studyId\":\"...\", \"calculationType\":\"shading\" } }\n\nMiddleware requestLogger : toute requête HTTP loggée à réception + complétion. Seuils automatiques : durationMs > 1000ms → WARN, > 5000ms → ERROR.\n\nMétriques spécifiques PV à exposer (format Prometheus GET /api/metrics) :\n• solarnext_shading_calculation_duration_seconds (histogram)\n• solarnext_financial_calculation_duration_seconds (histogram)\n• solarnext_pdf_generation_duration_seconds (histogram)\n• solarnext_pvgis_api_calls_total (counter)\n• solarnext_active_3d_sessions (gauge)\n\nNe jamais logguer : mots de passe, tokens, coordonnées GPS des clients (RGPD).", "success": "Retrouver toutes les requêtes de calcul shading d'une organisation sur une période donnée prend moins de 30 secondes. Les calculs lents (>5s) sont identifiés proactivement.", "horizon": "MOYEN", "is_mvp": false, "is_enterprise": true, "tech_debt": "LOW", "rollback_needed": false, "risk": "Sans logs structurés, impossible de diagnostiquer les calculs lents en production.", "status": "TODO", "phase_num": 7}]}, {"num": 8, "title": "PHASE 8 — Sécurité Fondamentale HTTP & Auth", "subtitle": "Headers manquants, sessions révocables et rate limiting avant toute exposition publique", "score_before": "3/10", "score_after": "8/10", "requires": [0, 7], "why": "Aucun SaaS manipulant des données contractuelles ne peut être mis en vente avec des headers de sécurité manquants et des sessions non révocables. Ces corrections sont rapides et protègent toute la plateforme.", "steps": [{"num": 33, "title": "Headers de sécurité HTTP — CSP, HSTS, Permissions-Policy", "priority": "CRITIQUE", "files": ["backend/middleware/security/securityHeaders.middleware.js"], "desc": "Le middleware actuel applique X-Content-Type-Options, X-Frame-Options, Referrer-Policy. Trois headers critiques manquent :\n\n1. Content-Security-Policy :\ndefault-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: *.tile.openstreetmap.org; connect-src 'self' https://re.jrc.ec.europa.eu https://api.stripe.com wss://...; frame-src https://js.stripe.com; object-src 'none'\nNote : le viewer 3D peut nécessiter 'unsafe-eval' pour WebAssembly — utiliser 'wasm-unsafe-eval' (Chrome 95+) si possible.\nDémarrer en mode report-only 1 semaine, puis enforcement.\n\n2. Strict-Transport-Security : max-age=31536000; includeSubDomains; preload\n(uniquement en HTTPS production)\n\n3. Permissions-Policy : camera=(), microphone=(), geolocation=(self), payment=(self)\nNote : geolocation=(self) car la Phase 13 UX terrain utilise la géolocalisation GPS.\n\nTester avec Mozilla Observatory (viser A+).", "success": "Mozilla Observatory retourne A ou A+. La console navigateur ne montre aucune violation CSP. Le viewer 3D fonctionne avec la CSP appliquée.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "CSP manquante = XSS possible → vol de session ou injection de données dans les études PV.", "status": "TODO", "phase_num": 8}, {"num": 34, "title": "Rate Limiting — Auth strict, API générale et protection moteur de calcul", "priority": "CRITIQUE", "files": ["backend/middleware/rateLimit.middleware.js (nouveau)", "backend/domains/auth/router.js", "backend/domains/studies/router.js"], "desc": "Configurer express-rate-limit avec trois niveaux :\n\nNiveau 1 — Endpoints d'auth (login, forgot-password, reset, register) :\n5 tentatives / 15 min / IP. Réponse 429 + header Retry-After. Log chaque dépassement.\n\nNiveau 2 — API générale :\n100 req/min / IP authentifiée. 20 req/min / IP non authentifiée.\n\nNiveau 3 — Endpoints de calcul intensif (spécifique SolarNext) :\n• POST /api/studies/:id/geometry/calculate — 10 calculs/min/organisation (un calcul de shading complet est coûteux)\n• POST /api/studies/:id/financial/compute — 20 calculs/min/organisation\n• POST /api/pdf — 3 générations simultanées max/instance (file d'attente au-delà)\n\nCes limites protègent contre les abus et assurent la qualité de service pour toutes les organisations. Stockage : MemoryStore pour démarrer, Redis si multi-instances.", "success": "Le 6ème appel à /api/auth/login retourne 429. Une organisation ne peut pas monopoliser le moteur de calcul shading au détriment des autres.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Sans rate limiting, une org peut monopoliser le moteur shading au détriment de toutes les autres.", "status": "TODO", "phase_num": 8}, {"num": 35, "title": "JWT : Access Token 15 min + Refresh Token rotatif HttpOnly", "priority": "CRITIQUE", "files": ["backend/domains/auth/auth.service.js", "backend/domains/auth/router.js", "frontend/src/lib/auth.ts", "frontend/src/lib/api.ts"], "desc": "Remplacer le JWT 7 jours non révocable par une architecture à deux tokens :\n\nAccess Token (JWT signé) :\n• Durée : 15 minutes — stocké en mémoire JS (PAS localStorage)\n• Payload : { userId, organizationId, role, sessionId, planId }\n• Ajout planId pour que le feature gating (Phase 10) n'ait pas besoin d'appel DB\n\nRefresh Token (opaque, UUID v4) :\n• Durée : 7 jours, rotation à chaque usage\n• Cookie HttpOnly, Secure, SameSite=Strict\n• Stocké haché (SHA-256) dans table refresh_tokens\n• Colonnes : user_id, token_hash, session_id, ip_hint, user_agent_hint, created_at, expires_at, revoked_at\n\nEndpoints : POST /api/auth/refresh (rotation), POST /api/auth/logout (révocation).\n\nIntercepteur frontend : sur 401, tente un refresh automatique. Met en file d'attente les requêtes en cours pendant le refresh. Après 2 échecs consécutifs de refresh : redirect /login.", "success": "La déconnexion révoque immédiatement la session en base. Un refresh token capturé ne peut pas être utilisé deux fois. Les tokens ne sont jamais dans le localStorage.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "CRITICAL", "rollback_needed": false, "risk": "JWT 7 jours non révocable = session compromise reste active une semaine.", "status": "TODO", "phase_num": 8}]}, {"num": 9, "title": "PHASE 9 — Portes d'Entrée SaaS", "subtitle": "Inscription, onboarding et premier démarrage en totale autonomie", "score_before": "2/10", "score_after": "9/10", "requires": [7, 8], "why": "Sans ces 4 étapes, chaque nouveau client nécessite une intervention manuelle. C'est le frein numéro un à la croissance. Elles nécessitent l'Observabilité (Phase 7) pour tracer les inscriptions et la Sécurité (Phase 8) pour protéger les endpoints publics.", "steps": [{"num": 36, "title": "Mot de passe oublié — Forgot Password Flow complet", "priority": "CRITIQUE", "files": ["backend/domains/auth/router.js", "backend/services/mail.service.js", "frontend/src/pages/ForgotPassword.tsx (nouveau)", "frontend/src/pages/ResetPassword.tsx (nouveau)"], "desc": "Flow en 3 étapes :\n\n1. POST /api/auth/forgot-password {email} :\nGénérer token = crypto.randomBytes(32).toString('hex'). Stocker hash SHA-256 dans password_reset_tokens(user_id, token_hash, expires_at 1h, used_at). Envoyer email branded SolarNext avec lien https://app.solarnext.fr/reset-password?token=XXX. Toujours répondre 200 même si email inconnu (anti-énumération).\n\n2. GET /api/auth/reset-password/:token — valider sans consommer.\n\n3. POST /api/auth/reset-password {token, newPassword} :\nValider token (non expiré, non utilisé). Valider mot de passe (min 8 chars, 1 majuscule, 1 chiffre). Mettre à jour bcrypt 12 rounds. Marquer token used_at. Révoquer tous les refresh tokens actifs de l'utilisateur. Envoyer email de confirmation 'Votre mot de passe a été modifié'.", "success": "Un utilisateur récupère l'accès à son compte en moins de 3 minutes. Le token expiré ou déjà utilisé retourne une erreur claire, pas une erreur serveur générique.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "HIGH", "rollback_needed": false, "risk": "Sans reset password, chaque oubli de mot de passe nécessite une intervention manuelle.", "status": "TODO", "phase_num": 9}, {"num": 37, "title": "Vérification d'email à l'inscription", "priority": "MAJEUR", "files": ["backend/domains/auth/router.js", "backend/db/migrations/ (email_verified)", "frontend/src/components/EmailVerificationBanner.tsx (nouveau)"], "desc": "À la création : email_verified = false. Email de vérification envoyé immédiatement (token UUID, 24h).\n\nTant que email_verified = false :\n• Bannière persistante en haut de l'app avec bouton 'Renvoyer l'email'\n• Fonctionnalités bloquées : génération PDF, création de devis, études PV, accès facturation\n• Fonctionnalités autorisées : navigation, création de leads, prise de RDV\n(pour ne pas frustrer l'utilisateur qui attend son email)\n\nGET /api/auth/verify-email?token=XXX :\nValider le token. Poser email_verified = true. Supprimer le token. Rediriger vers /dashboard?verified=true avec toast de bienvenue. Déclencher l'envoi de l'email de bienvenue avec lien vers le wizard d'onboarding.", "success": "100% des comptes actifs ont un email vérifié. Un compte non vérifié ne peut pas générer d'étude PV ou de devis.", "horizon": "MOYEN", "is_mvp": true, "is_enterprise": true, "tech_debt": "MEDIUM", "rollback_needed": false, "risk": "Sans vérification email, des bots créent des comptes → spam et données corrompues.", "status": "TODO", "phase_num": 9}, {"num": 38, "title": "Signup public + Création d'organisation en self-service", "priority": "CRITIQUE", "files": ["backend/scripts/create-first-organization.js (→ transformer en POST /api/auth/register)", "backend/domains/organizations/router.js", "frontend/src/pages/Signup.tsx (nouveau)"], "desc": "Transformer le script CLI en endpoint REST. Page /signup publique (non protégée) :\n\nChamps : Nom de l'entreprise installateur,
