<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SolarNext — Master Roadmap CTO</title>
<style>
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273549;--border:#334155;
  --accent:#ea580c;--accent2:#f97316;--text:#f1f5f9;--muted:#94a3b8;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --sidebar-w:300px;--header-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;line-height:1.5;overflow:hidden;height:100vh;display:flex;flex-direction:column}
/* Header */
#header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;flex-shrink:0;position:relative;z-index:10}
#header .logo{color:var(--accent);font-weight:800;font-size:16px;white-space:nowrap}
#header .subtitle{color:var(--muted);font-size:11px}
#global-progress-wrap{flex:1;display:flex;align-items:center;gap:10px;max-width:400px;margin:0 20px}
#global-bar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
#global-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
#global-label{font-size:11px;color:var(--muted);white-space:nowrap}
.header-stats{display:flex;gap:12px}
.hstat{text-align:center}
.hstat-val{font-weight:700;font-size:14px;color:var(--text)}
.hstat-lbl{font-size:10px;color:var(--muted)}
/* Filters */
#filters{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.filter-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s}
.filter-pill:hover,.filter-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
#search-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-size:12px;width:180px;outline:none}
#search-input:focus{border-color:var(--accent)}
.filter-sep{width:1px;height:20px;background:var(--border)}
.view-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s}
.view-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* Main layout */
#main{flex:1;display:flex;overflow:hidden}
/* Sidebar */
#sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.phase-nav{padding:4px 8px;cursor:pointer;border-radius:6px;margin:1px 6px;display:flex;align-items:center;gap:8px;transition:background .15s}
.phase-nav:hover{background:var(--surface2)}
.phase-nav.active{background:var(--surface2);border-left:3px solid var(--accent);padding-left:5px}
.phase-num{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
.phase-nav-info{flex:1;min-width:0}
.phase-nav-title{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:3px}
.phase-progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.phase-count{font-size:10px;color:var(--muted);white-space:nowrap}
/* Content */
#content{flex:1;overflow-y:auto;padding:16px}
.phase-block{margin-bottom:32px}
.phase-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:10px}
.phase-header-top{display:flex;align-items:flex-start;gap:12px}
.phase-badge{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.phase-info{flex:1}
.phase-title{font-size:14px;font-weight:700;color:var(--text)}
.phase-subtitle{font-size:11px;color:var(--muted);margin-top:2px}
.phase-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.phase-score{font-size:11px;color:var(--muted)}
.phase-score span{color:var(--text);font-weight:600}
.phase-deps{font-size:11px;color:var(--purple)}
.phase-progress-h{margin-top:8px;display:flex;align-items:center;gap:8px}
.phase-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.phase-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.phase-bar-label{font-size:10px;color:var(--muted);white-space:nowrap}
.phase-why{margin-top:8px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;display:none}
.phase-why.show{display:block}
.phase-why-toggle{font-size:10px;color:var(--accent);cursor:pointer;margin-top:4px}
/* Steps */
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.step-card:hover{border-color:var(--accent)}
.step-card.done{opacity:.6}
.step-card.done .step-title{text-decoration:line-through;color:var(--muted)}
.step-card.blocked{border-color:var(--red)}
.step-top{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.step-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.step-check:hover{border-color:var(--accent)}
.step-check.done{background:var(--green);border-color:var(--green)}
.step-check.in_progress{background:var(--amber);border-color:var(--amber)}
.step-check.blocked{background:var(--red);border-color:var(--red)}
.step-num{font-size:10px;color:var(--muted);flex-shrink:0;width:24px}
.step-title{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.prio-CRITIQUE{background:#7f1d1d;color:#fca5a5}
.prio-MAJEUR{background:#78350f;color:#fcd34d}
.prio-MOYEN{background:#14532d;color:#86efac}
.status-badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;cursor:pointer}
.status-TODO{background:var(--surface2);color:var(--muted)}
.status-IN_PROGRESS{background:#1d3a6b;color:#93c5fd}
.status-DONE{background:#14532d;color:#86efac}
.status-BLOCKED{background:#7f1d1d;color:#fca5a5}
.h-badge{font-size:10px;padding:2px 6px;border-radius:8px;}
.h-COURT{background:#1e3a5f;color:#60a5fa}
.h-MOYEN{background:#3b2d6b;color:#c4b5fd}
.h-LONG{background:#1a2e2a;color:#34d399}
.tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600}
.tag-mvp{background:#7c3aed;color:#e9d5ff}
.tag-enterprise{background:#0e7490;color:#a5f3fc}
.tag-rollback{background:#7f1d1d;color:#fca5a5}
/* Step detail */
.step-detail{padding:0 14px 12px 46px;display:none;border-top:1px solid var(--border)}
.step-detail.open{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.detail-section{background:var(--surface2);border-radius:6px;padding:8px 10px}
.detail-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.detail-content{font-size:11px;color:var(--text)}
.copy-prompt-btn{margin-top:10px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer}.copy-prompt-btn:hover{background:rgba(96,165,250,.1)}
.detail-content.desc{white-space:pre-wrap;font-size:11px;color:var(--muted);line-height:1.6}
.detail-full{grid-column:1/-1}
.file-tag{display:inline-block;background:var(--border);padding:1px 6px;border-radius:4px;font-size:10px;color:var(--muted);margin:1px;font-family:monospace}
.risk-text{color:#fca5a5;font-size:11px}
.success-text{color:#86efac;font-size:11px}
.td-CRITICAL{color:#fca5a5}
.td-HIGH{color:#fcd34d}
.td-MEDIUM{color:#93c5fd}
.td-LOW{color:#86efac}
.status-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;cursor:pointer;outline:none}
.notes-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:11px;resize:vertical;min-height:60px;font-family:inherit;outline:none}
.notes-area:focus{border-color:var(--accent)}
/* Dashboard */
#dashboard-view{padding:16px;display:none}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.dash-card-val{font-size:28px;font-weight:800;color:var(--accent)}
.dash-card-lbl{font-size:11px;color:var(--muted);margin-top:4px}
.dash-section{margin-bottom:20px}
.dash-section-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text)}
.phase-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.phase-row-name{font-size:11px;color:var(--muted);width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-row-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.phase-row-fill{height:100%;border-radius:3px;background:var(--green)}
.phase-row-pct{font-size:10px;color:var(--muted);width:32px;text-align:right}
/* Export button */
#export-btn{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 12px rgba(234,88,12,.4);z-index:100}
#export-btn:hover{background:var(--accent2)}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
/* Hidden */
.hidden{display:none!important}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo">⚡ SolarNext</div>
    <div class="subtitle">Roadmap CRM SaaS — audit menus, UX, visuel et prompts actionnables</div>
  </div>
  <div id="global-progress-wrap">
    <div id="global-bar-bg"><div id="global-bar" style="width:0%"></div></div>
    <div id="global-label">0 / 36</div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="stat-done">0</div><div class="hstat-lbl">Terminées</div></div>
    <div class="hstat"><div class="hstat-val" id="stat-progress">0</div><div class="hstat-lbl">En cours</div></div>
    <div class="hstat"><div class="hstat-val" id="stat-blocked">0</div><div class="hstat-lbl">Bloquées</div></div>
    <div class="hstat"><div class="hstat-val">8</div><div class="hstat-lbl">Phases</div></div>
    <div class="hstat"><div class="hstat-val">36</div><div class="hstat-lbl">Étapes</div></div>
  </div>
</div>

<div id="filters">
  <span style="font-size:11px;color:var(--muted);font-weight:600">VUE</span>
  <button class="view-btn active" onclick="setView('ALL')">Tout</button>
  <button class="view-btn" onclick="setView('DASHBOARD')">📊 Dashboard</button>
  <button class="view-btn" onclick="setView('MVP')">🎯 MVP</button>
  <button class="view-btn" onclick="setView('ENTERPRISE')">🏢 Enterprise</button>
  <div class="filter-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-weight:600">HORIZON</span>
  <button class="filter-pill active" data-filter="horizon" data-val="ALL" onclick="toggleFilter('horizon','ALL',this)">Tous</button>
  <button class="filter-pill" data-filter="horizon" data-val="COURT" onclick="toggleFilter('horizon','COURT',this)">Court terme</button>
  <button class="filter-pill" data-filter="horizon" data-val="MOYEN" onclick="toggleFilter('horizon','MOYEN',this)">Moyen terme</button>
  <button class="filter-pill" data-filter="horizon" data-val="LONG" onclick="toggleFilter('horizon','LONG',this)">Long terme</button>
  <div class="filter-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-weight:600">PRIORITÉ</span>
  <button class="filter-pill active" data-filter="priority" data-val="ALL" onclick="toggleFilter('priority','ALL',this)">Toutes</button>
  <button class="filter-pill" data-filter="priority" data-val="CRITIQUE" onclick="toggleFilter('priority','CRITIQUE',this)">Critique</button>
  <button class="filter-pill" data-filter="priority" data-val="MAJEUR" onclick="toggleFilter('priority','MAJEUR',this)">Majeur</button>
  <div class="filter-sep"></div>
  <span style="font-size:11px;color:var(--muted);font-weight:600">STATUT</span>
  <button class="filter-pill active" data-filter="status" data-val="ALL" onclick="toggleFilter('status','ALL',this)">Tous</button>
  <button class="filter-pill" data-filter="status" data-val="TODO" onclick="toggleFilter('status','TODO',this)">À faire</button>
  <button class="filter-pill" data-filter="status" data-val="IN_PROGRESS" onclick="toggleFilter('status','IN_PROGRESS',this)">En cours</button>
  <button class="filter-pill" data-filter="status" data-val="BLOCKED" onclick="toggleFilter('status','BLOCKED',this)">Bloqué</button>
  <button class="filter-pill" data-filter="status" data-val="DONE" onclick="toggleFilter('status','DONE',this)">Terminé</button>
  <div class="filter-sep"></div>
  <input id="search-input" type="search" placeholder="🔍 Rechercher..." oninput="onSearch(this.value)">
</div>

<div id="main">
  <div id="sidebar"></div>
  <div id="content"></div>
  <div id="dashboard-view"></div>
</div>

<button id="export-btn" onclick="exportMarkdown()">⬇ Export Markdown</button>

<script>
const PHASES = [{"num":0,"title":"PHASE 0 — Audit Produit Repris à Zéro","subtitle":"Reposer le diagnostic avant d'executer : menus, parcours, visuel, doublons et deja-fait","score_before":"5/10","score_after":"8/10","requires":[],"why":"Cette phase corrige le principal manque du rapport precedent : il ne suffit pas de lister des correctifs techniques. Il faut d'abord auditer ce que voit l'utilisateur, la logique des menus, les pages cachees, les doublons, les libelles, les routes legacy et ce qui est deja implemente. Le pipeline n'est pas a refaire : il doit seulement etre verifie/coherise avec l'onboarding et les anciennes organisations.","steps":[{"num":1,"title":"Audit complet menus, routes, pages cachees et doublons","priority":"CRITIQUE","files":["frontend/src/main.tsx","frontend/src/layout/AppLayout.tsx","frontend/src/pages","frontend/src/modules"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA senior UX produit + frontend architect\nMission : faire un audit exhaustif de l'architecture de navigation CRM, en partant de ce que l'utilisateur voit vraiment.\n\nContexte : La sidebar actuelle contient Principal, Mail, Finance, Entreprise, Installation, Parametres techniques et Super admin. Certaines routes existent sans entree claire : /settings/security, /admin/audit-log, /admin/smartpitch-settings. Certains regroupements sont discutables : Mail vs Messagerie, Parametres PV isole, Installation qui melange mairie/fiche/sous-traitant, Entreprise qui porte aussi le catalogue devis.\n\nTravail demande :\n1. Extraire toutes les routes frontend CRM depuis main.tsx et les classer par usage reel.\n2. Extraire toutes les entrees de sidebar depuis AppLayout.tsx et verifier si chaque route importante est visible au bon endroit.\n3. Lister les pages cachees, pages legacy, redirects, doublons de libelles et pages qui devraient etre dans Parametres.\n4. Produire une proposition de navigation cible : Operations, Ventes/Finance, Documents, Messagerie, Installation, Parametres, Super admin.\n5. Indiquer pour chaque page : garder, deplacer, masquer, fusionner, renommer ou supprimer.\n\nTests / verifications obligatoires :\n1. Chaque route CRM protegee a une destination menu ou une justification 'cachee volontairement'.\n2. Aucun menu ne pointe vers une route inexistante.\n3. Les routes securite et audit sont classees dans une zone visible pour les bons roles.\n4. Les doublons Mail/Messagerie et Entreprise/Parametres sont explicitement resolus.\n\nLivrable attendu : un tableau route -> menu actuel -> probleme -> menu cible -> permission -> decision.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"La navigation cible est documentee avant tout changement UI.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Sans audit navigation, les menus resteront etranges meme apres les correctifs.","status":"TODO","phase_num":0},{"num":2,"title":"Audit visuel SaaS page par page","priority":"CRITIQUE","files":["frontend/src/pages","frontend/src/components","frontend/src/modules","frontend/src/design-system"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA design-system reviewer senior\nMission : auditer la qualite visuelle percue du CRM SolarNext page par page.\n\nContexte : Le rapport precedent parlait trop peu du niveau esthetique. Le CRM doit devenir plus leger, plus simple, plus propre, moins charge, plus coherent SaaS B2B. Il faut analyser densite, grilles, cartes, tables, formulaires, modales, boutons, microcopy, responsive et hierarchy visuelle.\n\nTravail demande :\n1. Passer en revue Dashboard, Leads, Clients, Lead detail, Finance, Devis, Factures, Documents, Mail, Parametres, Organisation et Onboarding.\n2. Pour chaque page, noter : surcharge, repetition, manque d'espace, confusion de CTA, composants non standards, alertes natives, textes trop longs, mauvaise hierarchie.\n3. Identifier les patterns a standardiser : PageHeader, ActionBar, EmptyState, DataTable responsive, Modal, Toast, SettingsSection, KPI strip.\n4. Classer les problemes en quick wins, refontes moyennes et dette visuelle profonde.\n5. Donner des consignes concretes : quoi alleger, quoi deplacer, quoi fusionner, quoi renommer.\n\nTests / verifications obligatoires :\n1. L'audit couvre au moins 10 pages CRM.\n2. Chaque probleme visuel est relie a une perception utilisateur concrete.\n3. Chaque recommandation precise le composant ou fichier concerne.\n4. Les recommandations restent SaaS de travail, pas landing page.\n\nLivrable attendu : un rapport visuel actionnable, avec priorites et prompts de correction par lot.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Les problemes visuels ne sont plus traites comme une simple finition.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Un CRM peut etre fonctionnel mais percu comme bas de gamme si l'interface reste lourde.","status":"TODO","phase_num":0},{"num":3,"title":"Nettoyer definitivement les anciens rapports et widgets","priority":"MAJEUR","files":["RAPPORT_CRM.html","frontend/src/pages/ReportCrmPage.tsx","frontend/src/pages/report-crm-page.css","frontend/src/main.tsx","frontend/src/layout/AppLayout.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA maintenance frontend\nMission : supprimer tous les anciens artefacts du rapport CRM precedent et verifier qu'ils ne reapparaissent nulle part.\n\nContexte : Le rapport final doit etre SOLARNEXT_MASTER_ROADMAP.html. Les anciens fichiers RAPPORT_CRM.html, ReportCrmPage.tsx et report-crm-page.css ne doivent plus exister. La route /rapport-crm et l'entree sidebar Rapport CRM doivent disparaitre.\n\nTravail demande :\n1. Verifier l'absence physique des anciens fichiers.\n2. Verifier qu'aucun import ReportCrmPage ne reste dans main.tsx.\n3. Verifier qu'aucune route /rapport-crm ne reste.\n4. Verifier qu'aucune entree Rapport CRM ne reste dans AppLayout.tsx.\n5. Verifier par recherche globale qu'il ne reste pas de reference report-crm-page.\n\nTests / verifications obligatoires :\n1. Test-Path des anciens fichiers retourne false.\n2. rg ReportCrm|rapport-crm|report-crm-page ne retourne rien dans frontend/src.\n3. SOLARNEXT_MASTER_ROADMAP.html reste ouvrable seul.\n\nLivrable attendu : confirmation de nettoyage et liste des fichiers supprimes.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Il ne reste qu'une seule source de roadmap : le fichier master.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"LOW","rollback_needed":false,"risk":"Deux rapports concurrents recreent de la confusion.","status":"TODO","phase_num":0},{"num":4,"title":"Controle calpinage 2D uniquement coherence et doublons","priority":"MAJEUR","files":["SOLARNEXT_MASTER_ROADMAP.html","frontend/src/modules/calpinage"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA audit leger calpinage\nMission : verifier uniquement que la roadmap ne duplique pas ou ne deforme pas les sujets calpinage 2D.\n\nContexte : Le perimetre demande exclut calculage, DP et audit profond calpinage. Il faut seulement eviter que la roadmap CRM contienne des diagnostics calpinage faux, obsoletes ou doublonnes.\n\nTravail demande :\n1. Rechercher dans la roadmap toute mention calpinage, 2D, 3D, canonical3d, DP, declaration prealable.\n2. Verifier que les chemins cites existent vraiment.\n3. Supprimer les taches calpinage qui n'ont pas leur place dans la roadmap CRM.\n4. Transformer les points calpinage restants en simple verification de coherence si necessaire.\n5. Ne pas modifier les modules calpinage eux-memes.\n\nTests / verifications obligatoires :\n1. Aucune tache calpinage profonde n'est presente dans la roadmap CRM.\n2. Aucun chemin obsolete frontend/src/components/3d n'est conserve si le code est sous frontend/src/modules/calpinage.\n3. Aucune demande DP/calculage n'est integree.\n\nLivrable attendu : roadmap CRM propre, sans derive vers DP/calpinage.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Le calpinage ne pollue plus la roadmap CRM.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"LOW","rollback_needed":false,"risk":"Melanger CRM et calpinage rend la priorisation impossible.","status":"TODO","phase_num":0}]},{"num":1,"title":"PHASE 1 — Architecture Menus & Simplicite SaaS","subtitle":"Recomposer la sidebar et les parametres pour que tout soit intuitif","score_before":"4/10","score_after":"9/10","requires":[0],"why":"C'est la phase qui manquait le plus. Un SaaS mature n'empile pas les pages au hasard : il organise les actions frequentes, deplace les reglages dans un hub, masque ce qui depend des permissions et evite les doublons de vocabulaire.","steps":[{"num":5,"title":"Redessiner la sidebar cible par usages","priority":"CRITIQUE","files":["frontend/src/layout/AppLayout.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA UX architect SaaS\nMission : repenser la sidebar SolarNext autour des usages, pas autour de l'historique du code.\n\nContexte : Actuellement : Principal contient Dashboard, Leads, Clients, Planning, Documents. Mail contient Mail et Messagerie. Finance contient Vue d'ensemble, Devis, Factures. Entreprise contient Utilisateurs, Equipes & entreprise, Catalogue devis. Installation contient Mairie, Fiche technique, Installateur. Parametres techniques contient Parametres PV.\n\nTravail demande :\n1. Proposer une sidebar cible en 5 a 7 groupes maximum.\n2. Operations : Dashboard, Leads, Clients, Planning.\n3. Ventes/Finance : Devis, Factures, Vue financiere si vraiment utile.\n4. Documents : Documents et pieces partagees, sauf si rattachees a chaque fiche.\n5. Messagerie : Boite mail et envois, tandis que la configuration part dans Parametres.\n6. Installation : conserver seulement les pages operationnelles terrain, pas les settings.\n7. Parametres : Organisation, Utilisateurs, Roles, Catalogue, Messagerie, Securite, Audit, Parametres PV.\n8. Super admin : uniquement support multi-organisation.\n\nTests / verifications obligatoires :\n1. Un utilisateur comprend en moins de 10 secondes ou configurer son organisation.\n2. Mail et Messagerie ne sont plus deux entrees concurrentes au meme niveau.\n3. Les parametres PV ne sont plus isoles comme un module technique mysterieux.\n4. La sidebar reste courte et lisible sur laptop.\n\nLivrable attendu : nouvelle structure sidebar + justification page par page.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"La sidebar devient lisible, courte et orientee metier.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Une sidebar confuse donne l'impression d'un produit assemble par morceaux.","status":"TODO","phase_num":1},{"num":6,"title":"Créer un vrai hub Paramètres","priority":"CRITIQUE","files":["frontend/src/pages/settings","frontend/src/pages/organization","frontend/src/main.tsx","frontend/src/layout/AppLayout.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA frontend SaaS settings\nMission : creer une experience Parametres unifiee et professionnelle.\n\nContexte : Aujourd'hui les reglages sont eclates entre /organization/*, /settings/mail, /settings/security, /admin/settings/pv, /admin/audit-log et SmartPitch. Un client SaaS attend un hub Parametres clair.\n\nTravail demande :\n1. Creer une page /settings ou un hub equivalent avec sections visibles selon permissions.\n2. Sections cibles : Mon compte, Securite, Organisation, Utilisateurs, Roles, Equipes/Agences, Catalogue devis, Messagerie, Parametres PV, Journal d'audit.\n3. Ajouter des cartes compactes avec titre court, description courte, statut et lien.\n4. Deplacer la configuration Messagerie hors du groupe Mail operationnel.\n5. Exposer Securite et Audit au bon endroit.\n6. Conserver les anciennes routes via redirects ou liens internes.\n\nTests / verifications obligatoires :\n1. Admin org trouve securite, utilisateurs, catalogue, messagerie et audit depuis Parametres.\n2. Utilisateur sans droit ne voit pas les sections admin.\n3. Les URLs existantes continuent de fonctionner.\n4. Le hub tient sur desktop sans effet page marketing.\n\nLivrable attendu : hub Parametres fonctionnel + matrice sections/permissions.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Les reglages deviennent centralises et decouvrables.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Des reglages disperses augmentent la charge mentale et les erreurs support.","status":"TODO","phase_num":1},{"num":7,"title":"Rationaliser Mail vs Messagerie","priority":"MAJEUR","files":["frontend/src/layout/AppLayout.tsx","frontend/src/pages/mail","frontend/src/pages/settings/MailSettingsPage.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA UX writing + frontend\nMission : supprimer la confusion entre Mail operationnel et Messagerie reglages.\n\nContexte : La sidebar affiche Mail et Messagerie dans le meme groupe. Pour un utilisateur, les deux mots peuvent sembler designer la meme chose.\n\nTravail demande :\n1. Definir Mail comme espace operationnel : inbox, outbox, composer, conversations.\n2. Definir Messagerie comme configuration : comptes, signatures, templates, permissions.\n3. Placer Mail dans la navigation operationnelle et Messagerie dans Parametres.\n4. Renommer les libelles si necessaire : Boite mail, Configuration mail.\n5. Verifier tous les liens depuis MailComposer vers signatures/templates.\n\nTests / verifications obligatoires :\n1. Un utilisateur sait ou lire/envoyer un email.\n2. Un admin sait ou configurer comptes/signatures/templates.\n3. Les redirects /mail/accounts et /settings/mail restent coherents.\n4. Aucune entree de menu doublon ne persiste.\n\nLivrable attendu : navigation mail clarifiee + libelles harmonises.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Mail n'est plus confondu avec les reglages de messagerie.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"MEDIUM","rollback_needed":false,"risk":"Deux mots proches au meme niveau creent une hesitation permanente.","status":"TODO","phase_num":1},{"num":8,"title":"Reclasser Installation, Mairies, Fiche technique et Paramètres PV","priority":"MAJEUR","files":["frontend/src/layout/AppLayout.tsx","frontend/src/pages/MairiesPage.tsx","frontend/src/pages/installation","frontend/src/pages/PvSettingsPage.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA produit CRM installateur\nMission : verifier que les pages liees a l'installation sont au bon endroit.\n\nContexte : Le menu Installation contient Mairie, Fiche technique, Installateur/Sous-traitant. Les Parametres PV sont separes dans Parametres techniques. Il faut distinguer operations terrain et reglages.\n\nTravail demande :\n1. Auditer le role de Mairie : operation courante, base referentielle ou dossier administratif.\n2. Auditer Fiche technique et Installateur/Sous-traitant : sont-ce des actions operationnelles ou des settings ?\n3. Deplacer Parametres PV dans le hub Parametres si c'est un reglage.\n4. Garder Installation uniquement pour les pages utilisees au quotidien par l'equipe terrain.\n5. Renommer les entrees pour supprimer les libelles longs ou ambigus.\n\nTests / verifications obligatoires :\n1. Un commercial ne voit pas des reglages techniques dans son flux principal.\n2. Un admin trouve Parametres PV depuis Parametres.\n3. Les pages terrain restent accessibles en moins de deux clics.\n4. Aucun lien existant ne casse.\n\nLivrable attendu : decision de classement Installation/Parametres + patch navigation.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Les pages terrain et les reglages ne sont plus melanges.","horizon":"MOYEN","is_mvp":true,"is_enterprise":true,"tech_debt":"MEDIUM","rollback_needed":false,"risk":"Melanger operations et reglages rend le produit plus lourd.","status":"TODO","phase_num":1},{"num":9,"title":"Rendre la sidebar permission-aware","priority":"CRITIQUE","files":["frontend/src/layout/AppLayout.tsx","frontend/src/contexts/OrganizationContext.tsx","backend/rbac"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA frontend/RBAC senior\nMission : faire en sorte que les menus visibles correspondent aux droits reels de l'utilisateur.\n\nContexte : La sidebar masque surtout Super admin via isSuperAdmin, mais beaucoup d'entrees admin ne semblent pas filtrees finement par permissions.\n\nTravail demande :\n1. Identifier les permissions necessaires pour chaque entree de menu.\n2. Faire remonter les permissions utilisateur dans le contexte frontend si ce n'est pas deja fiable.\n3. Masquer les entrees interdites plutot que laisser l'utilisateur tomber sur une redirection confuse.\n4. Garder une page 403 propre comme filet de securite.\n5. Documenter la matrice menu -> permission.\n\nTests / verifications obligatoires :\n1. Utilisateur standard ne voit pas Organisation/Parametres sensibles.\n2. Admin org voit les reglages organisation.\n3. Super admin voit seulement ses outils support.\n4. Acces direct URL interdite affiche 403 propre.\n\nLivrable attendu : sidebar permission-aware + matrice de permissions.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Chaque role voit une navigation adaptee.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Afficher des pages interdites donne une experience frustrante.","status":"TODO","phase_num":1}]},{"num":2,"title":"PHASE 2 — Onboarding & Premier Démarrage","subtitle":"Rendre le premier lancement court, vrai et non contournable","score_before":"4/10","score_after":"9/10","requires":[1],"why":"L'onboarding doit etre plus simple, plus court et honnete. Le pipeline ne doit pas y etre personnalise si le vrai pipeline est deja propre et gere ailleurs.","steps":[{"num":10,"title":"Bloquer le CRM tant que l'onboarding n'est pas termine","priority":"CRITIQUE","files":["frontend/src/components/auth/ProtectedRoute.tsx","frontend/src/services/auth.service.ts","frontend/src/main.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA full-stack auth\nMission : empecher tout acces CRM avec onboardingCompleted=false.\n\nContexte : Login/MFA redirigent vers /onboarding, mais ProtectedRoute verifie surtout l'authentification. L'acces direct a une route CRM avec token valide reste le risque.\n\nTravail demande :\n1. Faire remonter onboardingCompleted depuis le token ou /me.\n2. Ajouter un guard global sur les routes CRM.\n3. Exempter /onboarding et routes publiques.\n4. Eviter les boucles et gerer l'impersonation.\n5. Afficher un loader propre pendant la verification.\n\nTests / verifications obligatoires :\n1. Token valide non onboarde + /dashboard => /onboarding.\n2. Token valide onboarde + /dashboard => dashboard.\n3. Non authentifie + /dashboard => /login.\n4. Pas de boucle infinie.\n\nLivrable attendu : guard onboarding teste.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Un nouveau compte ne peut pas contourner le premier demarrage.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Un CRM non configure accessible trop tot parait casse.","status":"TODO","phase_num":2},{"num":11,"title":"Simplifier l'onboarding et supprimer les etapes qui mentent","priority":"CRITIQUE","files":["frontend/src/pages/Onboarding.tsx","frontend/src/components/onboarding/*"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA product designer onboarding\nMission : alleger l'onboarding pour ne garder que les actions vraiment utiles au premier demarrage.\n\nContexte : L'etape pipeline fait peur parce qu'elle donne l'impression qu'on veut refaire le pipeline. La bonne approche est de ne pas modifier le pipeline au premier demarrage si le pipeline reel est deja propre.\n\nTravail demande :\n1. Revoir les etapes actuelles : Entreprise, Messagerie, Collaborateurs, Pipeline, Premier lead.\n2. Retirer l'etape Pipeline du premier demarrage ou la remplacer par une simple confirmation informative.\n3. Rendre Messagerie facultative si le test reel n'est pas pret.\n4. Garder l'objectif : configurer l'entreprise et creer le premier lead rapidement.\n5. Reduire les textes longs, CTA et champs non indispensables.\n\nTests / verifications obligatoires :\n1. Un nouveau client comprend chaque etape.\n2. Aucune etape ne promet une action non branchee au backend.\n3. Onboarding terminable avec seulement les informations vraiment obligatoires.\n4. Pipeline reel non modifie par erreur.\n\nLivrable attendu : onboarding plus court, plus honnete et plus SaaS.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Le premier demarrage devient simple et ne touche pas au pipeline inutilement.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Un onboarding trop ambitieux cree des incoherences.","status":"TODO","phase_num":2},{"num":12,"title":"Verrouiller la progression et la validation globale","priority":"CRITIQUE","files":["frontend/src/pages/Onboarding.tsx","frontend/src/services/onboarding.service.ts"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA frontend forms\nMission : empecher la finalisation de l'onboarding si les donnees obligatoires sont incompletes.\n\nContexte : La sidebar permet de cliquer n'importe quelle etape et finish() valide surtout l'etape active.\n\nTravail demande :\n1. Desactiver les etapes futures tant que les precedentes ne sont pas validees.\n2. Autoriser la revisite des etapes terminees.\n3. Creer une validation globale avant completed=true.\n4. Afficher les champs manquants de facon claire.\n5. Eviter la dependance a un brouillon local comme source de verite.\n\nTests / verifications obligatoires :\n1. Impossible de finaliser sans entreprise valide.\n2. Impossible de sauter directement au premier lead.\n3. Etape terminee revisitable.\n4. Erreur backend affichee proprement.\n\nLivrable attendu : wizard sequentiel et validation globale.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"L'onboarding ne peut plus etre termine incomplet.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"MEDIUM","rollback_needed":false,"risk":"Un setup incomplet contamine tout le CRM.","status":"TODO","phase_num":2},{"num":13,"title":"Brancher ou retirer le test mail simule","priority":"MAJEUR","files":["frontend/src/pages/Onboarding.tsx","frontend/src/components/onboarding/OnboardingStepMail.tsx","backend/domains/mail"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA full-stack mail\nMission : supprimer le faux test mail qui utilise setTimeout.\n\nContexte : Le test mail actuel peut marquer mail.tested=true sans aucune validation IMAP/SMTP.\n\nTravail demande :\n1. Chercher une API de test mail existante.\n2. Si elle existe, l'appeler avec gestion loading/success/error.\n3. Si elle n'existe pas, rendre l'etape facultative et renvoyer vers Parametres > Messagerie.\n4. Ne jamais stocker de secret en clair.\n5. Adapter la microcopy pour ne pas annoncer une validation fictive.\n\nTests / verifications obligatoires :\n1. Identifiants faux => erreur claire.\n2. Mode config plus tard => onboarding terminable.\n3. Aucun secret persistant dans localStorage.\n4. Lien vers Messagerie coherent.\n\nLivrable attendu : test reel ou promesse retiree.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"La messagerie onboarding ne ment plus.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Une validation fictive casse la confiance.","status":"TODO","phase_num":2},{"num":14,"title":"Mapper les donnees entreprise vers la source officielle","priority":"MAJEUR","files":["frontend/src/components/onboarding/OnboardingStepCompany.tsx","backend/controllers/organizations.settings.controller.js"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA backend/frontend organisation settings\nMission : faire en sorte que les donnees saisies dans l'onboarding alimentent les reglages officiels.\n\nContexte : SIRET, RGE, adresse et branding ne doivent pas rester enfermes dans settings_json.onboarding.profile si devis, factures et pages organisation utilisent une autre source.\n\nTravail demande :\n1. Inventorier chaque champ entreprise.\n2. Definir sa destination canonique.\n3. Appliquer les donnees via endpoint valide.\n4. Prevoir backfill idempotent pour les organisations existantes.\n5. Verifier devis/factures/documents.\n\nTests / verifications obligatoires :\n1. SIRET/RGE/adresse visibles dans Parametres entreprise.\n2. Devis/facture utilisent les bonnes donnees.\n3. Backfill rejouable.\n4. Erreur claire si champ invalide.\n\nLivrable attendu : mapping champ par champ + patch.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Les donnees de premier demarrage servent vraiment dans le CRM.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Des donnees saisies mais inutilisees donnent l'impression que le produit oublie.","status":"TODO","phase_num":2}]},{"num":3,"title":"PHASE 3 — Pipeline : Vérification, Pas Refonte","subtitle":"Ne pas refaire ce qui marche : verifier seulement coherence, codes et onboarding","score_before":"7/10","score_after":"9/10","requires":[2],"why":"Le pipeline parait deja propre et contient une migration V2. Cette phase ne demande pas de le refaire. Elle existe pour expliquer le risque exact : l'onboarding et les anciennes migrations peuvent creer une divergence entre ce que l'UI promet et ce que pipeline_stages utilise vraiment.","steps":[{"num":15,"title":"Auditer le pipeline existant sans le reconstruire","priority":"MAJEUR","files":["backend/migrations/*pipeline*","backend/domains/leads/*","frontend/src/components/leads/LeadsKanbanView.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA backend CRM prudent\nMission : verifier le pipeline existant sans le refaire si tout est deja propre.\n\nContexte : Le pipeline V2 existe et la conversion SIGNED semble implementee. Le but n'est pas une refonte, mais une preuve : seed nouvelle organisation, anciennes organisations, codes SIGNED/LOST, positions, is_closed, conversion client.\n\nTravail demande :\n1. Lire les migrations pipeline et le code Kanban actuel.\n2. Verifier que les nouvelles organisations recoivent le bon pipeline.\n3. Verifier les anciens stages sans code ou avec code obsolete.\n4. Verifier que SIGNED declenche bien la conversion attendue.\n5. Conclure : rien a faire, migration de correction, ou test uniquement.\n\nTests / verifications obligatoires :\n1. Org neuve => stages attendus.\n2. Org ancienne => codes non nuls pour stages critiques.\n3. Move vers SIGNED => comportement client attendu.\n4. Aucun changement fonctionnel si audit OK.\n\nLivrable attendu : rapport pipeline court : OK / correction minimale / tests a ajouter.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Le pipeline est compris et protege, pas refait inutilement.","horizon":"COURT","is_mvp":true,"is_enterprise":true,"tech_debt":"LOW","rollback_needed":false,"risk":"Refaire un pipeline propre serait une perte de temps ; ne pas verifier les divergences serait risque.","status":"TODO","phase_num":3},{"num":16,"title":"Retirer le pipeline du premier demarrage s'il n'est pas necessaire","priority":"CRITIQUE","files":["frontend/src/components/onboarding/OnboardingStepPipeline.tsx","frontend/src/pages/Onboarding.tsx"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA UX onboarding\nMission : supprimer la confusion pipeline dans l'onboarding.\n\nContexte : Si le pipeline est deja fait et propre, demander a un nouveau client de le changer au premier demarrage est une mauvaise idee. C'est exactement l'incoherence signalee.\n\nTravail demande :\n1. Supprimer l'etape pipeline ou la transformer en information non modifiable.\n2. Renvoyer la configuration avancee du pipeline vers Parametres seulement si une vraie feature existe.\n3. Retirer settings_json.onboarding.pipeline comme promesse sible par un utilisateur SaaS B2B.","success":"Un utilisateur suit un dossier sans chercher les pieces.","horizon":"MOYEN","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Des modules presents mais mal relies donnent une impression de bricolage.","status":"TODO","phase_num":4},{"num":20,"title":"Rendre le dashboard actionnable et allege","priority":"MAJEUR","files":["frontend/src/pages/DashboardPage.tsx","backend/domains/leads","backend/domains/invoices"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA product designer dashboard\nMission : transformer le dashboard en cockpit simple.\n\nContexte : Un dashboard SaaS ne doit pas etre une accumulation de cartes. Il doit dire quoi faire aujourd'hui.\n\nTravail demande :\n1. Reduire les KPIs aux plus utiles.\n2. Ajouter actions : leads a relancer, devis sans reponse, factures impayees, RDV du jour.\n3. Supprimer ou masquer les metriques non fiables.\n4. Prevoir etat nouvelle organisation.\n5. Faire respecter les permissions finance.\n\nTests / verifications obligatoires :\n1. Nouvelle org comprend sa premiere action.\n2. Org active voit actions prioritaires.\n3. Pas de metrique fake.\n4. CTA fonctionnels.\n\nLivrable attendu : dashboard plus simple, utile et SaaS.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Le dashboard devient utile au quotidien.","horizon":"MOYEN","is_mvp":true,"is_enterprise":true,"tech_debt":"MEDIUM","rollback_needed":false,"risk":"Un dashboard surcharge est ignore.","status":"TODO","phase_num":4},{"num":21,"title":"Standardiser recherche globale et raccourcis","priority":"MOYEN","files":["frontend/src/components/layout/GlobalSearchBar.tsx","frontend/src/services"],"desc":"PROMPT A CO sversal.\n4. Ajouter etats vides et filtres utiles.\n5. Verifier permissions et liens depuis fiches.\n\nTests / verifications obligatoires :\n1. Un document de devis est retrouvable.\n2. Un document client est retrouvable.\n3. Filtres comprehensibles.\n4. Pas de doublon avec les onglets documents des fiches.\n\nLivrable attendu : positionnement clair du module Documents.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Documents a une place claire dans le CRM.","horizon":"MOYEN","is_mvp":true,"is_enterprise":true,"tech_debt":"MEDIUM","rollback_needed":false,"risk":"Un module document mal positionne fait perdre les pieces importantes.","status":"TODO","phase_num":4}]},{"num":5,"title":"PHASE 5 — Refonte Visuelle SaaS Profonde","subtitle":"Alleger, simplifier, harmoniser et rendre le produit plus premium","score_before":"5/10","score_after":"9/10","requires":[1,4],"why":"Cette phase est volontairement plus ambitieuse que le rapport precedent. Le but n'est pas juste 'corriger deux CSS', mais rendre l'ensemble plus propre, plus leger et plus coherent.","steps":[{"num":23,"title":"Créer un kit de primitives CRM obligatoire","priority":"CRITIQUE","files":["frontend/src/design-system","frontend/src/components/ui"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA design-system engineer\nMission : standardiser les composants de base du CRM.\n\nContexte : Le code a deja des styles, mais il faut imposer des primitives communes pour eviter les pages incoherentes.\n\nTravail demande :\n1. Definir PageHeader, SectionHeader, Toolbar, DataTable, EmptyState, ErrorState, ConfirmModal, Toast, SettingsCard, KPI.\n2. Remplacer les variantes locales quand elles sont visuellement divergentes.\n3. Documenter les usages avec exemples.\n4. Garder des rayons, espacements, tailles et couleurs coherents.\n5. Eviter les cartes imbriquees et les grosses zones decoratives.\n\nTests / verifications obligatoires :\n1. Au moins 5 pages utilisent les primitives.\n2. Les boutons ont des tailles coherentes.\n3. Les etats vides sont standardises.\n4. Pas de regression mobile evidente.\n\nLivrable attendu : kit UI CRM reutilisable + premieres migrations.\n\nContraintes : CRM SolarNext uniquement. Ne pas refaire l'audit DP, declaration prealable, calculage ou calpinage. Pour le calpinage, verifier seulement coherence, doublons et chemins obsoletes. Ne pas casser les URLs existantes sans redirect. Tout changement doit etre comprehensible par un utilisateur SaaS B2B.","success":"Le CRM arrete d'empiler des styles page par page.","horizon":"MOYEN","is_mvp":true,"is_enterprise":true,"tech_debt":"HIGH","rollback_needed":false,"risk":"Sans primitives, chaque nouvelle page degrade la coherence.","status":"TODO","phase_num":5},{"num":24,"title":"Supprimer alertes natives et confirmations brutales","priority":"MAJEUR","files":["frontend/src"],"desc":"PROMPT A COPIER-COLLER\n\nRole : agent IA frontend UX\nMission : remplacer window.alert/window.confirm dans les parcours CRM.\n\nContexte : La recherche montre de nombreux alert/confirm dans clients, leads, admin, factures, devis, mail et contexte organisation.\n\nTravail demande :\n1. Lister tous les alert/confirm hors DP/calpinage.\n2. Prioriser actions destructives : suppression, archivage, paiement, impersonation.\n3. Créer ConfirmModal standard et toast standard.\n4. Remplacer progressivement par domaine.\n5. Ajouter textes courts et rassurants.\n\nTests / verifications obligatoires :\n1. Plus d'alert/confirm dans les parcours CRM prioritaires.\n2. Actions destructives demandent confirmation propre.\n3. Erreurs API affichent toast clair.\n4. Navigation clavier modale OK.\n\nLivrable attendu : interactions critiques modernisees.\n\nContraintes : CRM S const STORAGE_KEY = 'snx-crm-roadmap-v3';

// State
let state = {
  statuses: {},
  notes: {},
  filter: { horizon:'ALL', priority:'ALL', status:'ALL', search:'', view:'ALL' },
  activePhase: 0
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      state.statuses = s.statuses || {};
      state.notes = s.notes || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      statuses: state.statuses,
      notes: state.notes
    }));
  } catch(e) {}
}

function getStatus(stepNum) {
  return state.statuses[stepNum] || 'TODO';
}

function setStatus(stepNum, status) {
  state.statuses[stepNum] = status;
  saveState();
  renderAll();
}

function getNotes(stepNum) {
  return state.notes[stepNum] || '';
}

function setNotes(stepNum, text) {
  state.notes[stepNum] = text;
  saveState();
}

// Filters
function setView(v) {
  state.filter.view = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
}

function toggleFilter(type, val, btn) {
  state.filter[type] = val;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function onSearch(val) {
  state.filter.search = val.toLowerCase();
  renderAll();
}

function stepVisible(step) {
  const f = state.filter;
  const status = getStatus(step.num);
  if (f.view === 'MVP' && !step.is_mvp) return false;
  if (f.view === 'ENTERPRISE' && !step.is_enterprise) return false;
  if (f.horizon !== 'ALL' && step.horizon !== f.horizon) return false;
  if (f.priority !== 'ALL' && step.priority !== f.priority) return false;
  if (f.status !== 'ALL' && status !== f.status) return false;
  if (f.search) {
    const hay = (step.title + step.desc + (step.files||[]).join(' ')).toLowerCase();
    if (!hay.includes(f.search)) return false;
  }
  return true;
}

function phaseVisible(phase) {
  if (state.filter.view === 'DASHBOARD') return false;
  return phase.steps.some(s => stepVisible(s));
}

// Colors
const PHASE_COLORS = [
  ['#1e3a5f','#60a5fa'],['#1a2e2a','#34d399'],['#3b2d6b','#c4b5fd'],['#7f1d1d','#fca5a5'],
  ['#1a3a2a','#4ade80'],['#3b1f00','#fb923c'],['#1e3a5f','#93c5fd'],['#2d1f3b','#d8b4fe'],
  ['#1a2e3b','#38bdf8'],['#14532d','#86efac'],['#1f2937','#d1d5db'],['#1a1a3b','#818cf8'],
  ['#1a3a1a','#16a34a'],['#3b2a00','#f59e0b'],['#1a2a3b','#0ea5e9'],['#3b1a2a','#f43f5e'],
  ['#1a3a3a','#06b6d4'],['#2a3b1a','#84cc16'],['#3b2a1a','#fb923c'],['#1a1f3b','#6366f1'],
  ['#2a1a3b','#a78bfa'],['#1a3a2a','#10b981'],['#3b1a1a','#f87171'],['#1a2a3b','#38bdf8'],
  ['#2a3b2a','#4ade80'],['#1a1a2a','#a5b4fc'],
];
function phaseColor(num) {
  return PHASE_COLORS[num % PHASE_COLORS.length] || ['#334155','#94a3b8'];
}

function globalStats() {
  let done=0, inprogress=0, blocked=0;
  PHASES.forEach(p => p.steps.forEach(s => {
    const st = getStatus(s.num);
    if(st==='DONE') done++;
    else if(st==='IN_PROGRESS') inprogress++;
    else if(st==='BLOCKED') blocked++;
  }));
  return {done, inprogress, blocked, total:108};
}

// ─── Render sidebar ───────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  PHASES.forEach(phase => {
    const done = phase.steps.filter(s => getStatus(s.num)==='DONE').length;
    const total = phase.steps.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const [bg, fg] = phaseColor(phase.num);
    const isActive = state.activePhase === phase.num;
    const div = document.createElement('div');
    div.className = 'phase-nav' + (isActive ? ' active' : '');
    div.innerHTML = `
      <div class="phase-num" style="background:${bg};color:${fg}">P${phase.num}</div>
      <div class="phase-nav-info">
        <div class="phase-nav-title">${phase.title.replace(/PHASE \d+ — /,'')}</div>
        <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="phase-count">${done}/${total}</div>
    `;
    div.onclick = () => scrollToPhase(phase.num);
    sb.appendChild(div);
  });
}

function scrollToPhase(num) {
  state.activePhase = num;
  renderSidebar();
  const el = document.getElementById('phase-block-'+num);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── Render content ───────────────────────────────────────────────────────────
function renderContent() {
  const content = document.getElementById('content');
  const dash = document.getElementById('dashboard-view');
  if(state.filter.view === 'DASHBOARD') {
    content.style.display = 'none';
    dash.style.display = 'block';
    renderDashboard();
    return;
  }
  content.style.display = 'block';
  dash.style.display = 'none';
  content.innerHTML = '';

  PHASES.forEach(phase => {
    const visSteps = phase.steps.filter(s => stepVisible(s));
    if(!phaseVisible(phase)) return;

    const done = phase.steps.filter(s => getStatus(s.num)==='DONE').length;
    const total = phase.steps.length;
    const pct = total ? Math.round(done/total*100) : 0;
    const [bg, fg] = phaseColor(phase.num);

    const block = document.createElement('div');
    block.className = 'phase-block';
    block.id = 'phase-block-'+phase.num;

    const deps = phase.requires.length ? `← Dépend de: ${phase.requires.map(r=>'Phase '+r).join(' · ')}` : '';
    const whyId = 'why-'+phase.num;

    block.innerHTML = `
      <div class="phase-header">
        <div class="phase-header-top">
          <div class="phase-badge" style="background:${bg};color:${fg}">P${phase.num}</div>
          <div class="phase-info">
            <div class="phase-title">${phase.title}</div>
            <div class="phase-subtitle">${phase.subtitle}</div>
            <div class="phase-meta">
              ${phase.score_before ? `<span class="phase-score">Score: <span>${phase.score_before}</span> → <span>${phase.score_after}</span></span>` : ''}
              ${deps ? `<span class="phase-deps">${deps}</span>` : ''}
              <span class="phase-score"><span>${done}</span>/${total} étapes terminées</span>
            </div>
          </div>
        </div>
        <div class="phase-progress-h">
          <div class="phase-bar-bg"><div class="phase-bar-fill" style="width:${pct}%"></div></div>
          <div class="phase-bar-label">${pct}%</div>
        </div>
        ${phase.why ? `<div class="phase-why-toggle" onclick="document.getElementById('${whyId}').classList.toggle('show')">▸ Pourquoi cette phase ?</div><div class="phase-why" id="${whyId}">${phase.why}</div>` : ''}
      </div>
    `;

    visSteps.forEach(step => {
      block.appendChild(renderStep(step));
    });

    content.appendChild(block);
  });

  if(content.innerHTML === '') {
    content.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">Aucune étape ne correspond aux filtres sélectionnés.</div>';
  }
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

async function copyStepPrompt(num, btn) {
  const step = PHASES.flatMap(p => p.steps).find(s => s.num === num);
  if (!step) return;
  try {
    await navigator.clipboard.writeText(step.desc || '');
    const old = btn.textContent;
    btn.textContent = 'Copie';
    setTimeout(() => { btn.textContent = old; }, 1400);
  } catch {
    window.prompt('Copier le prompt :', step.desc || '');
  }
}

function renderStep(step) {
  const status = getStatus(step.num);
  const detailId = 'detail-'+step.num;
  const card = document.createElement('div');
  card.className = 'step-card' + (status==='DONE'?' done':'') + (status==='BLOCKED'?' blocked':'');
  card.id = 'step-card-'+step.num;

  const files = (step.files||[]).map(f=>`<span class="file-tag">${f}</span>`).join(' ');
  const statusIcon = status==='DONE'?'✓':status==='IN_PROGRESS'?'⟳':status==='BLOCKED'?'✗':'';

  card.innerHTML = `
    <div class="step-top" onclick="toggleDetail(${step.num})">
      <div class="step-check ${status.toLowerCase()}" onclick="event.stopPropagation();cycleStatus(${step.num})" title="Cliquer pour changer le statut">${statusIcon}</div>
      <div class="step-num">#${step.num}</div>
      <div class="step-title">${step.title}</div>
      <div class="badges">
        <span class="badge prio-${step.priority}">${step.priority}</span>
        <span class="badge status-badge status-${status}" onclick="event.stopPropagation();openStatusMenu(${step.num},event)">${statusLabel(status)}</span>
        <span class="badge h-badge h-${step.horizon}">${step.horizon}</span>
        ${step.is_mvp?'<span class="tag tag-mvp">MVP</span>':''}
        ${step.is_enterprise?'<span class="tag tag-enterprise">ENT</span>':''}
        ${step.rollback_needed?'<span class="tag tag-rollback">ROLLBACK</span>':''}
      </div>
    </div>
    <div class="step-detail" id="${detailId}">
      <div class="detail-grid">
        <div class="detail-section detail-full">
          <div class="detail-label">📋 Prompt d'execution</div>
          <div class="detail-content desc">${escapeHtml(step.desc)}</div><button class="copy-prompt-btn" type="button" onclick="event.stopPropagation();copyStepPrompt(${step.num},this)">Copier le prompt</button>
        </div>
        <div class="detail-section">
          <div class="detail-label">✅ Critère de succès</div>
          <div class="detail-content success-text">${step.success}</div>
        </div>
        ${step.risk ? `<div class="detail-section"><div class="detail-label">⚠️ Risque si non fait</div><div class="detail-content risk-text">${step.risk}</div></div>` : ''}
        <div class="detail-section detail-full">
          <div class="detail-label">📁 Fichiers impactés</div>
          <div class="detail-content">${files||'<span style="color:var(--muted)">Non spécifié</span>'}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">🔧 Dette technique</div>
          <div class="detail-content td-${step.tech_debt}">${step.tech_debt}</div>
        </div>
        <div class="detail-section">
          <div class="detail-label">🔄 Rollback nécessaire</div>
          <div class="detail-content">${step.rollback_needed?'<span style="color:var(--amber)">Oui — plan requis</span>':'Non'}</div>
        </div>
        <div class="detail-section detail-full">
          <div class="detail-label">🎯 Statut</div>
          <select class="status-select" onchange="setStatus(${step.num},this.value)">
            <option value="TODO" ${status==='TODO'?'selected':''}>📋 À faire</option>
            <option value="IN_PROGRESS" ${status==='IN_PROGRESS'?'selected':''}>⟳ En cours</option>
            <option value="DONE" ${status==='DONE'?'selected':''}>✅ Terminé</option>
            <option value="BLOCKED" ${status==='BLOCKED'?'selected':''}>🚫 Bloqué</option>
          </select>
        </div>
        <div class="detail-section detail-full">
          <div class="detail-label">📝 Notes</div>
          <textarea class="notes-area" placeholder="Ajouter des notes, blockers, liens..." onchange="setNotes(${step.num},this.value)">${getNotes(step.num)}</textarea>
        </div>
      </div>
    </div>
  `;
  return card;
}

function statusLabel(s) {
  return {TODO:'À faire',IN_PROGRESS:'En cours',DONE:'Terminé',BLOCKED:'Bloqué'}[s]||s;
}

function toggleDetail(num) {
  const d = document.getElementById('detail-'+num);
  if(d) d.classList.toggle('open');
}

function cycleStatus(num) {
  const cycle = ['TODO','IN_PROGRESS','DONE','BLOCKED'];
  const cur = getStatus(num);
  const next = cycle[(cycle.indexOf(cur)+1)%cycle.length];
  setStatus(num, next);
}

function openStatusMenu(num, e) {
  // Simple — use the select inside the detail panel
  const detail = document.getElementById('detail-'+num);
  if(detail) {
    if(!detail.classList.contains('open')) detail.classList.add('open');
    detail.querySelector('select')?.focus();
  }
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const stats = globalStats();
  const pct = Math.round(stats.done/stats.total*100);
  const mvpDone = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.is_mvp && getStatus(s.num)==='DONE').length, 0);
  const mvpTotal = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.is_mvp).length, 0);
  const critDone = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.priority==='CRITIQUE' && getStatus(s.num)==='DONE').length, 0);
  const critTotal = PHASES.reduce((acc,p) => acc + p.steps.filter(s=>s.priority==='CRITIQUE').length, 0);

  const dash = document.getElementById('dashboard-view');
  dash.innerHTML = `
    <div class="dash-cards">
      <div class="dash-card"><div class="dash-card-val">${pct}%</div><div class="dash-card-lbl">Avancement global</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--green)">${stats.done}</div><div class="dash-card-lbl">Étapes terminées</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--amber)">${stats.inprogress}</div><div class="dash-card-lbl">En cours</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--red)">${stats.blocked}</div><div class="dash-card-lbl">Bloquées</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--purple)">${mvpDone}/${mvpTotal}</div><div class="dash-card-lbl">MVP</div></div>
      <div class="dash-card"><div class="dash-card-val" style="color:var(--blue)">${critDone}/${critTotal}</div><div class="dash-card-lbl">CRITIQUE résolues</div></div>
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Avancement par phase</div>
      ${PHASES.map(p => {
        const done = p.steps.filter(s => getStatus(s.num)==='DONE').length;
        const pct2 = p.steps.length ? Math.round(done/p.steps.length*100) : 0;
        const [bg,fg] = phaseColor(p.num);
        return `<div class="phase-row">
          <div class="phase-row-name"><span style="background:${bg};color:${fg};padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700;margin-right:6px">P${p.num}</span>${p.title.replace(/PHASE \d+ — /,'')}</div>
          <div class="phase-row-bar"><div class="phase-row-fill" style="width:${pct2}%;background:${pct2===100?'var(--green)':pct2>50?'var(--amber)':'var(--blue)'}"></div></div>
          <div class="phase-row-pct">${pct2}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="dash-section">
      <div class="dash-section-title">Répartition par horizon</div>
      ${['COURT','MOYEN','LONG'].map(h => {
        const steps = PHASES.flatMap(p=>p.steps).filter(s=>s.horizon===h);
        const done = steps.filter(s=>getStatus(s.num)==='DONE').length;
        const pct3 = steps.length ? Math.round(done/steps.length*100) : 0;
        const col = h==='COURT'?'var(--blue)':h==='MOYEN'?'var(--purple)':'var(--green)';
        return `<div class="phase-row">
          <div class="phase-row-name"><span class="h-badge h-${h}" style="margin-right:6px">${h}</span> (${steps.length} étapes)</div>
          <div class="phase-row-bar"><div class="phase-row-fill" style="width:${pct3}%;background:${col}"></div></div>
          <div class="phase-row-pct">${pct3}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="dash-section">
      <div class="dash-section-title">🚫 Étapes bloquées</div>
      ${PHASES.flatMap(p=>p.steps).filter(s=>getStatus(s.num)==='BLOCKED').map(s=>`
        <div style="background:var(--surface);border:1px solid var(--red);border-radius:6px;padding:8px 12px;margin-bottom:4px;font-size:11px">
          <span style="color:var(--muted)">#${s.num} P${s.phase_num}</span>
          <span style="margin:0 8px;font-weight:600">${s.title}</span>
          ${s.risk?`<span style="color:var(--red);font-size:10px">⚠ ${s.risk.substring(0,100)}...</span>`:''}
        </div>
      `).join('') || '<div style="color:var(--green);font-size:12px">Aucune étape bloquée ✓</div>'}
    </div>
  `;
}

// ─── Global stats update ──────────────────────────────────────────────────────
function updateGlobalStats() {
  const s = globalStats();
  const pct = Math.round(s.done/s.total*100);
  document.getElementById('global-bar').style.width = pct+'%';
  document.getElementById('global-label').textContent = s.done+' / '+s.total;
  document.getElementById('stat-done').textContent = s.done;
  document.getElementById('stat-progress').textContent = s.inprogress;
  document.getElementById('stat-blocked').textContent = s.blocked;
}

function renderAll() {
  renderSidebar();
  renderContent();
  updateGlobalStats();
}

// ─── Export Markdown ──────────────────────────────────────────────────────────
function exportMarkdown() {
  let md = '# SolarNext — Roadmap CRM SaaS\n\n';
  md += `> Exporté le ${new Date().toLocaleDateString('fr-FR')} | ${globalStats().done}/${globalStats().total} étapes terminées\n\n`;
  md += '## Table des matières\n\n';
  PHASES.forEach(p => {
    md += `- [Phase ${p.num}: ${p.title.replace(/PHASE \d+ — /,'')}](#phase-${p.num})\n`;
  });
  md += '\n---\n\n';
  PHASES.forEach(phase => {
    const done = phase.steps.filter(s=>getStatus(s.num)==='DONE').length;
    const pct = Math.round(done/phase.steps.length*100);
    md += `## Phase ${phase.num}: ${phase.title.replace(/PHASE \d+ — /,'')}\n\n`;
    md += `**Sous-titre**: ${phase.subtitle}\n`;
    if(phase.score_before) md += `**Score**: ${phase.score_before} → ${phase.score_after}\n`;
    if(phase.requires.length) md += `**Dépend de**: ${phase.requires.map(r=>'Phase '+r).join(', ')}\n`;
    md += `**Avancement**: ${done}/${phase.steps.length} (${pct}%)\n\n`;
    if(phase.why) md += `> ${phase.why.substring(0,200)}...\n\n`;
    phase.steps.forEach(step => {
      const status = getStatus(step.num);
      const check = status==='DONE'?'[x]':'[ ]';
      md += `### ${check} #${step.num} — ${step.title}\n\n`;
      md += `| Champ | Valeur |\n|---|---|\n`;
      md += `| Priorité | ${step.priority} |\n`;
      md += `| Statut | ${statusLabel(status)} |\n`;
      md += `| Horizon | ${step.horizon} |\n`;
      md += `| MVP | ${step.is_mvp?'Oui':'Non'} |\n`;
      md += `| Enterprise | ${step.is_enterprise?'Oui':'Non'} |\n`;
      md += `| Dette technique | ${step.tech_debt} |\n`;
      md += `| Rollback nécessaire | ${step.rollback_needed?'Oui':'Non'} |\n\n`;
      if(step.desc) md += `**Prompt d'execution**:\n${step.desc.substring(0,400)}...\n\n`;
      if(step.success) md += `**Critère de succès**: ${step.success}\n\n`;
      if(step.risk) md += `**Risque si non fait**: ${step.risk}\n\n`;
      if(step.files?.length) md += `**Fichiers impactés**: ${step.files.join(', ')}\n\n`;
      const notes = getNotes(step.num);
      if(notes) md += `**Notes**: ${notes}\n\n`;
      md += '---\n\n';
    });
  });

  const blob = new Blob([md], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'SolarNext_Master_Roadmap.md';
  a.click();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadState();
renderAll();
</script>
</body>
